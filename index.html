      }

      position: absolute;
      left: 50%;
      top: 20%;
      transform: translateX(-50%);
      font-weight: 900;
      font-size: 1.25rem;
      color: #fbbf24;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      z-index: 50;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .animate-anvil-shake {
      animation: anvil-shake-kf 0.1s infinite;
    }

    @keyframes anvil-shake-kf {
      0% {
        transform: translate(1px, 1px) rotate(0deg);
      }

      10% {
        transform: translate(-1px, -2px) rotate(-1deg);
      }

      20% {
        transform: translate(-3px, 0px) rotate(1deg);
      }

      30% {
        transform: translate(0px, 2px) rotate(0deg);
      }

      40% {
        transform: translate(1px, -1px) rotate(1deg);
      }

      50% {
        transform: translate(-1px, 2px) rotate(-1deg);
      }

      60% {
        transform: translate(-3px, 1px) rotate(0deg);
      }

      70% {
        transform: translate(2px, 1px) rotate(-1deg);
      }

      80% {
        transform: translate(-1px, -1px) rotate(1deg);
      }

      90% {
        transform: translate(2px, 2px) rotate(0deg);
      }

      100% {
        transform: translate(1px, -2px) rotate(-1deg);
      }
    }

    // Defense Contract preview helpers ??derived-only, no state mutation
    function getDefenseContractRiskTier(asset) {
      const vol = toFiniteNumber(asset.volatility, 0.05);
      if (vol <= 0.03) return { label: "Stable", color: "text-emerald-600" };
      if (vol <= 0.07) return { label: "Volatile", color: "text-yellow-600" };
      return { label: "High Risk", color: "text-red-500" };
    }

    function getDefenseContractOdds(asset, highestStage) {
      const vol = toFiniteNumber(asset.volatility, 0.05);
      // Power-curve scaling: vol^0.6 penalizes mid-range volatility harder than linear,
      // producing distinct tiers (Stable ~79%, Volatile ~62%, High Risk ~32%).
      return Math.round(Math.max(30, Math.min(80, (1 - Math.pow(vol, 0.6) * 3.5) * 100)));
    }

    function getDefenseContractProjectedPayout(asset, highestStage, squadDps) {
      const vol = toFiniteNumber(asset.volatility, 0.05);
      // Higher risk -> higher projected multiplier (base range ~1.20 - 2.20)
      // Intent: Reward users for picking volatile contracts that rely on tactical signals.
      const baseMultiplier = 1 + vol * 10;
      // Squad DPS adds a small log-scaled bonus (capped at +0.20)
      // Intent: Diminishing returns on DPS ensure contracts remain risky regardless of power level.
      const dps = toFiniteNumber(squadDps, 0);
      const dpsBonus = dps > 0 ? Math.min(0.2, Math.log10(dps + 1) * 0.02) : 0;
      const raw = toFiniteNumber(baseMultiplier + dpsBonus, 1.2);
      return Math.max(1.05, Math.min(2.5, raw));
    }

    // Derived-only bet slip preview ??no state mutation, no settlement
    function getDefenseContractBetPreview(betSlip, assetList, highestStage, squadDps) {
      const contractId = betSlip?.selectedContractId;
      if (!contractId) return null;
      const asset = (assetList || []).find((a) => a.id === contractId);
      if (!asset) return null;
      const stage = toFiniteNumber(highestStage, 0);
      const dps = toFiniteNumber(squadDps, 0);
      const odds = getDefenseContractOdds(asset, stage);
      const payout = getDefenseContractProjectedPayout(asset, stage, dps);
      const tier = getDefenseContractRiskTier(asset);
      const stake = Math.max(0, toFiniteNumber(betSlip?.stake, 0));
      const projectedWin = toFiniteNumber(stake * payout, 0);
      return { asset, odds, payout, tier, stake, projectedWin };
    }

    // Derived-only simulated outcome ??deterministic preview, no random settlement
    // Phase D-1B: Tactical Signal helper ??pure and candidate only
    function calculateDefenseContractTacticalSignal(gameState, asset) {
      const targetFaction = DEFENSE_CONTRACT_FACTION_MAPPING[asset?.id];
      if (!targetFaction) return { tacticalSignal: 0, buildAlignment: 0, reason: "No faction mapping" };

      const activeUnits = gameState.rpg?.run?.activeUnits || [];
      let factionMatches = 0;
      let rarityBonus = 0;

      activeUnits.forEach((unit) => {
        const def = getCharacterDefinition(unit.characterId);
        if (!def) return;

        if (def.faction === targetFaction) {
          factionMatches++;
        }

        if (def.rarity === "mythic" || def.rarity === "legendary") {
          rarityBonus += 2;
        } else if (def.rarity === "unique" || def.rarity === "epic") {
          rarityBonus += 1;
        }
      });

      const factionSignal = Math.min(10, factionMatches * 2);
      const cappedRaritySignal = Math.min(5, rarityBonus);

      const specStats = getExternalCapitalSpecializationStats(gameState);
      let buildAlignment = 0;
      if (specStats.unlocked) {
        const factionBonusMap = { realty: specStats.realtyBonus, ticker: specStats.tickerBonus, shadow: specStats.shadowBonus, luxury: specStats.luxuryBonus };
        const matchingBonus = factionBonusMap[targetFaction] || 0;
        buildAlignment = matchingBonus > 0 ? Math.min(3, Math.round(matchingBonus * 100 * 0.5)) : 0;
      }

      const combined = Math.min(12, factionSignal + cappedRaritySignal + buildAlignment);

      return {
        factionSignal,
        raritySignal: cappedRaritySignal,
        buildAlignment,
        tacticalSignal: combined,
        tacticalCap: 12,
        matchedFaction: targetFaction,
        eligibleUnitCount: activeUnits.length,
        matchingFactionCount: factionMatches,
        rarityContribution: rarityBonus,
        reason: `Faction: ${factionSignal}%, Rarity: ${cappedRaritySignal}%, Align: ${buildAlignment}% (Capped at 12%)`
      };
    }

    // Phase A: Probabilistic success chance helper ??pure and deterministic
    function calculateDefenseContractSuccessChance(gameState, asset, highestStage, squadDps) {
      const stage = toFiniteNumber(highestStage, 0);
      const dps = toFiniteNumber(squadDps, 0);
      const odds = getDefenseContractOdds(asset, stage);

      // RPG-specific signals (Total Max Bonus: +35%)
      // 1. Stage Signal (Progress-based, Max +15%)
      const stageSignal = Math.min(15, Math.round((stage / NORMAL_ENDING_STAGE) * 15));

      // 2. DPS Signal (Active Combat Power, +5%)
      const dpsSignal = dps > 0 ? 5 : 0;

      // 3. PEN Signal (Armor Penetration utility, +3% per level, Max +15%)
      const penLevel = getRpgUpgradeLevel(gameState, "penLevel");
      const penSignal = Math.min(15, penLevel * 3);

      // Phase D-1B: Candidate tactical signal (Now added to rawChance in Phase D-1D)
      const tacticalCandidate = calculateDefenseContractTacticalSignal(gameState, asset);

      // Success Formula: Base + Stage(15) + DPS(5) + PEN(15) + Tactical(12) = Max +47% Bonus
      const rawChance = odds + stageSignal + dpsSignal + penSignal + tacticalCandidate.tacticalSignal;
      const boundedChance = Math.max(5, Math.min(95, rawChance));

      return {
        successChance: boundedChance,
        successProbability: boundedChance / 100,
        rawChance,
        boundedChance,
        minChance: 5,
        maxChance: 95,
        squadSignal: dpsSignal + penSignal,
        contractSignal: odds,
        stageSignal,
        dpsSignal,
        penSignal,
        riskModifier: 0,
        tacticalSignalCandidate: tacticalCandidate,
        explanation: `Base Odds (${odds}%) + RPG Progress (+${stageSignal}%) + Combat Power (+${dpsSignal + penSignal}%) + Tactical Edge (+${tacticalCandidate.tacticalSignal}%).`
      };
    }

    function getDefenseContractSimulatedOutcome(gameState, betSlip, assetList, highestStage, squadDps) {
      const contractId = betSlip?.selectedContractId;
      if (!contractId) return null;
      const asset = (assetList || []).find((a) => a.id === contractId);
      if (!asset) return null;
      const stage = toFiniteNumber(highestStage, 0);
      const dps = toFiniteNumber(squadDps, 0);

      const prob = calculateDefenseContractSuccessChance(gameState, asset, stage, dps);
      const successChance = prob.successChance; // Percent scale (5-95)
      const payout = getDefenseContractProjectedPayout(asset, stage, dps);
      const stake = Math.max(0, toFiniteNumber(betSlip?.stake, 0));

      const outcomeLabel = successChance >= 60 ? "Favorable" : successChance >= 40 ? "Neutral" : "Unfavorable";
      const projectedGain = toFiniteNumber(stake * (payout - 1), 0);
      const projectedLoss = stake;

      let confidenceLevel;
      if (successChance >= 80) confidenceLevel = "High";
      else if (successChance >= 40) confidenceLevel = "Medium";
      else confidenceLevel = "Low";

      const contractDisplayName = DEFENSE_CONTRACT_FLAVOR[asset.id]?.displayName || asset.name;
      // Detailed explanation from the probabilistic helper
      const explanation = `${contractDisplayName} shows a ${successChance}% success probability. ${prob.explanation}`;

      return {
        selectedContractId: contractId,
        contractName: contractDisplayName,
        stake,
        odds: successChance,
        outcomeLabel,
        successChance,
        projectedGain,
        projectedLoss,
        confidenceLevel,
        explanation,
        projectedPayout: payout,
        tacticalSignalCandidate: prob.tacticalSignalCandidate
      };
    }

    // Pure validation helper ??no mutation, returns structured canSettle result
    function validateDefenseContractSettlement(gameState, assetList, highestStage, squadDps) {
      const investment = gameState?.investment;
      const capital = toFiniteNumber(gameState?.investment?.capital, 0);
      const contractId = investment?.betSlip?.selectedContractId || null;
      const stake = Math.max(0, toFiniteNumber(investment?.betSlip?.stake, 0));

      const base = { selectedContractId: contractId, stake, odds: null, projectedPayout: null };

      if (!isDefenseContractSettlementUnlocked(gameState)) {
        return {
          ...base, canSettle: false, reason: "Settlement is locked. Hero's Fate mechanics are not yet enabled.",
          checks: { settlementUnlocked: false, contractSelected: false, stakePositive: false, stakeWithinCash: false, oddsValid: false, payoutValid: false }
        };
      }

      const asset = (assetList || []).find((a) => a.id === contractId);
      if (!contractId || !asset) {
        return {
          ...base, canSettle: false, reason: "No valid contract is selected.",
          checks: { settlementUnlocked: true, contractSelected: false, stakePositive: false, stakeWithinCash: false, oddsValid: false, payoutValid: false }
        };
      }

      if (stake <= 0) {
        return {
          ...base, canSettle: false, reason: "Stake must be greater than 0.",
          checks: { settlementUnlocked: true, contractSelected: true, stakePositive: false, stakeWithinCash: false, oddsValid: false, payoutValid: false }
        };
      }

      if (stake > capital) {
        return {
          ...base, canSettle: false, reason: "Stake exceeds available Contract Capital balance.",
          checks: { settlementUnlocked: true, contractSelected: true, stakePositive: true, stakeWithinCash: false, oddsValid: false, payoutValid: false }
        };
      }

      const stage = toFiniteNumber(highestStage, 0);
      const dps = toFiniteNumber(squadDps, 0);
      const odds = getDefenseContractOdds(asset, stage);
      if (!isFinite(odds) || odds <= 0) {
        return {
          ...base, odds, canSettle: false, reason: "Contract odds are invalid.",
          checks: { settlementUnlocked: true, contractSelected: true, stakePositive: true, stakeWithinCash: true, oddsValid: false, payoutValid: false }
        };
      }

      const projectedPayout = getDefenseContractProjectedPayout(asset, stage, dps);
      if (!isFinite(projectedPayout) || projectedPayout <= 0) {
        return {
          ...base, odds, projectedPayout, canSettle: false, reason: "Projected payout is invalid.",
          checks: { settlementUnlocked: true, contractSelected: true, stakePositive: true, stakeWithinCash: true, oddsValid: true, payoutValid: false }
        };
      }

      return {
        canSettle: true, reason: "All conditions met. Ready to settle.", selectedContractId: contractId, stake, odds, projectedPayout,
        checks: { settlementUnlocked: true, contractSelected: true, stakePositive: true, stakeWithinCash: true, oddsValid: true, payoutValid: true }
      };
    }

    // Pure helper ??deterministic dry-run, no Math.random for outcome, no cash mutation
    function createDefenseContractDryRunResult(gameState, assetList, highestStage, squadDps) {
      const validation = validateDefenseContractSettlement(gameState, assetList, highestStage, squadDps);
      if (!validation.canSettle) return null;
      const { selectedContractId: contractId, stake, projectedPayout } = validation;
      const asset = (assetList || []).find((a) => a.id === contractId);
      if (!asset) return null;
      const stage = toFiniteNumber(highestStage, 0);
      const dps = toFiniteNumber(squadDps, 0);

      // Use the new probabilistic helper for deterministic dry-run decision
      const prob = calculateDefenseContractSuccessChance(gameState, asset, stage, dps);
      const successChance = prob.successChance;

      // Dry-run remains deterministic (Threshold >= 60)
      const wouldWin = successChance >= 60;

      const safePayout = Math.max(1, toFiniteNumber(projectedPayout, 1));
      const safeStake = Math.max(0, toFiniteNumber(stake, 0));
      const netPreview = wouldWin
        ? toFiniteNumber(safeStake * (safePayout - 1), 0)
        : -safeStake;

      return {
        id: `dryrun-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
        contractId,
        contractName: DEFENSE_CONTRACT_FLAVOR[contractId]?.displayName || asset.name,
        stake: safeStake,
        odds: successChance, // Display the calculated success chance
        projectedPayout: safePayout,
        successChance,
        wouldWin,
        netPreview,
        createdAt: Date.now(),
        status: "dry-run",
      };
    }

    // Pure helper ??probabilistic settlement result using Math.random()
    function createDefenseContractSettlementResult(gameState, assetList, highestStage, squadDps) {
      const validation = validateDefenseContractSettlement(gameState, assetList, highestStage, squadDps);
      if (!validation.canSettle) return null;
      const { selectedContractId: contractId, stake, projectedPayout } = validation;
      const asset = (assetList || []).find((a) => a.id === contractId);
      if (!asset) return null;

      const stage = toFiniteNumber(highestStage, 0);
      const dps = toFiniteNumber(squadDps, 0);

      // Phase C: Probabilistic settlement using the dedicated helper
      const prob = calculateDefenseContractSuccessChance(gameState, asset, stage, dps);
      const successChance = prob.successChance; // Percent scale (5-95)
      const successProbability = prob.successProbability; // Decimal scale (0.05-0.95)

      // The real random roll
      const wouldWin = Math.random() < successProbability;

      const safePayout = Math.max(1, toFiniteNumber(projectedPayout, 1));
      const safeStake = Math.max(0, toFiniteNumber(stake, 0));
      const netResult = wouldWin
        ? toFiniteNumber(safeStake * (safePayout - 1), 0)
        : -safeStake;

      return {
        id: `settled-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
        contractId,
        contractName: DEFENSE_CONTRACT_FLAVOR[contractId]?.displayName || asset.name,
        stake: safeStake,
        odds: successChance, // Record the actual chance for history
        projectedPayout: safePayout,
        successChance,
        wouldWin,
        netResult,
        createdAt: Date.now(),
        status: "settled",
      };
    }

          lastContractDryRun: null,
          contractSettlementHistory: [],
        },
        enhancement: {
          inventory: [],
          failStacks: 0,
          lastPulledItem: null,
          recentPulls: [],
          lastEnhancementResult: null,
          starterWeaponGranted: false,
          weaponMastery: {},
          weaponLevels: {},
          refinedShards: 0,
          forgeStats: {
            totalAttempts: 0,
            totalSuccesses: 0,
            totalFailures: 0,
            totalBreakages: 0,
            totalShardsEarned: 0,
          },
          salvageHistory: [],
          stabilizers: 0,
        },
        rpg: {
          characters: [],
          highestStage: 0,
          tickets: 1,
          unlockedCharacterIds: [],
          currentStage: 1,
          monsterHp: 100,
          monsterMaxHp: 100,
          defeatedMonsters: 0,
          stageKills: 0,
          dividends: 0,
          lastRpgReward: 0,
          normalEndingReached: false,
          normalEndingSeen: false,
          upgrades: {
            atkLevel: 0,
            spdLevel: 0,
            penLevel: 0,
          },
          run: {
            activeUnits: [],
            isActive: false,
            wave: 0,
            stage: 1,
            runId: null,
            resultHistory: [],
          },
        },
        meta: {
          gameOver: null,
        },
        settings: {
          language,
          lastSavedAt: null,
        },
      };
    }

    function toFiniteNumber(value, fallback = 0) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function formatDps(val) {
      const n = toFiniteNumber(val, 0);
      if (n <= 0) return "0";
      if (n < 1000000) return Math.floor(n).toLocaleString();
      if (n < 1e12) {
        return new Intl.NumberFormat("en-US", {
          notation: "compact",
          maximumFractionDigits: 2,
        }).format(n);
      }
      return n.toExponential(2);
    }

    function clampNumber(value, min, max, fallback = min) {
      const number = toFiniteNumber(value, fallback);
      return Math.min(max, Math.max(min, number));
    }

    function toOwnedQuantity(value) {
      return Math.max(0, Math.floor(toFiniteNumber(value, 0)));
    }

    function toSafePrice(value, fallbackPrice) {
      return Math.max(0, toFiniteNumber(value, fallbackPrice));
    }

    function normalizePriceHistory(history, fallbackPrice) {
      const safeFallback = Math.max(1, Math.round(fallbackPrice));
      const source = Array.isArray(history) ? history : [];
      const cleaned = source
        .map((point) => Math.round(toFiniteNumber(point, safeFallback)))
        .filter((point) => Number.isFinite(point) && point > 0)
        .slice(-INVESTMENT_HISTORY_LIMIT);

      return cleaned.length > 0 ? cleaned : [safeFallback];
    }

    function normalizeGachaItem(item, fallbackIndex = 0) {
      const definition = GACHA_ITEMS.find((candidate) => candidate.id === item?.id);
      if (!definition) return null;
      const characterDefinition =
        definition.type === "character"
          ? getCharacterDefinition(definition.characterId)
          : null;
      if (definition.type === "character" && !characterDefinition) return null;
      const enhanceLevel = clampNumber(
        Math.floor(toFiniteNumber(item.enhanceLevel, 0)),
        0,
        MAX_ENHANCE_LEVEL,
        0,
      );

      return {
        instanceId:
          typeof item.instanceId === "string" && item.instanceId.length > 0
            ? item.instanceId
            : `${definition.id}-${fallbackIndex}`,
        id: definition.id,
        characterId: characterDefinition?.id,
        name: definition.name,
        type: definition.type,
        weaponType: definition.weaponType || null,
        rarity: definition.rarity,
        power: Math.max(0, toFiniteNumber(item.power, definition.power)),
        enhanceLevel,
        broken: item.broken === true,
        locked: item.locked === true,
        breakSurvivalCount: Math.max(0, Math.floor(toFiniteNumber(item.breakSurvivalCount, 0))),
        mods: definition.type === "weapon" ? (Array.isArray(item?.mods) ? item.mods : []) : undefined,
      };
    }

    function normalizeInventoryItem(item, fallbackIndex = 0) {
      const normalizedItem = normalizeGachaItem(item, fallbackIndex);
      if (!normalizedItem || normalizedItem.type === "character") return null;
      return normalizedItem;
    }

    function normalizeRecentPulls(pulls) {
      const source = Array.isArray(pulls) ? pulls : [];
      return source
        .map((item, index) => normalizeGachaItem(item, index))
        .filter(Boolean)
        .slice(-GACHA_RECENT_PULL_LIMIT);
    }

    function createStarterWeaponInstance() {
      return normalizeInventoryItem(
        {
          id: "iron-dagger",
          instanceId: `starter-iron-dagger-${Date.now()}-${Math.random()
            .toString(36)
            .slice(2, 8)}`,
          enhanceLevel: 0,
          mods: [],
        },
        0,
      );
    }

    function ensureUniqueGachaInstanceIds(items) {
      const seen = new Set();

      return items.map((item, index) => {
        const baseInstanceId =
          typeof item.instanceId === "string" && item.instanceId.length > 0
            ? item.instanceId
            : `${item.id}-${index}`;
        const instanceId = seen.has(baseInstanceId)
          ? `${baseInstanceId}-${index}`
          : baseInstanceId;
        seen.add(instanceId);

        return {
          ...item,
          instanceId,
        };
      });
    }

    function getCharacterDefinition(characterId) {
      return CHARACTER_DEFINITIONS.find(
        (character) => character.id === characterId,
      );
    }

    function createCharacterInstance(characterId) {
      const definition = getCharacterDefinition(characterId);
      if (!definition) return null;

      return {
        instanceId: `${definition.id}-${Date.now()}-${Math.random()
          .toString(36)
          .slice(2, 8)}`,
        characterId: definition.id,
        level: 1,
        stars: 0,
        equippedWeaponInstanceId: null,
      };
    }

    function normalizeOwnedCharacter(character, fallbackIndex = 0) {
      const definition = getCharacterDefinition(character?.characterId);
      if (!definition) return null;

      const equippedWeaponInstanceId =
        typeof character.equippedWeaponInstanceId === "string" &&
          character.equippedWeaponInstanceId.length > 0
          ? character.equippedWeaponInstanceId
          : null;

      return {
        instanceId:
          typeof character.instanceId === "string" &&
            character.instanceId.length > 0
            ? character.instanceId
            : `${definition.id}-owned-${fallbackIndex}`,
        characterId: definition.id,
        level: clampNumber(
          Math.floor(toFiniteNumber(character.level, 1)),
          1,
          MAX_CHARACTER_LEVEL,
          1,
        ),
        stars: clampNumber(
          Math.floor(toFiniteNumber(character.stars, 0)),
          0,
          MAX_CHARACTER_STARS,
          0,
        ),
        equippedWeaponInstanceId,
      };
    }

    function ensureUniqueCharacterInstanceIds(characters) {
      const seen = new Set();

      return characters.map((character, index) => {
        const baseInstanceId =
          typeof character.instanceId === "string" &&
            character.instanceId.length > 0
            ? character.instanceId
            : `${character.characterId}-owned-${index}`;
        const instanceId = seen.has(baseInstanceId)
          ? `${baseInstanceId}-${index}`
          : baseInstanceId;
        seen.add(instanceId);

        return {
          ...character,
          instanceId,
        };
      });
    }

    function getEquippedWeaponForCharacter(character, inventory) {
      if (!character?.equippedWeaponInstanceId) return null;
      return (
        inventory.find(
          (item) =>
            item.instanceId === character.equippedWeaponInstanceId &&
            item.type === "weapon",
        ) || null
      );
    }

    function isWeaponEquipped(weaponInstanceId, characters) {
      if (typeof weaponInstanceId !== "string" || weaponInstanceId.length === 0) {
        return false;
      }
      return characters.some(
        (character) => character.equippedWeaponInstanceId === weaponInstanceId,
      );
    }

    function normalizeEquippedCharacterWeapons(characters, inventory) {
      const equippedWeaponIds = new Set();

      return characters.map((character) => {
        const equippedWeapon = getEquippedWeaponForCharacter(
          character,
          inventory,
        );
        if (!equippedWeapon || equippedWeaponIds.has(equippedWeapon.instanceId)) {
          return {
            ...character,
            equippedWeaponInstanceId: null,
          };
        }

        equippedWeaponIds.add(equippedWeapon.instanceId);
        return character;
      });
    }

    function getWeaponType(weapon) {
      return weapon?.weaponType || null;
    }

    function getCharacterPreferredWeaponType(characterDefinition) {
      return characterDefinition?.preferredWeaponType || null;
    }

    function hasPreferredWeaponEquipped(character, inventory) {
      const definition = getCharacterDefinition(character?.characterId);
      if (!definition) return false;
      const weapon = getEquippedWeaponForCharacter(character, inventory);
      if (!weapon) return false;
      return (
        getWeaponType(weapon) === getCharacterPreferredWeaponType(definition)
      );
    }

    function getPreferredWeaponSynergy(character, inventory) {
      const hasSynergy = hasPreferredWeaponEquipped(character, inventory);
      if (!hasSynergy) return 1.0;

      const weapon = getEquippedWeaponForCharacter(character, inventory);
      const enhanceLevel = weapon ? toFiniteNumber(weapon.enhanceLevel, 0) : 0;

      // Base 1.25 + 0.01 per enhance level, capped at 1.5
      const multiplier = 1.25 + enhanceLevel * 0.01;
      return Math.min(1.5, toFiniteNumber(multiplier, 1.25));
    }

    function getWeaponMasteryBonus(unit, enhancementState) {
      const definition = getCharacterDefinition(unit?.characterId);
      const preferredType = getCharacterPreferredWeaponType(definition);
      if (!preferredType) return 1;

      const weaponLevels = enhancementState?.weaponLevels || {};
      const savedLevel = Math.max(
        0,
        Math.floor(toFiniteNumber(weaponLevels[preferredType], 0)),
      );
      return Math.min(2, 1 + savedLevel * 0.05);
    }

    function createRunCharacterUnit(characterId, fallbackIndex = 0) {
      const created = createCharacterInstance(characterId);
      if (created) return created;
      const definition = getCharacterDefinition(characterId);
      if (!definition) return null;
      return {
        instanceId: `run-${definition.id}-${fallbackIndex}`,
        characterId: definition.id,
        level: 1,
        stars: 0,
        equippedWeaponInstanceId: null,
      };
    }

    function getStarterRunCharacterIds(rpgState) {
      const unlocked = Array.isArray(rpgState?.unlockedCharacterIds)
        ? rpgState.unlockedCharacterIds.filter((id) => getCharacterDefinition(id))
        : [];
      if (unlocked.length > 0) return unlocked;
      return [
        "realty-normal-yard-broker",
        "ticker-normal-floor-runner",
        "luxury-normal-boutique-slasher",
      ];
    }

    function getRunTicketCost() {
      return 100;
    }

    function getCharacterBaseDps(characterInstance) {
      if (!characterInstance?.characterId) return 0;
      const gachaItem = GACHA_ITEMS.find(
        (item) => item.characterId === characterInstance.characterId,
      );
      return gachaItem ? toFiniteNumber(gachaItem.power, 0) : 0;
    }

    function getCharacterLevelDps(characterInstance) {
      const baseDps = getCharacterBaseDps(characterInstance);
      const definition = getCharacterDefinition(characterInstance.characterId);
      if (!definition) return baseDps;

      const rarityBalance = CHARACTER_RARITY_BALANCE[
        definition.rarity.toLowerCase()
      ] || {
        growthRateRange: [1.05, 1.05],
      };
      const growthRate = rarityBalance.growthRateRange[0];
      const level = toFiniteNumber(characterInstance.level, 1);

      const levelMultiplier = Math.pow(growthRate, level - 1);
      return toFiniteNumber(baseDps * levelMultiplier, baseDps);
    }

    function getFactionSynergyMultiplier(count) {
      const c = Math.max(0, Math.floor(toFiniteNumber(count, 0)));
      if (c >= 4) return 1.25;
      if (c === 3) return 1.12;
      if (c === 2) return 1.05;
      return 1.0;
    }

    function getKillsRequiredForStage(stage) {
      return 5;
    }

    function isInfiniteModeStage(stage) {
      return toFiniteNumber(stage, 0) > NORMAL_ENDING_STAGE;
    }

    function getInfiniteMonsterArchetype(stage) {
      const safeStage = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
      if (safeStage <= NORMAL_ENDING_STAGE) {
        return INFINITE_MONSTER_ARCHETYPES.standard;
      }

      if (INFINITE_BOSS_STAGES.includes(safeStage)) {
        return INFINITE_MONSTER_ARCHETYPES.authorityGate;
      }

      const rotation = [
        INFINITE_MONSTER_ARCHETYPES.armorWall,
        INFINITE_MONSTER_ARCHETYPES.phantom,
        INFINITE_MONSTER_ARCHETYPES.regenerator,
        INFINITE_MONSTER_ARCHETYPES.berserker,
        INFINITE_MONSTER_ARCHETYPES.shadowWraith,
        INFINITE_MONSTER_ARCHETYPES.standard,
      ];
      return rotation[(safeStage - NORMAL_ENDING_STAGE - 1) % rotation.length];
    }

    function getInfiniteBossMilestone(stage) {
      const safeStage = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
      if (safeStage <= NORMAL_ENDING_STAGE) return null;
      return INFINITE_BOSS_MILESTONES[safeStage] || null;
    }

    function getInfiniteReaperProfile(stage) {
      const safeStage = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
      if (safeStage <= NORMAL_ENDING_STAGE) {
        return {
          active: false,
          form: REAPER_FORMS.dormant,
          intensityTier: 0,
          milestone: null,
          isMilestone: false,
        };
      }

      const milestone = getInfiniteBossMilestone(safeStage);
      const milestoneForms = {
        150: REAPER_FORMS.ironSentinel,
        200: REAPER_FORMS.phantomGeneral,
        300: REAPER_FORMS.eternalHydra,
        500: REAPER_FORMS.berserkerKing,
        1000: REAPER_FORMS.authority,
      };
      const intensityTier = safeStage >= 1000 ? 5
        : safeStage >= 500 ? 4
          : safeStage >= 300 ? 3
            : safeStage >= 200 ? 2
              : 1;

      return {
        active: true,
        form: milestoneForms[safeStage] || REAPER_FORMS.darkReaper,
        intensityTier,
        milestone,
        isMilestone: Boolean(milestone),
      };
    }

    function getInfiniteBossCombatModifier(bossMilestone, combatStats, stage) {
      const safeStage = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
      if (safeStage <= NORMAL_ENDING_STAGE || !bossMilestone) {
        return { damageMultiplier: 1 };
      }

      if (safeStage === 150 && bossMilestone.stage === 150) {
        const pen = Math.max(0, toFiniteNumber(combatStats?.pen, 0));
        const armorWallMod = Math.max(0.625, Math.min(1, 0.625 + pen * 0.375));
        return {
          damageMultiplier: 0.7 * armorWallMod,
        };
      }

      return { damageMultiplier: 1 };
    }

    function getInfiniteReaperCombatModifier(reaperProfile, combatStats, stage) {
      const safeStage = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
      if (safeStage <= NORMAL_ENDING_STAGE || reaperProfile?.active !== true) {
        return {
          damageMultiplier: 1,
          pressureLabelKey: "reaperPressure_none",
          pressureDescriptionKey: "reaperPressureDesc_none",
        };
      }

      const intensityTier = Math.max(1, Math.floor(toFiniteNumber(reaperProfile.intensityTier, 1)));
      return {
        damageMultiplier: Math.max(0.85, Math.min(1, 1 - intensityTier * 0.025)),
        pressureLabelKey: "reaperPressure_active",
        pressureDescriptionKey: "reaperPressureDesc_active",
      };
    }

    function getInfiniteArchetypeCombatModifier(archetype, combatStats, stage) {
      const safeStage = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
      if (safeStage <= NORMAL_ENDING_STAGE || !archetype) {
        return { damageMultiplier: 1, regenRate: 0 };
      }

      if (archetype.id === "armorWall") {
        const pen = Math.max(0, toFiniteNumber(combatStats?.pen, 0));
        return {
          damageMultiplier: Math.max(0.65, Math.min(1, 0.65 + pen * 0.35)),
          regenRate: 0,
        };
      }

      if (archetype.id === "regenerator") {
        return { damageMultiplier: 1, regenRate: 0.015 };
      }

      if (archetype.id === "phantom") {
        const acc = Math.max(0, toFiniteNumber(combatStats?.acc, 0));
        return {
          damageMultiplier: Math.max(0.75, Math.min(1, 0.75 + acc * 0.25)),
          regenRate: 0,
        };
      }

      if (archetype.id === "berserker") {
        const spd = Math.max(0, toFiniteNumber(combatStats?.spd, 0));
        return {
          damageMultiplier: Math.max(0.8, Math.min(1, 0.8 + Math.max(0, spd - 1) * 0.4)),
          regenRate: 0,
        };
      }

      if (archetype.id === "shadowWraith") {
        const crt = Math.max(0, toFiniteNumber(combatStats?.crt, 0));
        return {
          damageMultiplier: Math.max(0.8, Math.min(1, 0.8 + crt)),
          regenRate: 0,
        };
      }

      return { damageMultiplier: 1, regenRate: 0 };
    }

    function getMonsterMaxHp(stage) {
      const s = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
      const baseHp = Math.floor(100 * Math.pow(1.3, s - 1));
      if (s > NORMAL_ENDING_STAGE) {
        // Infinite Mode Scaling: Additional 10% compounding pressure per stage
        const infiniteStage = s - NORMAL_ENDING_STAGE;
        return Math.floor(baseHp * Math.pow(1.1, infiniteStage));
      }
      return baseHp;
    }

    function getMonsterDefeatReward(stage) {
      const s = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
      const baseReward = Math.floor(25 * Math.pow(s, 1.05));
      if (s > NORMAL_ENDING_STAGE) {
        // Infinite Mode Reward: Grows much slower than HP (2% vs 10%)
        const infiniteStage = s - NORMAL_ENDING_STAGE;
        return Math.floor(baseReward * Math.pow(1.02, infiniteStage));
      }
      return baseReward;
    }

    function getRpgUpgradeLevel(state, key) {
      if (!state?.rpg?.upgrades) return 0;
      return Math.max(0, Math.floor(toFiniteNumber(state.rpg.upgrades[key], 0)));
    }

    function getRpgUpgradeCost(key, level) {
      const l = Math.max(0, Math.floor(toFiniteNumber(level, 0)));
      return Math.floor(50 * Math.pow(1.18, l));
    }

    function getRpgUpgradeEffect(key, level) {
      const l = Math.max(0, Math.floor(toFiniteNumber(level, 0)));
      if (key === "atkLevel") return 1 + l * 0.02;
      if (key === "spdLevel") return 1 + l * 0.01;
      if (key === "penLevel") return Math.min(0.8, l * 0.005);
      return 0;
    }

    function isNormalEndingReached(rpgState) {
      if (!rpgState) return false;
      return (
        rpgState.normalEndingReached === true ||
        Math.max(0, toFiniteNumber(rpgState.highestStage, 0)) >= NORMAL_ENDING_STAGE
      );
    }

    function getRpgModeLabel(rpgState) {
      const stage = Math.max(1, toFiniteNumber(rpgState?.currentStage, 1));
      if (stage > NORMAL_ENDING_STAGE) return "Infinite Mode / Harsher Scaling Active";
      if (isNormalEndingReached(rpgState)) return "Normal Ending Reached";
      return "Normal Arc";
    }

    function getBestWeaponEnhanceLevel(inventory) {
      if (!Array.isArray(inventory)) return 0;
      let maxLvl = 0;
      for (const item of inventory) {
        if (item && item.type === "weapon" && !item.broken) {
          const lvl = Math.max(0, Math.floor(toFiniteNumber(item.enhanceLevel, 0)));
          if (lvl > maxLvl) {
            maxLvl = lvl;
          }
        }
      }
      return maxLvl;
    }

    function getNextReaperMilestone(stage, language = "en") {
      const cleanStage = toFiniteNumber(stage, 0);
      const milestones = [
        { targetStage: 150, labelKo: "철벽 감시자의 관문", labelEn: "Iron Sentinel Gate", isPreview: false },
        { targetStage: 200, labelKo: "미공개 임계점", labelEn: "Locked Threshold", isPreview: true },
        { targetStage: 300, labelKo: "미공개 임계점", labelEn: "Locked Threshold", isPreview: true },
        { targetStage: 500, labelKo: "미공개 임계점", labelEn: "Locked Threshold", isPreview: true },
        { targetStage: 1000, labelKo: "미공개 임계점", labelEn: "Locked Threshold", isPreview: true },
      ];
      if (cleanStage <= 0) {
        return { targetStage: 150, label: language === "ko" ? "철벽 감시자의 관문" : "Iron Sentinel Gate", isPreview: false };
      }
      for (const m of milestones) {
        if (cleanStage < m.targetStage) {
          return {
            targetStage: m.targetStage,
            label: language === "ko" ? m.labelKo : m.labelEn,
            isPreview: m.isPreview
          };
        }
      }
      const last = milestones[milestones.length - 1];
      return {
        targetStage: last.targetStage,
        label: language === "ko" ? last.labelKo : last.labelEn,
        isPreview: true
      };
    }

    function getReaperRunObjective(stage, language = "en") {
      const cleanStage = toFiniteNumber(stage, 0);
      if (cleanStage < 101) {
        return language === "ko" ? "무한 리퍼 모드에 진입하여 생존하십시오." : "Enter Infinite Reaper Mode and survive.";
      }
      if (cleanStage < 150) {
        return language === "ko" ? "Stage 150 Iron Sentinel까지 생존을 유지하십시오." : "Survive until the Stage 150 Iron Sentinel Gate.";
      }
      if (cleanStage === 150) {
        return language === "ko" ? "현재 웨이브를 돌파하십시오. 철벽 감시자가 대기 중입니다." : "Break through the current wave. Iron Sentinel awaits.";
      }
      return language === "ko" ? "극한 구간을 돌파하여 다음 임계점을 확인하십시오." : "Break through the extreme sector and find the next threshold.";
    }

    function getReaperRewardLoopHint(stage, language = "en") {
      const cleanStage = toFiniteNumber(stage, 0);
      if (cleanStage < 101) {
        return {
          line1: language === "ko" ? "정제 파편을 모아 장비를 강화하십시오." : "Gather Refined Shards to enhance your equipment.",
          line2: language === "ko" ? "더 높은 스테이지에서 새로운 위협이 기다립니다." : "New threats await at higher stages.",
        };
      }
      if (cleanStage < 150) {
        return {
          line1: language === "ko" ? "생존 시 정제 파편이 누적됩니다." : "Survival accumulates Refined Shards.",
          line2: language === "ko" ? "파편으로 무기를 강화하고 더 깊은 구간에 진입하십시오." : "Enhance weapons with shards to venture deeper.",
        };
      }
      return {
        line1: language === "ko" ? "고위험 스테이지 생존 시 파편 회수율이 증가합니다." : "Survival on high-risk stages yields more shards.",
        line2: language === "ko" ? "안정제를 확보하여 고위험 벼리 시도를 보호하십시오." : "Acquire stabilizers to protect high-risk forge attempts.",
      };
    }
    window.getNextReaperMilestone = getNextReaperMilestone;
    window.getReaperRunObjective = getReaperRunObjective;
    window.getReaperRewardLoopHint = getReaperRewardLoopHint;

    function getReaperReadinessStatus(state) {
      if (!state) return "PREVIEW_ONLY";
      const normalEndingSeen = state.rpg?.normalEndingSeen === true;
      if (!normalEndingSeen) return "PREVIEW_ONLY";

      const bestWeaponLvl = getBestWeaponEnhanceLevel(state.enhancement?.inventory);
      const totalDps = getRpgCombatStats(state).totalDps;
      const stabilizers = Math.max(0, Math.floor(toFiniteNumber(state.enhancement?.stabilizers, 0)));
      const refinedShards = Math.max(0, Math.floor(toFiniteNumber(state.enhancement?.refinedShards, 0)));
      const squadSize = Array.isArray(state.rpg?.run?.activeUnits) ? state.rpg.run.activeUnits.length : 0;

      const hasStabilizerReadiness = (stabilizers >= 1 || refinedShards >= 50);

      if (squadSize === 0 || bestWeaponLvl < 10 || totalDps < 1e7) {
        return "UNDERPREPARED";
      } else if (bestWeaponLvl < 20 || !hasStabilizerReadiness || totalDps < 1e8) {
        return "EXTREME_RISK";
      } else {
        return "READY";
      }
    }

    function getReaperEntryRecommendation(state) {
      if (!state) return "";
      const lang = state.settings?.language || "en";
      const normalEndingSeen = state.rpg?.normalEndingSeen === true;
      if (!normalEndingSeen) {
        return lang === "ko"
          ? "도로시의 제안을 먼저 확인하십시오."
          : "Acknowledge Dorothy's proposal first.";
      }
      const squadSize = Array.isArray(state.rpg?.run?.activeUnits) ? state.rpg.run.activeUnits.length : 0;
      if (squadSize === 0) {
        return lang === "ko"
          ? "전투 대원을 편성하십시오."
          : "Please form an active squad.";
      }
      const bestWeaponLvl = getBestWeaponEnhanceLevel(state.enhancement?.inventory);
      if (bestWeaponLvl < 20) {
        return lang === "ko"
          ? "+20 이상 무기를 벼려 극한 구간을 대비하십시오."
          : "Forge a +20 or higher weapon to prepare for the extreme zone.";
      }
      const stabilizers = Math.max(0, Math.floor(toFiniteNumber(state.enhancement?.stabilizers, 0)));
      const refinedShards = Math.max(0, Math.floor(toFiniteNumber(state.enhancement?.refinedShards, 0)));
      const hasStabilizerReadiness = (stabilizers >= 1 || refinedShards >= 50);
      if (!hasStabilizerReadiness) {
        return lang === "ko"
          ? "안정제와 파편을 확보한 후 진입하십시오."
          : "Secure stabilizers and shards before entering.";
      }
      return lang === "ko"
        ? "현재 편성으로 101+ 생존 가능. 진입을 권장합니다."
        : "Your current squad is viable for 101+. Entry is recommended.";
    }

    function getTeamBaseAtk(state) {
      if (!state || !state.rpg) return 0;
      const characters = Array.isArray(state.rpg.run?.activeUnits)
        ? state.rpg.run.activeUnits
        : [];
      const inventory = Array.isArray(state.enhancement?.inventory)
        ? state.enhancement.inventory
        : [];

      const ownedCharacterDetails = characters
        .map((character) => {
          const definition = getCharacterDefinition(character.characterId);
          if (!definition) return null;
          const equippedWeapon = getEquippedWeaponForCharacter(
            character,
            inventory,
          );
          const synergyMultiplier = getPreferredWeaponSynergy(
            character,
            inventory,
          );
          const masteryMultiplier = getWeaponMasteryBonus(
            character,
            state.enhancement,
          );
          return {
            ...character,
            definition,
            equippedWeapon,
            synergyMultiplier,
            masteryMultiplier,
          };
        })
        .filter(Boolean);

      const ownedFactionCounts = ownedCharacterDetails.reduce((acc, char) => {
        const faction = char.definition.faction;
        acc[faction] = (acc[faction] || 0) + 1;
        return acc;
      }, {});

      return ownedCharacterDetails.reduce((sum, char) => {
        const levelDps = getCharacterLevelDps(char);
        const weaponDps = char.equippedWeapon
          ? toFiniteNumber(char.equippedWeapon.power, 0)
          : 0;
        const factionMult = getFactionSynergyMultiplier(
          ownedFactionCounts[char.definition.faction] || 0,
        );
        const totalDps =
          (levelDps + weaponDps) *
          char.synergyMultiplier *
          char.masteryMultiplier *
          factionMult;
        return sum + totalDps;
      }, 0);
    }

    function getExternalCapitalSpecializationStats(state) {
      const isUnlocked = state.rpg?.normalEndingSeen === true;
      if (!isUnlocked) {
        return {
          unlocked: false,
          atkBonus: 0, accBonus: 0, spdBonus: 0, penBonus: 0, pressureBreaker: 0,
          realtyBonus: 0, tickerBonus: 0, shadowBonus: 0, luxuryBonus: 0,
          explanation: { re: "Locked", inv: "Locked" }
        };
      }

      // 1. Real Estate Specialization
      const properties = state.landlord?.properties || [];
      const getTierLevel = (ids) => properties.filter(p => ids.includes(p.id) && p.level > 0).length;

      const foundationLvl = getTierLevel([1, 2, 3]); // ATK
      const communityLvl = getTierLevel([4, 5]);    // ACC
      const enterpriseLvl = getTierLevel([6, 7]);    // SPD
      const authorityLvl = getTierLevel([8, 9]);    // PEN
      const frontierLvl = getTierLevel([10]);       // Pressure Breaker

      const reAtkBonus = foundationLvl * 0.02; // max 6%
      const reAccBonus = communityLvl * 0.01; // max 2%
      const reSpdBonus = enterpriseLvl * 0.01; // max 2%
      const rePenBonus = authorityLvl * 1.5;  // max 3 (flat PEN)
      const rePressure = frontierLvl * 0.05; // max 5% DMG bonus vs 101+

      // 2. Investment Specialization
      const holdings = state.investment?.holdings || [];
      const getCostBasis = (id) => {
        const h = holdings.find(h => h.assetId === id);
        return h ? toFiniteNumber(h.buyPrice, 0) * toFiniteNumber(h.quantity, 0) : 0;
      };

      const growthBasis = getCostBasis("growth-stock");
      const memeBasis = getCostBasis("meme-coin");
      const netWorth = toFiniteNumber(state.wallet?.cash, 0) + toFiniteNumber(state.investment?.capital, 0);

      // Faction Bridges
      // Realty: Property Diversity (Unique owned count)
      const uniqueProperties = properties.filter(p => p.level > 0).length;
      const realtyBonus = Math.min(0.1, uniqueProperties * 0.01);

      // Ticker: Growth Portfolio Value (Ticker-like exposure)
      const tickerBonus = Math.min(0.1, Math.max(0, Math.log10(growthBasis / 1000000 + 1) * 0.02));

      // Shadow: High-Risk (Meme)
      const shadowBonus = Math.min(0.1, Math.max(0, Math.log10(memeBasis / 1000000 + 1) * 0.02));

      // Luxury: Absolute Wealth
      const luxuryBonus = Math.min(0.1, Math.max(0, Math.log10(netWorth / 1000000000 + 1) * 0.02));

      return {
        unlocked: true,
        atkBonus: reAtkBonus,
        accBonus: reAccBonus,
        spdBonus: reSpdBonus,
        penBonus: rePenBonus,
        pressureBreaker: rePressure,
        realtyBonus,
        tickerBonus,
        shadowBonus,
        luxuryBonus,
        explanation: {
          re: `ATK +${(reAtkBonus * 100).toFixed(0)}%, ACC +${(reAccBonus * 100).toFixed(0)}%, SPD +${(reSpdBonus * 100).toFixed(0)}%, PEN +${rePenBonus.toFixed(0)}, PB +${(rePressure * 100).toFixed(0)}%`,
          inv: `RE +${(realtyBonus * 100).toFixed(0)}%, TK +${(tickerBonus * 100).toFixed(0)}%, SH +${(shadowBonus * 100).toFixed(0)}%, LX +${(luxuryBonus * 100).toFixed(0)}%`
        }
      };
    }

    function getExternalCapitalLeverageStats(state) {
      const isUnlocked = state.rpg?.normalEndingSeen === true;

      // 1. ATK Bonus from Total Wealth (Capped at 50%)
      // Logarithmic scaling rewards growth across many orders of magnitude.
      const cash = toFiniteNumber(state.wallet?.cash, 0);
      const capital = toFiniteNumber(state.investment?.capital, 0);
      const multiplier = toFiniteNumber(state.landlord?.multiplier, 1);
      const wealthProxy = cash + capital + (multiplier * 1000000);
      const atkBonus = isUnlocked ? Math.min(0.5, Math.max(0, Math.log10(wealthProxy / 100000 + 1) * 0.05)) : 0;

      // 2. SPD Bonus from Investment Liquidity (Uninvested Capital) (Capped at 25%)
      // This creates a tactical trade-off: hold liquid capital for SPD, or invest for CRT.
      const spdBonus = isUnlocked ? Math.min(0.25, Math.max(0, Math.log10(capital / 1000000 + 1) * 0.05)) : 0;

      // 3. PEN Bonus from Rebirth Authority (Capped at 50)
      // Flat additive bonus representing metaphysical progression authority.
      const rebirthCount = toFiniteNumber(state.landlord?.rebirthCount, 0);
      const penBonus = isUnlocked ? Math.min(50, rebirthCount * 2) : 0;

      // 4. CRT Bonus from Investment Portfolio Risk (Cost Basis) (Capped at 15%)
      // Rewards active market participation and risk-taking.
      const holdings = state.investment?.holdings || [];
      const portfolioCostBasis = holdings.reduce((sum, h) => sum + (toFiniteNumber(h.buyPrice, 0) * toFiniteNumber(h.quantity, 0)), 0);
      const crtBonus = isUnlocked ? Math.min(0.15, Math.max(0, Math.log10(portfolioCostBasis / 1000000 + 1) * 0.02)) : 0;

      return {
        unlocked: isUnlocked,
        atkBonus,
        spdBonus,
        penBonus,
        crtBonus,
        explanation: {
          atk: isUnlocked ? `+${(atkBonus * 100).toFixed(1)}%` : "Locked",
          spd: isUnlocked ? `+${(spdBonus * 100).toFixed(1)}%` : "Locked",
          pen: isUnlocked ? `+${penBonus.toFixed(0)}` : "Locked",
          crt: isUnlocked ? `+${(crtBonus * 100).toFixed(1)}%` : "Locked"
        }
      };
    }

    // L-2: Pure helper — reads mods[0].statBonus safely, returns zero-object if empty
    function getWeaponModBonus(weapon) {
      const ZERO_BONUS = { atk: 0, pen: 0, acc: 0, crt: 0, spd: 0 };
      if (!weapon) return ZERO_BONUS;
      const mods = Array.isArray(weapon.mods) ? weapon.mods : [];
      if (mods.length === 0) return ZERO_BONUS;
      const raw = mods[0]?.statBonus;
      if (!raw || typeof raw !== "object") return ZERO_BONUS;
      return {
        atk: isFinite(raw.atk) ? Number(raw.atk) : 0,
        pen: isFinite(raw.pen) ? Number(raw.pen) : 0,
        acc: isFinite(raw.acc) ? Number(raw.acc) : 0,
        crt: isFinite(raw.crt) ? Number(raw.crt) : 0,
        spd: isFinite(raw.spd) ? Number(raw.spd) : 0,
      };
    }

    function getRpgCombatStats(state) {
      const baseAtk = getTeamBaseAtk(state);
      const atkLevel = getRpgUpgradeLevel(state, "atkLevel");
      const spdLevel = getRpgUpgradeLevel(state, "spdLevel");
      const penLevel = getRpgUpgradeLevel(state, "penLevel");

      const atkMult = getRpgUpgradeEffect("atkLevel", atkLevel);
      const spdMult = getRpgUpgradeEffect("spdLevel", spdLevel);
      const penEffect = getRpgUpgradeEffect("penLevel", penLevel);

      // Phase G-1 & G-3: External Capital Leverage & Specialization
      const leverage = getExternalCapitalLeverageStats(state);
      const specialization = getExternalCapitalSpecializationStats(state);

      // Future-ready derived stats
      const accBase = 0.95;
      const crtBase = 0.05;

      // Small bonus for Legendary/Mythic characters
      const characters = state.rpg?.run?.activeUnits || [];
      const highTierCount = characters.filter((c) => {
        const def = getCharacterDefinition(c.characterId);
        return (
          def && (def.rarity === "legendary" || def.rarity === "mythic")
        );
      }).length;
      const charCrtBonus = Math.min(0.1, highTierCount * 0.01);

      // Faction-specific specialization bonuses (scaled by faction presence)
      const factionCounts = characters.reduce((acc, c) => {
        const def = getCharacterDefinition(c.characterId);
        if (def) acc[def.faction] = (acc[def.faction] || 0) + 1;
        return acc;
      }, {});

      const factionBonus = (
        (factionCounts.realty || 0) * specialization.realtyBonus +
        (factionCounts.ticker || 0) * specialization.tickerBonus +
        (factionCounts.shadow || 0) * specialization.shadowBonus +
        (factionCounts.luxury || 0) * specialization.luxuryBonus
      ) / Math.max(1, characters.length);

      const totalAtkMult = atkMult * (1 + leverage.atkBonus + specialization.atkBonus + factionBonus);
      const totalSpdMult = spdMult * (1 + leverage.spdBonus + specialization.spdBonus);
      const totalCrt = crtBase + charCrtBonus + leverage.crtBonus;
      const totalPen = penEffect + (leverage.penBonus + specialization.penBonus) * 0.01;
      const totalAcc = accBase + specialization.accBonus;

      // L-2: Additive weapon mod bonuses — aggregated across all equipped weapons in squad
      // Pure read: getWeaponModBonus never mutates state
      const inventory = Array.isArray(state.enhancement?.inventory) ? state.enhancement.inventory : [];
      const modBonusTotals = characters.reduce((totals, unit) => {
        const weapon = getEquippedWeaponForCharacter(unit, inventory);
        const bonus = getWeaponModBonus(weapon);
        return {
          pen: totals.pen + (isFinite(bonus.pen) ? bonus.pen : 0),
          crt: totals.crt + (isFinite(bonus.crt) ? bonus.crt : 0),
          spd: totals.spd + (isFinite(bonus.spd) ? bonus.spd : 0),
        };
      }, { pen: 0, crt: 0, spd: 0 });
      // Average across squad size so a single modded weapon doesn't dominate a 5-unit squad
      const squadSize = Math.max(1, characters.length);
      const modPen = modBonusTotals.pen / squadSize;
      const modCrt = modBonusTotals.crt / squadSize;
      const modSpd = modBonusTotals.spd / squadSize;

      // Pressure Breaker: DMG bonus applied against Stage 101+ enemies
      const currentStage = toFiniteNumber(state.rpg?.currentStage, 1);
      const pressureMult = (currentStage > 100) ? (1 + specialization.pressureBreaker) : 1;

      return {
        atk: baseAtk * totalAtkMult * pressureMult,
        spd: totalSpdMult + (isFinite(modSpd) ? modSpd : 0),
        pen: totalPen + (isFinite(modPen) ? modPen : 0),
        acc: totalAcc,
        crt: totalCrt + (isFinite(modCrt) ? modCrt : 0),
        totalDps: baseAtk * totalAtkMult * (totalSpdMult + (isFinite(modSpd) ? modSpd : 0)) * pressureMult,
      };
    }

    function getTotalTeamDps(state) {
      return getRpgCombatStats(state).totalDps;
    }

    function applyCombatTick(state, deltaSeconds) {
      if (state.rpg?.run?.isActive !== true) return state;
      const combatStats = getRpgCombatStats(state);
      const dps = combatStats.totalDps;
      const currentStage = Math.max(
        1,
        toFiniteNumber(state.rpg.currentStage, 1),
      );
      const archetype = getInfiniteMonsterArchetype(currentStage);
      const bossMilestone = getInfiniteBossMilestone(currentStage);
      const reaperProfile = getInfiniteReaperProfile(currentStage);
      const modifier = getInfiniteArchetypeCombatModifier(archetype, combatStats, currentStage);
      const bossModifier = getInfiniteBossCombatModifier(bossMilestone, combatStats, currentStage);
      const reaperModifier = getInfiniteReaperCombatModifier(reaperProfile, combatStats, currentStage);
      const archetypeMultiplier = toFiniteNumber(modifier.damageMultiplier, 1);
      const bossDamageMultiplier = toFiniteNumber(bossModifier.damageMultiplier, 1);
      const reaperDamageMultiplier = toFiniteNumber(reaperModifier.damageMultiplier, 1);

      let baseDamageMultiplier = archetypeMultiplier * bossDamageMultiplier * reaperDamageMultiplier;
      if (currentStage >= 101) {
        const intensityTier = Math.floor((currentStage - 100) / 10) + 1;
        const damageCompressionModifier = Math.max(0.45, 1 - intensityTier * 0.025);
        baseDamageMultiplier *= damageCompressionModifier;
      }
      const damageMultiplier = Math.max(0.45, Math.min(1, baseDamageMultiplier));
      const damage = Math.max(0, toFiniteNumber(dps * deltaSeconds * damageMultiplier, 0));
      if (damage <= 0) return state;

      const currentHp = toFiniteNumber(state.rpg.monsterHp, 0);
      const currentMaxHp = Math.max(1, toFiniteNumber(state.rpg.monsterMaxHp, getMonsterMaxHp(currentStage)));
      const damagedHp = Math.max(0, currentHp - damage);
      const regen = damagedHp > 0
        ? currentMaxHp * modifier.regenRate * Math.max(0, toFiniteNumber(deltaSeconds, 0))
        : 0;
      const nextHp = Math.min(currentMaxHp, damagedHp + regen);

      if (nextHp <= 0) {
        const nextDefeated =
          toFiniteNumber(state.rpg.defeatedMonsters, 0) + 1;
        const currentStageKills = toFiniteNumber(state.rpg.stageKills, 0);
        const killsRequired = getKillsRequiredForStage(currentStage);

        let nextStage = currentStage;
        let nextStageKills = currentStageKills + 1;
        let nextHighestStage = toFiniteNumber(state.rpg.highestStage, 0);

        if (nextStageKills >= killsRequired) {
          nextStage = currentStage + 1;
          nextStageKills = 0;
          nextHighestStage = Math.max(nextHighestStage, nextStage);
        }

        const maxHp = getMonsterMaxHp(nextStage);
        const reward = getMonsterDefeatReward(currentStage);
        const reachedNormalEnding =
          state.rpg.normalEndingReached === true ||
          nextHighestStage >= NORMAL_ENDING_STAGE;

        return {
          ...state,
          rpg: {
            ...state.rpg,
            currentStage: nextStage,
            highestStage: nextHighestStage,
            stageKills: nextStageKills,
            monsterHp: maxHp,
            monsterMaxHp: maxHp,
            defeatedMonsters: nextDefeated,
            dividends: toFiniteNumber(state.rpg.dividends, 0) + reward,
            lastRpgReward: reward,
            normalEndingReached: reachedNormalEnding,
            run: {
              ...state.rpg.run,
              stage: nextStage,
              wave: nextDefeated,
            },
          },
        };
      }

      return {
        ...state,
        rpg: {
          ...state.rpg,
          monsterHp: nextHp,
          run: {
            ...state.rpg.run,
            stage: Math.max(1, toFiniteNumber(state.rpg.run?.stage, state.rpg.currentStage)),
            wave: Math.max(0, toFiniteNumber(state.rpg.run?.wave, state.rpg.defeatedMonsters)),
          },
        },
      };
    }

    function normalizeGameState(state, language = "en") {
      const defaults = createDefaultGameState(language);
      const landlord = state?.landlord || {};
      const savedProperties = Array.isArray(landlord.properties)
        ? landlord.properties
        : [];
      const investment = state?.investment || {};
      const savedHoldings = Array.isArray(investment.holdings)
        ? investment.holdings
        : [];
      const enhancement = state?.enhancement || {};
      const savedInventory = Array.isArray(enhancement.inventory)
        ? enhancement.inventory
        : [];
      const normalizedInventory = ensureUniqueGachaInstanceIds(
        savedInventory
          .map((item, index) => normalizeInventoryItem(item, index))
          .filter(Boolean),
      );
      const normalizedRecentPulls = ensureUniqueGachaInstanceIds(
        normalizeRecentPulls(enhancement.recentPulls),
      );
      const rpg = state?.rpg || {};
      const savedCharacters = Array.isArray(rpg.characters)
        ? rpg.characters
        : [];
      const normalizedCharacters = ensureUniqueCharacterInstanceIds(
        savedCharacters
          .map((character, index) =>
            normalizeOwnedCharacter(character, index),
          )
          .filter(Boolean),
      );
      const equippedNormalizedCharacters = normalizeEquippedCharacterWeapons(
        normalizedCharacters,
        normalizedInventory,
      );
      const normalizedUnlockedCharacterIds = Array.from(
        new Set([
          ...(Array.isArray(rpg.unlockedCharacterIds)
            ? rpg.unlockedCharacterIds.filter((id) => getCharacterDefinition(id))
            : []),
          ...equippedNormalizedCharacters.map((character) => character.characterId),
        ]),
      );
      const normalizedWeaponLevels = normalizedInventory.reduce((levels, item) => {
        if (item.type !== "weapon") return levels;
        const weaponType = getWeaponType(item);
        if (!weaponType) return levels;
        const currentLevel = Math.max(
          0,
          Math.floor(toFiniteNumber(item.enhanceLevel, 0)),
        );
        levels[weaponType] = Math.max(
          Math.floor(toFiniteNumber(levels[weaponType], 0)),
          currentLevel,
        );
        return levels;
      }, { ...(enhancement.weaponLevels || {}) });
      const normalizedWeaponMastery = Object.keys(normalizedWeaponLevels).reduce(
        (mastery, weaponType) => {
          mastery[weaponType] = Math.min(
            2,
            1 + Math.max(0, toFiniteNumber(normalizedWeaponLevels[weaponType], 0)) * 0.05,
          );
          return mastery;
        },
        { ...(enhancement.weaponMastery || {}) },
      );
      const run = rpg.run || {};
      const savedActiveUnits = Array.isArray(run.activeUnits) ? run.activeUnits : [];
      const normalizedRunUnits = ensureUniqueCharacterInstanceIds(
        savedActiveUnits
          .map((character, index) => normalizeOwnedCharacter(character, index))
          .filter(Boolean),
      );
      const normalizedRunHistory = Array.isArray(run.resultHistory)
        ? run.resultHistory
          .filter(
            (entry) =>
              entry &&
              typeof entry.id === "string" &&
              typeof entry.result === "string",
          )
          .slice(-10)
        : [];

      const meta = state?.meta || {};

      return {
        ...defaults,
        ...state,
        version: GAME_STATE_VERSION,
        meta: {
          ...defaults.meta,
          ...meta,
          gameOver: meta.gameOver && typeof meta.gameOver === 'object'
            ? {
              reason: String(meta.gameOver.reason || "unknown"),
              contractName: String(meta.gameOver.contractName || "Unknown"),
              stake: toFiniteNumber(meta.gameOver.stake, 0),
              odds: toFiniteNumber(meta.gameOver.odds, 0),
              timestamp: toFiniteNumber(meta.gameOver.timestamp, Date.now()),
            }
            : null,
        },
        wallet: {
          ...defaults.wallet,
          ...(state?.wallet || {}),
          cash: Math.max(0, toFiniteNumber(state?.wallet?.cash, 0)),
          blackMarketTokens: Math.max(0, Math.floor(toFiniteNumber(state?.wallet?.blackMarketTokens, 0))),
        },
        landlord: {
          ...defaults.landlord,
          ...landlord,
          properties: defaults.landlord.properties.map((property) => {
            const savedProperty = savedProperties.find(
              (item) => item.id === property.id,
            );
            return {
              id: property.id,
              count: toFiniteNumber(savedProperty?.count, 0),
            };
          }),
          rebirthCount: toFiniteNumber(landlord.rebirthCount, 0),
          multiplier: toFiniteNumber(landlord.multiplier, 1),
          totalEarned: toFiniteNumber(landlord.totalEarned, 0),
          clickPower: toFiniteNumber(landlord.clickPower, 10),
          clickUpgradeCost: toFiniteNumber(landlord.clickUpgradeCost, 50),
        },
        investment: {
          ...defaults.investment,
          ...investment,
          capital: Math.max(0, toFiniteNumber(investment.capital, 0)),
          supportGrantClaimed: investment.supportGrantClaimed === true,
          holdings: defaults.investment.holdings.map((holding) => {
            const savedHolding = savedHoldings.find(
              (item) => item.id === holding.id,
            );
            const asset = INVESTMENT_ASSETS.find(
              (item) => item.id === holding.id,
            );
            return {
              id: holding.id,
              name: asset.name,
              type: asset.type,
              price: clampNumber(
                savedHolding?.price,
                Math.max(1, asset.price * 0.5),
                asset.price * 2,
                asset.price,
              ),
              volatility: asset.volatility,
              owned: toOwnedQuantity(savedHolding?.owned),
              avgBuyPrice: toSafePrice(
                savedHolding?.avgBuyPrice,
                savedHolding?.price || asset.price,
              ),
              history: normalizePriceHistory(
                savedHolding?.history,
                savedHolding?.price || asset.price,
              ),
            };
          }),
          betSlip: {
            selectedContractId:
              typeof investment.betSlip?.selectedContractId === "string"
                ? investment.betSlip.selectedContractId
                : null,
            stake: Math.max(0, toFiniteNumber(investment.betSlip?.stake, 0)),
          },
          contractHistory: Array.isArray(investment.contractHistory)
            ? investment.contractHistory
              .filter(
                (e) =>
                  e &&
                  typeof e.id === "string" &&
                  typeof e.contractId === "string" &&
                  typeof e.contractName === "string" &&

    function migrateLegacyStateIfNeeded(language = "en") {
      const legacyRaw = localStorage.getItem(LEGACY_LANDLORD_STORAGE_KEY);
      if (!legacyRaw) return null;

      try {
        const legacy = JSON.parse(legacyRaw);
        const migrated = createDefaultGameState(language);
        const legacyProperties = Array.isArray(legacy.properties)
          ? legacy.properties
          : [];

        migrated.wallet.cash = toFiniteNumber(legacy.money, 0);
        migrated.landlord.properties = migrated.landlord.properties.map(
          (property) => {
            const savedProperty = legacyProperties.find(
              (item) => item.id === property.id,
            );
            return {
              id: property.id,
              count: toFiniteNumber(savedProperty?.count, 0),
            };
          },
        );
        migrated.landlord.rebirthCount = toFiniteNumber(
          legacy.rebirthCount,
          0,
        );
        migrated.landlord.multiplier = toFiniteNumber(legacy.multiplier, 1);
        migrated.landlord.totalEarned = toFiniteNumber(
          legacy.totalEarned,
          0,
        );
        migrated.landlord.clickPower = toFiniteNumber(legacy.clickPower, 10);
        migrated.landlord.clickUpgradeCost = toFiniteNumber(
          legacy.clickUpgradeCost,
          50,
        );

        saveGameState(migrated);
        localStorage.removeItem(LEGACY_LANDLORD_STORAGE_KEY);
        return migrated;
      } catch (error) {
        console.warn("Unable to migrate legacy Idle Landlord state.", error);
        return null;
      }
    }

    function loadGameState(language = "en") {
      const savedRaw = localStorage.getItem(GAME_STATE_STORAGE_KEY);

      if (savedRaw) {
        try {
          const normalizedState = normalizeGameState(
            JSON.parse(savedRaw),
            language,
          );
          localStorage.removeItem(LEGACY_LANDLORD_STORAGE_KEY);
          return normalizedState;
        } catch (error) {
          console.warn("Unable to load saved Money Game state.", error);
        }
      }

      return (
        migrateLegacyStateIfNeeded(language) || createDefaultGameState(language)
      );
    }

    function saveGameState(state) {
      const stateToSave = {
        ...state,
        version: GAME_STATE_VERSION,
        settings: {
          ...state.settings,
          lastSavedAt: new Date().toISOString(),
        },
      };
      localStorage.setItem(
        GAME_STATE_STORAGE_KEY,
        JSON.stringify(stateToSave),
      );
    }

    const getWarStatusIndicators = (state, language) => {
      const currentStage = state.rpg?.currentStage || 1;
      const cash = state.wallet?.cash || 0;
      const propertiesCount = Object.keys(state.landlord?.properties || {}).length;
      const rebirths = state.landlord?.rebirthCount || 0;
      const isKo = language === "ko";

      // Frontline Stability
      let stability = isKo ? "안정" : "SECURE";
      let stabilityColor = "text-emerald-400 font-bold";
      if (currentStage > 100) {
        stability = isKo ? "치명적 붕괴" : "CRITICAL COLLAPSE";
        stabilityColor = "text-red-500 animate-pulse font-black";
      } else if (currentStage > 50) {
        stability = isKo ? "경보 (워프 전)" : "UNSTABLE PRE-WARP";
        stabilityColor = "text-amber-500 font-bold";
      } else if (currentStage > 10) {
        stability = isKo ? "교전 진행 중" : "ENGAGED";
        stabilityColor = "text-yellow-400 font-bold";
      }

      // Logistics Status
      let logistics = isKo ? "보급 부족 경보" : "CRITICAL DEPLETION";
      let logisticsColor = "text-red-400 animate-pulse font-bold";
      if (cash > 100000000) {
        logistics = isKo ? "과잉 보급" : "SURPLUS OVERLOAD";
        logisticsColor = "text-emerald-400 font-black";
      } else if (cash > 1000000) {
        logistics = isKo ? "예비물자 충분" : "STABLE RESERVES";
        logisticsColor = "text-green-400 font-bold";
      } else if (cash > 10000) {
        logistics = isKo ? "한계 공급" : "MARGINAL SUPPLY";
        logisticsColor = "text-yellow-400 font-bold";
      }

      // Command Prestige
      const prestigeLevel = 1 + rebirths + Math.floor(propertiesCount / 2);
      let prestigeLabel = isKo ? "후방 지휘관" : "REAR ADMIRAL";
      if (prestigeLevel > 15) {
        prestigeLabel = isKo ? "최고 사령관" : "SUPREME CHIEF";
      } else if (prestigeLevel > 8) {
        prestigeLabel = isKo ? "전선 사령관" : "FLEET COMMANDER";
      } else if (prestigeLevel > 3) {
        prestigeLabel = isKo ? "지상 여단장" : "FRONT BRIGADIER";
      }

      // Threat Level
      let threat = isKo ? "1등급 (경미)" : "TIER I (MINIMAL)";
      let threatColor = "text-gray-400 font-bold";
      if (currentStage > 150) {
        threat = isKo ? "5등급 (리퍼)" : "TIER V (REAPER)";
        threatColor = "text-red-600 font-black animate-ping";
      } else if (currentStage > 100) {
        threat = isKo ? "4등급 (위험)" : "TIER IV (HAZARD)";
        threatColor = "text-red-500 font-black animate-pulse";
      } else if (currentStage > 50) {
        threat = isKo ? "3등급 (심각)" : "TIER III (HIGH)";
        threatColor = "text-orange-500 font-bold";
      } else if (currentStage > 10) {
        threat = isKo ? "2등급 (주의)" : "TIER II (ELEVATED)";
        threatColor = "text-amber-400 font-bold";
      }

      return {
        stability,
        stabilityColor,
        logistics,
        logisticsColor,
        prestigeLabel,
        prestigeLevel,
        threat,
        threatColor
      };
    };
