<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Play Idle Landlord, the ultimate real estate tycoon clicker game. Earn money, invest in properties, and build your empire. 건물주 키우기 게임 플레이!"
    />
    <title>
      Idle Landlord - Clicker Tycoon Game | 건물주 키우기 방치형 게임
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6423816528159440"
      crossorigin="anonymous"
    ></script>

    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f3f4f6;
      }
      .click-effect {
        position: fixed;
        font-weight: bold;
        font-size: 1.5rem;
        color: #16a34a;
        pointer-events: none;
        animation: floatUp 0.8s ease-out forwards;
        z-index: 50;
      }
      @keyframes floatUp {
        0% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translateY(-50px) scale(1.2);
          opacity: 0;
        }
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 10px;
      }
      .rebirth-animate {
        animation: pulse-gold 2s infinite;
      }
      @keyframes pulse-gold {
        0% {
          box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7);
        }
        70% {
          box-shadow: 0 0 0 15px rgba(234, 179, 8, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(234, 179, 8, 0);
        }
      }
    </style>
  </head>
  <body class="flex flex-col items-center min-h-screen">
    <div id="root" class="w-full max-w-md w-full my-4"></div>

    <article
      id="seo-article"
      class="w-full max-w-4xl bg-white p-8 mt-8 shadow-md rounded-lg mb-20 text-gray-700 leading-relaxed border-t-4 border-green-500"
    ></article>

    <script type="text/babel">
      const { useState, useEffect } = React;

      const REBIRTH_REQUIREMENT = 1000000; // 환생에 필요한 금액 ($1M)

      const TRANSLATIONS = {
        ko: {
          title: "💸 건물주 키우기",
          rebirth: "환생",
          rebirthDesc: "$1M 달성 시 가능",
          rebirthSuccess: "환생 성공! 수익 배율이 증가했습니다.",
          rebirthConfirm:
            "환생하시겠습니까? 모든 건물과 돈이 초기화되지만 영구 배율이 증가합니다.",
          multiplier: "수익 배율",
          sec: "초",
          click: "클릭",
          tapToEarn: "터치해서 돈 벌기!",
          investments: "투자 (상점)",
          mousePower: "마우스 강화",
          lv: "레벨",
          format: "ko-KR",
          currency: "KRW",
        },
        en: {
          title: "💸 Idle Landlord",
          rebirth: "Rebirth",
          rebirthDesc: "Need $1M to Rebirth",
          rebirthSuccess: "Rebirth Successful! Permanent Multiplier Increased.",
          rebirthConfirm:
            "Do you want to rebirth? All cash and properties will reset, but you gain a permanent multiplier.",
          multiplier: "Multiplier",
          sec: "sec",
          click: "click",
          tapToEarn: "Tap to Earn!",
          investments: "Investments",
          mousePower: "Mouse Power",
          lv: "Lv",
          format: "en-US",
          currency: "USD",
        },
      };

      const INITIAL_PROPERTIES = [
        {
          id: 1,
          name: "Hotdog Stand",
          baseCost: 100,
          baseIncome: 5,
          icon: "🌭",
        },
        {
          id: 2,
          name: "Convenience Store",
          baseCost: 1500,
          baseIncome: 60,
          icon: "🏪",
        },
        {
          id: 3,
          name: "Coffee Franchise",
          baseCost: 12000,
          baseIncome: 400,
          icon: "☕",
        },
        {
          id: 4,
          name: "Luxury Apartment",
          baseCost: 100000,
          baseIncome: 3000,
          icon: "🏢",
        },
        {
          id: 5,
          name: "Skyscraper",
          baseCost: 1000000,
          baseIncome: 35000,
          icon: "🏙️",
        },
      ];

      function GameApp() {
        const browserLang = navigator.language.startsWith("ko") ? "ko" : "en";
        const t = TRANSLATIONS[browserLang];

        // 데이터 로드
        const saved =
          JSON.parse(localStorage.getItem("idleLandlordSaveV3")) || {};

        const [money, setMoney] = useState(saved.money || 0);
        const [clickPower, setClickPower] = useState(saved.clickPower || 10);
        const [clickUpgradeCost, setClickUpgradeCost] = useState(
          saved.clickUpgradeCost || 50,
        );
        const [properties, setProperties] = useState(
          saved.properties ||
            INITIAL_PROPERTIES.map((p) => ({ ...p, count: 0 })),
        );
        const [rebirthCount, setRebirthCount] = useState(
          saved.rebirthCount || 0,
        );
        const [multiplier, setMultiplier] = useState(saved.multiplier || 1);
        const [clicks, setClicks] = useState([]);

        const incomePerSec =
          properties.reduce(
            (total, prop) => total + prop.baseIncome * prop.count,
            0,
          ) * multiplier;

        // 자동 저장
        useEffect(() => {
          const saveData = {
            money,
            clickPower,
            clickUpgradeCost,
            properties,
            rebirthCount,
            multiplier,
          };
          localStorage.setItem("idleLandlordSaveV3", JSON.stringify(saveData));
        }, [
          money,
          clickPower,
          clickUpgradeCost,
          properties,
          rebirthCount,
          multiplier,
        ]);

        // 수익 루프
        useEffect(() => {
          const timer = setInterval(() => {
            if (incomePerSec > 0) setMoney((prev) => prev + incomePerSec);
          }, 1000);
          return () => clearInterval(timer);
        }, [incomePerSec]);

        const handleMainClick = (e) => {
          const gain = clickPower * multiplier;
          setMoney((prev) => prev + gain);
          const rect = e.currentTarget.getBoundingClientRect();
          const newClick = {
            id: Date.now(),
            x: e.clientX || rect.left + rect.width / 2,
            y: e.clientY || rect.top + rect.height / 2,
            val: gain,
          };
          setClicks((prev) => [...prev, newClick]);
          setTimeout(
            () => setClicks((prev) => prev.filter((c) => c.id !== newClick.id)),
            800,
          );
        };

        const performRebirth = () => {
          if (money >= REBIRTH_REQUIREMENT && confirm(t.rebirthConfirm)) {
            setMoney(0);
            setClickPower(10);
            setClickUpgradeCost(50);
            setProperties(INITIAL_PROPERTIES.map((p) => ({ ...p, count: 0 })));
            setRebirthCount((prev) => prev + 1);
            setMultiplier((prev) => prev + 1); // 환생할 때마다 배수 +1 (1배->2배->3배...)
            alert(t.rebirthSuccess);
          }
        };

        const buyProperty = (id) => {
          const idx = properties.findIndex((p) => p.id === id);
          const cost = Math.floor(
            properties[idx].baseCost * Math.pow(1.15, properties[idx].count),
          );
          if (money >= cost) {
            setMoney((prev) => prev - cost);
            const next = [...properties];
            next[idx].count += 1;
            setProperties(next);
          }
        };

        const formatMoney = (val) =>
          new Intl.NumberFormat(t.format, {
            style: "currency",
            currency: t.currency,
            maximumFractionDigits: 0,
          }).format(val);

        return (
          <div className="w-full flex flex-col items-center">
            <div className="w-full bg-white shadow-sm p-4 flex justify-between items-center rounded-lg mb-4 border-b-2 border-green-200">
              <div>
                <h1 className="text-xl font-black text-green-600">{t.title}</h1>
                <p className="text-xs text-gray-400">
                  {t.multiplier}: x{multiplier}
                </p>
              </div>
              <button
                onClick={performRebirth}
                className={`px-4 py-2 rounded-full font-bold text-sm transition-all ${money >= REBIRTH_REQUIREMENT ? "bg-yellow-400 text-yellow-900 rebirth-animate shadow-lg" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
              >
                {t.rebirth} {rebirthCount > 0 && `(${rebirthCount})`}
              </button>
            </div>

            <div className="w-full bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-100 flex flex-col h-[650px]">
              <div className="bg-gradient-to-r from-green-500 to-emerald-600 text-white p-6 text-center">
                <div className="text-4xl font-extrabold mb-1">
                  {formatMoney(money)}
                </div>
                <div className="text-green-100 text-sm font-medium">
                  +{formatMoney(incomePerSec)}/{t.sec}
                </div>
              </div>

              <div
                className="h-64 flex items-center justify-center relative cursor-pointer select-none bg-green-50"
                onClick={handleMainClick}
              >
                <div className="text-8xl hover:scale-110 active:scale-90 transition-transform">
                  💰
                </div>
                {clicks.map((c) => (
                  <div
                    key={c.id}
                    className="click-effect"
                    style={{ left: c.x - 20, top: c.y - 40 }}
                  >
                    +{formatMoney(c.val)}
                  </div>
                ))}
              </div>

              <div className="bg-gray-50 flex-grow overflow-y-auto p-4 custom-scrollbar">
                <h2 className="text-xs font-bold mb-3 text-gray-400 uppercase tracking-widest">
                  {t.investments}
                </h2>

                <button
                  onClick={() => {
                    if (money >= clickUpgradeCost) {
                      setMoney((m) => m - clickUpgradeCost);
                      setClickPower((p) => p + 10);
                      setClickUpgradeCost((c) => Math.floor(c * 1.5));
                    }
                  }}
                  disabled={money < clickUpgradeCost}
                  className={`w-full flex justify-between items-center p-4 mb-3 rounded-xl border transition-all ${money >= clickUpgradeCost ? "bg-white border-green-300 shadow-sm" : "bg-gray-100 opacity-50"}`}
                >
                  <div className="text-left">
                    <div className="font-bold">{t.mousePower}</div>
                    <div className="text-xs text-gray-500">
                      +{formatMoney(10 * multiplier)}/{t.click}
                    </div>
                  </div>
                  <div className="font-black text-green-600">
                    {formatMoney(clickUpgradeCost)}
                  </div>
                </button>

                {properties.map((p) => {
                  const cost = Math.floor(p.baseCost * Math.pow(1.15, p.count));
                  return (
                    <button
                      key={p.id}
                      onClick={() => buyProperty(p.id)}
                      disabled={money < cost}
                      className={`w-full flex justify-between items-center p-4 mb-3 rounded-xl border transition-all ${money >= cost ? "bg-white border-blue-200 shadow-sm" : "bg-gray-100 opacity-50"}`}
                    >
                      <div className="flex items-center gap-3">
                        <span className="text-2xl">{p.icon}</span>
                        <div className="text-left">
                          <div className="font-bold">
                            {p.name}{" "}
                            <span className="text-blue-500 text-xs">
                              {t.lv}.{p.count}
                            </span>
                          </div>
                          <div className="text-xs text-gray-500">
                            +{formatMoney(p.baseIncome * multiplier)}/{t.sec}
                          </div>
                        </div>
                      </div>
                      <div className="font-black text-blue-600">
                        {formatMoney(cost)}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<GameApp />);

      // SEO 텍스트 보충 (심사용)
      document.getElementById("seo-article").innerHTML = `
            <h2 class="text-2xl font-bold mb-4 border-b pb-2">Idle Landlord Strategy Guide & Rebirth System</h2>
            <p class="mb-4">환생 시스템이 추가되었습니다! $1,000,000를 모아 환생하면 영구적인 수익 배수를 얻을 수 있습니다. 이는 나중에 추가될 '강화하기 게임'과의 연동을 위한 핵심 데이터가 될 것입니다.</p>
            <h3 class="text-lg font-semibold mt-4">1. 환생(Rebirth) 가이드</h3>
            <p>환생을 하면 수익 배율이 x1, x2, x3... 로 증가하며, 더 빠르게 부를 축적할 수 있습니다. 이는 고가치 유저들이 게임에 계속 머무르게 하는 핵심 요소입니다.</p>
        `;
    </script>
  </body>
</html>
