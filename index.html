      // Defense Contract preview helpers ??derived-only, no state mutation
      function getDefenseContractRiskTier(asset) {
        const vol = toFiniteNumber(asset.volatility, 0.05);
        if (vol <= 0.03) return { label: "Stable",    color: "text-emerald-600" };
        if (vol <= 0.07) return { label: "Volatile",  color: "text-yellow-600" };
        return              { label: "High Risk", color: "text-red-500" };
      }

      function getDefenseContractOdds(asset, highestStage) {
        const vol = toFiniteNumber(asset.volatility, 0.05);
        // Lower volatility ??higher base defense odds (range 30??0)
        const base = Math.round(Math.max(30, Math.min(80, (1 - vol * 3.5) * 100)));
        // RPG stage progress adds up to +10 bonus
        const stageBonus = Math.min(10, Math.round(
          (toFiniteNumber(highestStage, 0) / NORMAL_ENDING_STAGE) * 10
        ));
        return Math.min(90, base + stageBonus);
      }

      function getDefenseContractProjectedPayout(asset, highestStage, squadDps) {
        const vol = toFiniteNumber(asset.volatility, 0.05);
        // Higher risk ??higher projected multiplier (base range ~1.08??.48)
        const baseMultiplier = 1 + vol * 4;
        // Squad DPS adds a small log-scaled bonus (capped at +0.20)
        const dps = toFiniteNumber(squadDps, 0);
        const dpsBonus = dps > 0 ? Math.min(0.2, Math.log10(dps + 1) * 0.02) : 0;
        const raw = toFiniteNumber(baseMultiplier + dpsBonus, 1.1);
        return Math.max(1.05, Math.min(2.5, raw));
      }

      // Derived-only bet slip preview ??no state mutation, no settlement
      function getDefenseContractBetPreview(betSlip, assetList, highestStage, squadDps) {
        const contractId = betSlip?.selectedContractId;
        if (!contractId) return null;
        const asset = (assetList || []).find((a) => a.id === contractId);
        if (!asset) return null;
        const stage = toFiniteNumber(highestStage, 0);
        const dps = toFiniteNumber(squadDps, 0);
        const odds = getDefenseContractOdds(asset, stage);
        const payout = getDefenseContractProjectedPayout(asset, stage, dps);
        const tier = getDefenseContractRiskTier(asset);
        const stake = Math.max(0, toFiniteNumber(betSlip?.stake, 0));
        const projectedWin = toFiniteNumber(stake * payout, 0);
        return { asset, odds, payout, tier, stake, projectedWin };
      }

      // Derived-only simulated outcome ??deterministic preview, no random settlement
      function getDefenseContractSimulatedOutcome(betSlip, assetList, highestStage, squadDps) {
        const contractId = betSlip?.selectedContractId;
        if (!contractId) return null;
        const asset = (assetList || []).find((a) => a.id === contractId);
        if (!asset) return null;
        const stage = toFiniteNumber(highestStage, 0);
        const dps = toFiniteNumber(squadDps, 0);
        const odds = getDefenseContractOdds(asset, stage);
        const payout = getDefenseContractProjectedPayout(asset, stage, dps);
        const stake = Math.max(0, toFiniteNumber(betSlip?.stake, 0));
        const vol = toFiniteNumber(asset.volatility, 0.05);
        const outcomeLabel = odds >= 60 ? "Favorable" : odds >= 45 ? "Neutral" : "Unfavorable";
        const successChance = odds;
        const projectedGain = toFiniteNumber(stake * (payout - 1), 0);
        const projectedLoss = stake;
        let confidenceLevel;
        if (vol <= 0.03 && stage >= 30) confidenceLevel = "High";
        else if (vol <= 0.07 || stage >= 15) confidenceLevel = "Medium";
        else confidenceLevel = "Low";
        const stageSupportLabel = stage >= 50 ? "strongly supports" : stage >= 20 ? "partially supports" : "weakly supports";
        const dpsSignal = dps > 0 ? "signal active" : "signal inactive";
        const contractDisplayName = DEFENSE_CONTRACT_FLAVOR[asset.id]?.displayName || asset.name;
        const explanation = `${contractDisplayName} shows a ${successChance}% defense success rate. Stage ${stage} progress ${stageSupportLabel} this contract. Squad DPS ${dpsSignal}.`;
        return { selectedContractId: contractId, outcomeLabel, successChance, projectedGain, projectedLoss, confidenceLevel, explanation };
      }

      // Pure helper ??builds a preview-only history entry from current bet state
      function createDefenseContractPreviewHistoryEntry(betSlip, assetList, highestStage, squadDps) {
        const contractId = betSlip?.selectedContractId;

        const asset = (assetList || []).find((a) => a.id === contractId);

          odds,
          projectedPayout,
          outcomeLabel: outcome.outcomeLabel,
          createdAt: Date.now(),
          status: "preview",
        };
      }

      // Pure derived helper ??no mutation, reads only contractSettlementUnlocked flag
      function isDefenseContractSettlementUnlocked(gameState) {
        return gameState?.investment?.contractSettlementUnlocked === true;
      }

      // Pure validation helper ??no mutation, returns structured canSettle result
      function validateDefenseContractSettlement(gameState, assetList, highestStage, squadDps) {
        const investment = gameState?.investment;
        const capital = toFiniteNumber(gameState?.investment?.capital, 0);
        const contractId = investment?.betSlip?.selectedContractId || null;
        const stake = Math.max(0, toFiniteNumber(investment?.betSlip?.stake, 0));

        const base = { selectedContractId: contractId, stake, odds: null, projectedPayout: null };

        if (!isDefenseContractSettlementUnlocked(gameState)) {
          return { ...base, canSettle: false, reason: "Settlement is locked. Hero's Fate mechanics are not yet enabled.",
            checks: { settlementUnlocked: false, contractSelected: false, stakePositive: false, stakeWithinCash: false, oddsValid: false, payoutValid: false } };
        }

        const asset = (assetList || []).find((a) => a.id === contractId);
        if (!contractId || !asset) {
          return { ...base, canSettle: false, reason: "No valid contract is selected.",
            checks: { settlementUnlocked: true, contractSelected: false, stakePositive: false, stakeWithinCash: false, oddsValid: false, payoutValid: false } };
        }

        if (stake <= 0) {
          return { ...base, canSettle: false, reason: "Stake must be greater than 0.",
            checks: { settlementUnlocked: true, contractSelected: true, stakePositive: false, stakeWithinCash: false, oddsValid: false, payoutValid: false } };
        }

        if (stake > capital) {
          return { ...base, canSettle: false, reason: "Stake exceeds available Contract Capital balance.",
            checks: { settlementUnlocked: true, contractSelected: true, stakePositive: true, stakeWithinCash: false, oddsValid: false, payoutValid: false } };
        }

        const stage = toFiniteNumber(highestStage, 0);
        const dps = toFiniteNumber(squadDps, 0);
        const odds = getDefenseContractOdds(asset, stage);
        if (!isFinite(odds) || odds <= 0) {
          return { ...base, odds, canSettle: false, reason: "Contract odds are invalid.",
            checks: { settlementUnlocked: true, contractSelected: true, stakePositive: true, stakeWithinCash: true, oddsValid: false, payoutValid: false } };
        }

        const projectedPayout = getDefenseContractProjectedPayout(asset, stage, dps);
        if (!isFinite(projectedPayout) || projectedPayout <= 0) {
          return { ...base, odds, projectedPayout, canSettle: false, reason: "Projected payout is invalid.",
            checks: { settlementUnlocked: true, contractSelected: true, stakePositive: true, stakeWithinCash: true, oddsValid: true, payoutValid: false } };
        }

        return { canSettle: true, reason: "All conditions met. Ready to settle.", selectedContractId: contractId, stake, odds, projectedPayout,
          checks: { settlementUnlocked: true, contractSelected: true, stakePositive: true, stakeWithinCash: true, oddsValid: true, payoutValid: true } };
      }

      // Pure helper ??deterministic dry-run, no Math.random for outcome, no cash mutation
      function createDefenseContractDryRunResult(gameState, assetList, highestStage, squadDps) {
        const validation = validateDefenseContractSettlement(gameState, assetList, highestStage, squadDps);
        if (!validation.canSettle) return null;
        const { selectedContractId: contractId, stake, odds, projectedPayout } = validation;
        const asset = (assetList || []).find((a) => a.id === contractId);
        if (!asset) return null;
        const successChance = toFiniteNumber(odds, 0);
        const stage = toFiniteNumber(highestStage, 0);
        const dps = toFiniteNumber(squadDps, 0);
        // Deterministic win signal using contract odds + stage progress + DPS signal
        const stageSignal = Math.min(10, Math.round((stage / NORMAL_ENDING_STAGE) * 10));
        const dpsSignal = dps > 0 ? 3 : 0;
        const winScore = successChance + stageSignal + dpsSignal;
        const wouldWin = winScore >= 60;
        const safePayout = Math.max(1, toFiniteNumber(projectedPayout, 1));
        const safeStake = Math.max(0, toFiniteNumber(stake, 0));
        const netPreview = wouldWin
          ? toFiniteNumber(safeStake * (safePayout - 1), 0)
          : -safeStake;
        return {
          id: `dryrun-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
          contractId,
          contractName: DEFENSE_CONTRACT_FLAVOR[contractId]?.displayName || asset.name,
          stake: safeStake,
          odds,
          projectedPayout: safePayout,
          successChance,
          wouldWin,
          netPreview,
          createdAt: Date.now(),
          status: "dry-run",
        };
      }

      // Pure helper ??deterministic settlement result, same logic as dry-run
      function createDefenseContractSettlementResult(gameState, assetList, highestStage, squadDps) {
        const validation = validateDefenseContractSettlement(gameState, assetList, highestStage, squadDps);
        if (!validation.canSettle) return null;

        const dpsSignal = dps > 0 ? 3 : 0;
        const wouldWin = (successChance + stageSignal + dpsSignal) >= 60;

        const safeStake = Math.max(0, toFiniteNumber(stake, 0));
        const netResult = wouldWin

          wouldWin,
          netResult,
          createdAt: Date.now(),
          status: "settled",

      function toFiniteNumber(value, fallback = 0) {
        const number = Number(value);
        return Number.isFinite(number) ? number : fallback;
      }

      function formatDps(val) {
        const n = toFiniteNumber(val, 0);
        if (n <= 0) return "0";
        if (n < 1000000) return Math.floor(n).toLocaleString();
        if (n < 1e12) {
          return new Intl.NumberFormat("en-US", {
            notation: "compact",
            maximumFractionDigits: 2,
          }).format(n);
        }
        return n.toExponential(2);
      }

      function clampNumber(value, min, max, fallback = min) {
        const number = toFiniteNumber(value, fallback);
        return Math.min(max, Math.max(min, number));
      }

      function toOwnedQuantity(value) {
        return Math.max(0, Math.floor(toFiniteNumber(value, 0)));
      }

      function toSafePrice(value, fallbackPrice) {
        return Math.max(0, toFiniteNumber(value, fallbackPrice));
      }

      function normalizePriceHistory(history, fallbackPrice) {
        const safeFallback = Math.max(1, Math.round(fallbackPrice));
        const source = Array.isArray(history) ? history : [];
        const cleaned = source
          .map((point) => Math.round(toFiniteNumber(point, safeFallback)))
          .filter((point) => Number.isFinite(point) && point > 0)
          .slice(-INVESTMENT_HISTORY_LIMIT);

        return cleaned.length > 0 ? cleaned : [safeFallback];
      }

      function normalizeGachaItem(item, fallbackIndex = 0) {
        const definition = GACHA_ITEMS.find((candidate) => candidate.id === item?.id);
        if (!definition) return null;
        const characterDefinition =
          definition.type === "character"
            ? getCharacterDefinition(definition.characterId)
            : null;
        if (definition.type === "character" && !characterDefinition) return null;
        const enhanceLevel = clampNumber(
          Math.floor(toFiniteNumber(item.enhanceLevel, 0)),
          0,
          MAX_ENHANCE_LEVEL,
          0,
        );

        return {
          instanceId:
            typeof item.instanceId === "string" && item.instanceId.length > 0
              ? item.instanceId
              : `${definition.id}-${fallbackIndex}`,
          id: definition.id,
          characterId: characterDefinition?.id,
          name: definition.name,
          type: definition.type,
          weaponType: definition.weaponType || null,
          rarity: definition.rarity,
          power: Math.max(0, toFiniteNumber(item.power, definition.power)),
          enhanceLevel,
        };
      }

      function normalizeInventoryItem(item, fallbackIndex = 0) {
        const normalizedItem = normalizeGachaItem(item, fallbackIndex);
        if (!normalizedItem || normalizedItem.type === "character") return null;
        return normalizedItem;
      }

      function normalizeRecentPulls(pulls) {
        const source = Array.isArray(pulls) ? pulls : [];
        return source
          .map((item, index) => normalizeGachaItem(item, index))
          .filter(Boolean)
          .slice(-GACHA_RECENT_PULL_LIMIT);
      }

      function createStarterWeaponInstance() {
        return normalizeInventoryItem(
          {
            id: "iron-dagger",
            instanceId: `starter-iron-dagger-${Date.now()}-${Math.random()
              .toString(36)
              .slice(2, 8)}`,
            enhanceLevel: 0,
          },
          0,
        );
      }

      function ensureUniqueGachaInstanceIds(items) {
        const seen = new Set();

        return items.map((item, index) => {
          const baseInstanceId =
            typeof item.instanceId === "string" && item.instanceId.length > 0
              ? item.instanceId
              : `${item.id}-${index}`;
          const instanceId = seen.has(baseInstanceId)
            ? `${baseInstanceId}-${index}`
            : baseInstanceId;
          seen.add(instanceId);

          return {
            ...item,
            instanceId,
          };
        });
      }

      function getCharacterDefinition(characterId) {
        return CHARACTER_DEFINITIONS.find(
          (character) => character.id === characterId,
        );
      }

      function createCharacterInstance(characterId) {
        const definition = getCharacterDefinition(characterId);
        if (!definition) return null;

        return {
          instanceId: `${definition.id}-${Date.now()}-${Math.random()
            .toString(36)
            .slice(2, 8)}`,
          characterId: definition.id,
          level: 1,
          stars: 0,
          equippedWeaponInstanceId: null,
        };
      }

      function normalizeOwnedCharacter(character, fallbackIndex = 0) {
        const definition = getCharacterDefinition(character?.characterId);
        if (!definition) return null;

        const equippedWeaponInstanceId =
          typeof character.equippedWeaponInstanceId === "string" &&
          character.equippedWeaponInstanceId.length > 0
            ? character.equippedWeaponInstanceId
            : null;

        return {
          instanceId:
            typeof character.instanceId === "string" &&
            character.instanceId.length > 0
              ? character.instanceId
              : `${definition.id}-owned-${fallbackIndex}`,
          characterId: definition.id,
          level: clampNumber(
            Math.floor(toFiniteNumber(character.level, 1)),
            1,
            MAX_CHARACTER_LEVEL,
            1,
          ),
          stars: clampNumber(
            Math.floor(toFiniteNumber(character.stars, 0)),
            0,
            MAX_CHARACTER_STARS,
            0,
          ),
          equippedWeaponInstanceId,
        };
      }

      function ensureUniqueCharacterInstanceIds(characters) {
        const seen = new Set();

        return characters.map((character, index) => {
          const baseInstanceId =
            typeof character.instanceId === "string" &&
            character.instanceId.length > 0
              ? character.instanceId
              : `${character.characterId}-owned-${index}`;
          const instanceId = seen.has(baseInstanceId)
            ? `${baseInstanceId}-${index}`
            : baseInstanceId;
          seen.add(instanceId);

          return {
            ...character,
            instanceId,
          };
        });
      }

      function getEquippedWeaponForCharacter(character, inventory) {
        if (!character?.equippedWeaponInstanceId) return null;
        return (
          inventory.find(
            (item) =>
              item.instanceId === character.equippedWeaponInstanceId &&
              item.type === "weapon",
          ) || null
        );
      }

      function isWeaponEquipped(weaponInstanceId, characters) {
        if (typeof weaponInstanceId !== "string" || weaponInstanceId.length === 0) {
          return false;
        }
        return characters.some(
          (character) => character.equippedWeaponInstanceId === weaponInstanceId,
        );
      }

      function normalizeEquippedCharacterWeapons(characters, inventory) {
        const equippedWeaponIds = new Set();

        return characters.map((character) => {
          const equippedWeapon = getEquippedWeaponForCharacter(
            character,
            inventory,
          );
          if (!equippedWeapon || equippedWeaponIds.has(equippedWeapon.instanceId)) {
            return {
              ...character,
              equippedWeaponInstanceId: null,
            };
          }

          equippedWeaponIds.add(equippedWeapon.instanceId);
          return character;
        });
      }

      function getWeaponType(weapon) {
        return weapon?.weaponType || null;
      }

      function getCharacterPreferredWeaponType(characterDefinition) {
        return characterDefinition?.preferredWeaponType || null;
      }

      function hasPreferredWeaponEquipped(character, inventory) {
        const definition = getCharacterDefinition(character?.characterId);
        if (!definition) return false;
        const weapon = getEquippedWeaponForCharacter(character, inventory);
        if (!weapon) return false;
        return (
          getWeaponType(weapon) === getCharacterPreferredWeaponType(definition)
        );
      }

      function getPreferredWeaponSynergy(character, inventory) {
        const hasSynergy = hasPreferredWeaponEquipped(character, inventory);
        if (!hasSynergy) return 1.0;

        const weapon = getEquippedWeaponForCharacter(character, inventory);
        const enhanceLevel = weapon ? toFiniteNumber(weapon.enhanceLevel, 0) : 0;

        // Base 1.25 + 0.01 per enhance level, capped at 1.5
        const multiplier = 1.25 + enhanceLevel * 0.01;
        return Math.min(1.5, toFiniteNumber(multiplier, 1.25));
      }

      function getWeaponMasteryBonus(unit, enhancementState) {
        const definition = getCharacterDefinition(unit?.characterId);
        const preferredType = getCharacterPreferredWeaponType(definition);
        if (!preferredType) return 1;

        const weaponLevels = enhancementState?.weaponLevels || {};
        const savedLevel = Math.max(
          0,
          Math.floor(toFiniteNumber(weaponLevels[preferredType], 0)),
        );
        return Math.min(2, 1 + savedLevel * 0.05);
      }

      function createRunCharacterUnit(characterId, fallbackIndex = 0) {
        const created = createCharacterInstance(characterId);
        if (created) return created;
        const definition = getCharacterDefinition(characterId);
        if (!definition) return null;
        return {
          instanceId: `run-${definition.id}-${fallbackIndex}`,
          characterId: definition.id,
          level: 1,
          stars: 0,
          equippedWeaponInstanceId: null,
        };
      }

      function getStarterRunCharacterIds(rpgState) {
        const unlocked = Array.isArray(rpgState?.unlockedCharacterIds)
          ? rpgState.unlockedCharacterIds.filter((id) => getCharacterDefinition(id))
          : [];
        if (unlocked.length > 0) return unlocked;
        return [
          "realty-normal-yard-broker",
          "ticker-normal-floor-runner",
          "luxury-normal-boutique-slasher",
        ];
      }

      function getRunTicketCost() {
        return 100;
      }

      function getCharacterBaseDps(characterInstance) {
        if (!characterInstance?.characterId) return 0;
        const gachaItem = GACHA_ITEMS.find(
          (item) => item.characterId === characterInstance.characterId,
        );
        return gachaItem ? toFiniteNumber(gachaItem.power, 0) : 0;
      }

      function getCharacterLevelDps(characterInstance) {
        const baseDps = getCharacterBaseDps(characterInstance);
        const definition = getCharacterDefinition(characterInstance.characterId);
        if (!definition) return baseDps;

        const rarityBalance = CHARACTER_RARITY_BALANCE[
          definition.rarity.toLowerCase()
        ] || {
          growthRateRange: [1.05, 1.05],
        };
        const growthRate = rarityBalance.growthRateRange[0];
        const level = toFiniteNumber(characterInstance.level, 1);

        const levelMultiplier = Math.pow(growthRate, level - 1);
        return toFiniteNumber(baseDps * levelMultiplier, baseDps);
      }

      function getFactionSynergyMultiplier(count) {
        const c = Math.max(0, Math.floor(toFiniteNumber(count, 0)));
        if (c >= 4) return 1.25;
        if (c === 3) return 1.12;
        if (c === 2) return 1.05;
        return 1.0;
      }

      function getKillsRequiredForStage(stage) {
        return 5;
      }

      function getMonsterMaxHp(stage) {
        const s = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
        return Math.floor(100 * Math.pow(1.3, s - 1));
      }

      function getMonsterDefeatReward(stage) {
        const s = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
        return Math.floor(25 * Math.pow(s, 1.05));
      }

      function getRpgUpgradeLevel(state, key) {
        if (!state?.rpg?.upgrades) return 0;
        return Math.max(0, Math.floor(toFiniteNumber(state.rpg.upgrades[key], 0)));
      }

      function getRpgUpgradeCost(key, level) {
        const l = Math.max(0, Math.floor(toFiniteNumber(level, 0)));
        return Math.floor(50 * Math.pow(1.18, l));
      }

      function getRpgUpgradeEffect(key, level) {
        const l = Math.max(0, Math.floor(toFiniteNumber(level, 0)));
        if (key === "atkLevel") return 1 + l * 0.02;
        if (key === "spdLevel") return 1 + l * 0.01;
        if (key === "penLevel") return Math.min(0.8, l * 0.005);
        return 0;
      }

      function isNormalEndingReached(rpgState) {
        if (!rpgState) return false;
        return (
          rpgState.normalEndingReached === true ||
          Math.max(0, toFiniteNumber(rpgState.highestStage, 0)) >= NORMAL_ENDING_STAGE
        );
      }

      function getRpgModeLabel(rpgState) {
        const stage = Math.max(1, toFiniteNumber(rpgState?.currentStage, 1));
        if (stage > NORMAL_ENDING_STAGE) return "Infinite Mode / Locked Mechanics";
        if (isNormalEndingReached(rpgState)) return "Normal Ending Reached";
        return "Normal Arc";
      }

      function getTeamBaseAtk(state) {
        if (!state || !state.rpg) return 0;
        const characters = Array.isArray(state.rpg.run?.activeUnits)
          ? state.rpg.run.activeUnits
          : [];
        const inventory = Array.isArray(state.enhancement?.inventory)
          ? state.enhancement.inventory
          : [];

        const ownedCharacterDetails = characters
          .map((character) => {
            const definition = getCharacterDefinition(character.characterId);
            if (!definition) return null;
            const equippedWeapon = getEquippedWeaponForCharacter(
              character,
              inventory,
            );
            const synergyMultiplier = getPreferredWeaponSynergy(
              character,
              inventory,
            );
            const masteryMultiplier = getWeaponMasteryBonus(
              character,
              state.enhancement,
            );
            return {
              ...character,
              definition,
              equippedWeapon,
              synergyMultiplier,
              masteryMultiplier,
            };
          })
          .filter(Boolean);

        const ownedFactionCounts = ownedCharacterDetails.reduce((acc, char) => {
          const faction = char.definition.faction;
          acc[faction] = (acc[faction] || 0) + 1;
          return acc;
        }, {});

        return ownedCharacterDetails.reduce((sum, char) => {
          const levelDps = getCharacterLevelDps(char);
          const weaponDps = char.equippedWeapon
            ? toFiniteNumber(char.equippedWeapon.power, 0)
            : 0;
          const factionMult = getFactionSynergyMultiplier(
            ownedFactionCounts[char.definition.faction] || 0,
          );
          const totalDps =
            (levelDps + weaponDps) *
            char.synergyMultiplier *
            char.masteryMultiplier *
            factionMult;
          return sum + totalDps;
        }, 0);
      }

      function getRpgCombatStats(state) {
        const baseAtk = getTeamBaseAtk(state);
        const atkLevel = getRpgUpgradeLevel(state, "atkLevel");
        const spdLevel = getRpgUpgradeLevel(state, "spdLevel");
        const penLevel = getRpgUpgradeLevel(state, "penLevel");

        const atkMult = getRpgUpgradeEffect("atkLevel", atkLevel);
        const spdMult = getRpgUpgradeEffect("spdLevel", spdLevel);
        const penEffect = getRpgUpgradeEffect("penLevel", penLevel);

        // Future-ready derived stats
        const accBase = 0.95;
        const crtBase = 0.05;

        // Small bonus for Legendary/Mythic characters
        const characters = state.rpg?.run?.activeUnits || [];
        const highTierCount = characters.filter((c) => {
          const def = getCharacterDefinition(c.characterId);
          return (
            def && (def.rarity === "legendary" || def.rarity === "mythic")
          );
        }).length;
        const crtBonus = Math.min(0.1, highTierCount * 0.01);

        return {
          atk: baseAtk * atkMult,
          spd: spdMult,
          pen: penEffect,
          acc: accBase,
          crt: crtBase + crtBonus,
          totalDps: baseAtk * atkMult * spdMult,
        };
      }

      function getTotalTeamDps(state) {
        return getRpgCombatStats(state).totalDps;
      }

      function applyCombatTick(state, deltaSeconds) {
        if (state.rpg?.run?.isActive !== true) return state;
        const dps = getTotalTeamDps(state);
        const damage = dps * deltaSeconds;
        if (damage <= 0) return state;

        const currentHp = toFiniteNumber(state.rpg.monsterHp, 0);
        const nextHp = Math.max(0, currentHp - damage);

        if (nextHp <= 0) {
          const nextDefeated =
            toFiniteNumber(state.rpg.defeatedMonsters, 0) + 1;
          const currentStage = Math.max(
            1,
            toFiniteNumber(state.rpg.currentStage, 1),
          );
          const currentStageKills = toFiniteNumber(state.rpg.stageKills, 0);
          const killsRequired = getKillsRequiredForStage(currentStage);

          let nextStage = currentStage;
          let nextStageKills = currentStageKills + 1;
          let nextHighestStage = toFiniteNumber(state.rpg.highestStage, 0);

          if (nextStageKills >= killsRequired) {
            nextStage = currentStage + 1;
            nextStageKills = 0;
            nextHighestStage = Math.max(nextHighestStage, nextStage);
          }

          const maxHp = getMonsterMaxHp(nextStage);
          const reward = getMonsterDefeatReward(currentStage);
          const reachedNormalEnding =
            state.rpg.normalEndingReached === true ||
            nextHighestStage >= NORMAL_ENDING_STAGE;

          return {
            ...state,
            rpg: {
              ...state.rpg,
              currentStage: nextStage,
              highestStage: nextHighestStage,
              stageKills: nextStageKills,
              monsterHp: maxHp,
              monsterMaxHp: maxHp,
              defeatedMonsters: nextDefeated,
              dividends: toFiniteNumber(state.rpg.dividends, 0) + reward,
              lastRpgReward: reward,
              normalEndingReached: reachedNormalEnding,
              run: {
                ...state.rpg.run,
                stage: nextStage,
                wave: nextDefeated,
              },
            },
          };
        }

        return {
          ...state,
          rpg: {
            ...state.rpg,
            monsterHp: nextHp,
            run: {
              ...state.rpg.run,
              stage: Math.max(1, toFiniteNumber(state.rpg.run?.stage, state.rpg.currentStage)),
              wave: Math.max(0, toFiniteNumber(state.rpg.run?.wave, state.rpg.defeatedMonsters)),
            },
          },
        };
      }

      function normalizeGameState(state, language = "en") {
        const defaults = createDefaultGameState(language);
        const landlord = state?.landlord || {};
        const savedProperties = Array.isArray(landlord.properties)
          ? landlord.properties
          : [];
        const investment = state?.investment || {};
        const savedHoldings = Array.isArray(investment.holdings)
          ? investment.holdings
          : [];
        const enhancement = state?.enhancement || {};
        const savedInventory = Array.isArray(enhancement.inventory)
          ? enhancement.inventory
          : [];
        const normalizedInventory = ensureUniqueGachaInstanceIds(
          savedInventory
            .map((item, index) => normalizeInventoryItem(item, index))
            .filter(Boolean),
        );
        const normalizedRecentPulls = ensureUniqueGachaInstanceIds(
          normalizeRecentPulls(enhancement.recentPulls),
        );
        const rpg = state?.rpg || {};
        const savedCharacters = Array.isArray(rpg.characters)
          ? rpg.characters
          : [];
        const normalizedCharacters = ensureUniqueCharacterInstanceIds(
          savedCharacters
            .map((character, index) =>
              normalizeOwnedCharacter(character, index),
            )
            .filter(Boolean),
        );
        const equippedNormalizedCharacters = normalizeEquippedCharacterWeapons(
          normalizedCharacters,
          normalizedInventory,
        );
        const normalizedUnlockedCharacterIds = Array.from(
          new Set([
            ...(Array.isArray(rpg.unlockedCharacterIds)
              ? rpg.unlockedCharacterIds.filter((id) => getCharacterDefinition(id))
              : []),
            ...equippedNormalizedCharacters.map((character) => character.characterId),
          ]),
        );
        const normalizedWeaponLevels = normalizedInventory.reduce((levels, item) => {
          if (item.type !== "weapon") return levels;
          const weaponType = getWeaponType(item);
          if (!weaponType) return levels;
          const currentLevel = Math.max(
            0,
            Math.floor(toFiniteNumber(item.enhanceLevel, 0)),
          );
          levels[weaponType] = Math.max(
            Math.floor(toFiniteNumber(levels[weaponType], 0)),
            currentLevel,
          );
          return levels;
        }, { ...(enhancement.weaponLevels || {}) });
        const normalizedWeaponMastery = Object.keys(normalizedWeaponLevels).reduce(
          (mastery, weaponType) => {
            mastery[weaponType] = Math.min(
              2,
              1 + Math.max(0, toFiniteNumber(normalizedWeaponLevels[weaponType], 0)) * 0.05,
            );
            return mastery;
          },
          { ...(enhancement.weaponMastery || {}) },
        );
        const run = rpg.run || {};
        const savedActiveUnits = Array.isArray(run.activeUnits) ? run.activeUnits : [];
        const normalizedRunUnits = ensureUniqueCharacterInstanceIds(
          savedActiveUnits
            .map((character, index) => normalizeOwnedCharacter(character, index))
            .filter(Boolean),
        );
        const normalizedRunHistory = Array.isArray(run.resultHistory)
          ? run.resultHistory
              .filter(
                (entry) =>
                  entry &&
                  typeof entry.id === "string" &&
                  typeof entry.result === "string",
              )
              .slice(-10)
          : [];

        return {
          ...defaults,
          ...state,
          version: GAME_STATE_VERSION,
          wallet: {
            ...defaults.wallet,
            ...(state?.wallet || {}),
            cash: Math.max(0, toFiniteNumber(state?.wallet?.cash, 0)),
          },
          landlord: {
            ...defaults.landlord,
            ...landlord,
            properties: defaults.landlord.properties.map((property) => {
              const savedProperty = savedProperties.find(
                (item) => item.id === property.id,
              );
              return {
                id: property.id,
                count: toFiniteNumber(savedProperty?.count, 0),
              };
            }),
            rebirthCount: toFiniteNumber(landlord.rebirthCount, 0),
            multiplier: toFiniteNumber(landlord.multiplier, 1),
            totalEarned: toFiniteNumber(landlord.totalEarned, 0),
            clickPower: toFiniteNumber(landlord.clickPower, 10),
            clickUpgradeCost: toFiniteNumber(landlord.clickUpgradeCost, 50),
          },
          investment: {
            ...defaults.investment,
            ...investment,
            capital: Math.max(0, toFiniteNumber(investment.capital, 0)),
            supportGrantClaimed: investment.supportGrantClaimed === true,
            holdings: defaults.investment.holdings.map((holding) => {
              const savedHolding = savedHoldings.find(
                (item) => item.id === holding.id,
              );
              const asset = INVESTMENT_ASSETS.find(
                (item) => item.id === holding.id,
              );
              return {
                id: holding.id,
                name: asset.name,
                type: asset.type,
                price: clampNumber(
                  savedHolding?.price,
                  Math.max(1, asset.price * 0.5),
                  asset.price * 2,
                  asset.price,
                ),
                volatility: asset.volatility,
                owned: toOwnedQuantity(savedHolding?.owned),
                avgBuyPrice: toSafePrice(
                  savedHolding?.avgBuyPrice,
                  savedHolding?.price || asset.price,
                ),
                history: normalizePriceHistory(
                  savedHolding?.history,
                  savedHolding?.price || asset.price,
                ),
              };
            }),
            betSlip: {
              selectedContractId:
                typeof investment.betSlip?.selectedContractId === "string"
                  ? investment.betSlip.selectedContractId
                  : null,
              stake: Math.max(0, toFiniteNumber(investment.betSlip?.stake, 0)),
            },
            contractHistory: Array.isArray(investment.contractHistory)
              ? investment.contractHistory
                  .filter(
                    (e) =>
                      e &&
                      typeof e.id === "string" &&
                      typeof e.contractId === "string" &&
                      typeof e.contractName === "string" &&
                      typeof e.stake === "number" &&
                      typeof e.odds === "number" &&
                      typeof e.projectedPayout === "number" &&
                      typeof e.outcomeLabel === "string" &&
                      typeof e.createdAt === "number" &&
                      e.status === "preview",
                  )
                  .slice(-10)
              : [],
            contractSettlementUnlocked:
              investment.contractSettlementUnlocked === true ? true : false,
            lastContractDryRun: (() => {
              const d = investment.lastContractDryRun;
              if (!d || typeof d !== "object") return null;
              if (
                typeof d.id !== "string" ||
                typeof d.contractId !== "string" ||
                typeof d.contractName !== "string" ||
                typeof d.stake !== "number" ||
                typeof d.odds !== "number" ||
                typeof d.projectedPayout !== "number" ||
                typeof d.successChance !== "number" ||
                typeof d.wouldWin !== "boolean" ||
                typeof d.netPreview !== "number" ||
                typeof d.createdAt !== "number" ||
                d.status !== "dry-run"
              ) return null;
              return d;
            })(),
            contractSettlementHistory: Array.isArray(investment.contractSettlementHistory)
              ? investment.contractSettlementHistory
                  .filter(
                    (e) =>
                      e &&
                      typeof e.id === "string" &&
                      typeof e.contractId === "string" &&
                      typeof e.contractName === "string" &&
                      typeof e.stake === "number" &&
                      typeof e.odds === "number" &&
                      typeof e.projectedPayout === "number" &&
                      typeof e.wouldWin === "boolean" &&
                      typeof e.netResult === "number" &&
                      typeof e.createdAt === "number" &&
                      e.status === "settled",
                  )
                  .slice(-10)
              : [],
          },
          enhancement: {
            ...defaults.enhancement,
            ...enhancement,
            inventory: normalizedInventory,
            failStacks: toFiniteNumber(enhancement.failStacks, 0),
            starterWeaponGranted: enhancement.starterWeaponGranted === true,
            weaponLevels: normalizedWeaponLevels,
            weaponMastery: normalizedWeaponMastery,
            lastPulledItem:
              normalizeGachaItem(enhancement.lastPulledItem) ||
              normalizedRecentPulls[normalizedRecentPulls.length - 1] ||
              normalizedInventory[normalizedInventory.length - 1] ||
              null,
            recentPulls: normalizedRecentPulls,
            lastEnhancementResult:
              enhancement.lastEnhancementResult &&
              typeof enhancement.lastEnhancementResult === "object"
                ? {
                    itemName: String(
                      enhancement.lastEnhancementResult.itemName || "",
                    ),
                    success: Boolean(enhancement.lastEnhancementResult.success),
                    level: clampNumber(
                      Math.floor(
                        toFiniteNumber(
                          enhancement.lastEnhancementResult.level,
                          0,
                        ),
                      ),
                      0,
                      MAX_ENHANCE_LEVEL,
                      0,
                    ),
                  }
                : null,
          },
          rpg: {
            ...defaults.rpg,
            ...rpg,
            characters: equippedNormalizedCharacters,
            tickets: Math.max(0, Math.floor(toFiniteNumber(rpg.tickets, 1))),
            unlockedCharacterIds: normalizedUnlockedCharacterIds,
            highestStage: Math.max(0, Math.floor(toFiniteNumber(rpg.highestStage, 0))),
            currentStage: Math.max(1, Math.floor(toFiniteNumber(rpg.currentStage, 1))),
            monsterMaxHp: Math.max(1, toFiniteNumber(rpg.monsterMaxHp, 100)),
            monsterHp: clampNumber(
              rpg.monsterHp,
              0,
              Math.max(1, toFiniteNumber(rpg.monsterMaxHp, 100)),
              100,
            ),
            defeatedMonsters: Math.max(
              0,
              Math.floor(toFiniteNumber(rpg.defeatedMonsters, 0)),
            ),
            stageKills: Math.max(0, Math.floor(toFiniteNumber(rpg.stageKills, 0))),
            dividends: Math.max(0, toFiniteNumber(rpg.dividends, 0)),
            lastRpgReward: Math.max(0, toFiniteNumber(rpg.lastRpgReward, 0)),
            normalEndingReached: rpg.normalEndingReached === true,
            normalEndingSeen: rpg.normalEndingSeen === true,
            upgrades: {
              atkLevel: clampNumber(rpg.upgrades?.atkLevel, 0, 1000, 0),
              spdLevel: clampNumber(rpg.upgrades?.spdLevel, 0, 1000, 0),
              penLevel: clampNumber(rpg.upgrades?.penLevel, 0, 1000, 0),
            },
            run: {
              ...defaults.rpg.run,
              ...run,
              activeUnits:
                run.isActive === true ? normalizedRunUnits : [],
              isActive: run.isActive === true && normalizedRunUnits.length > 0,
              wave: Math.max(0, Math.floor(toFiniteNumber(run.wave, 0))),
              stage: Math.max(1, Math.floor(toFiniteNumber(run.stage, 1))),
              runId: typeof run.runId === "string" ? run.runId : null,
              resultHistory: normalizedRunHistory,
            },
          },
          settings: {
            ...defaults.settings,
            ...(state?.settings || {}),
            language:
              state?.settings?.language === "ko" ||
              state?.settings?.language === "en" ||
              state?.settings?.language === "ja"
                ? state.settings.language
                : language,
          },
        };
      }

      function migrateLegacyStateIfNeeded(language = "en") {
        const legacyRaw = localStorage.getItem(LEGACY_LANDLORD_STORAGE_KEY);
        if (!legacyRaw) return null;

        try {
          const legacy = JSON.parse(legacyRaw);
          const migrated = createDefaultGameState(language);
          const legacyProperties = Array.isArray(legacy.properties)
            ? legacy.properties
            : [];

          migrated.wallet.cash = toFiniteNumber(legacy.money, 0);
          migrated.landlord.properties = migrated.landlord.properties.map(
            (property) => {
              const savedProperty = legacyProperties.find(
                (item) => item.id === property.id,
              );
              return {
                id: property.id,
                count: toFiniteNumber(savedProperty?.count, 0),
              };
            },
          );
          migrated.landlord.rebirthCount = toFiniteNumber(
            legacy.rebirthCount,
            0,
          );
          migrated.landlord.multiplier = toFiniteNumber(legacy.multiplier, 1);
          migrated.landlord.totalEarned = toFiniteNumber(
            legacy.totalEarned,
            0,
          );
          migrated.landlord.clickPower = toFiniteNumber(legacy.clickPower, 10);
          migrated.landlord.clickUpgradeCost = toFiniteNumber(
            legacy.clickUpgradeCost,
            50,
          );

          saveGameState(migrated);
          localStorage.removeItem(LEGACY_LANDLORD_STORAGE_KEY);
          return migrated;
        } catch (error) {
          console.warn("Unable to migrate legacy Idle Landlord state.", error);
          return null;
        }
      }

      function loadGameState(language = "en") {
        const savedRaw = localStorage.getItem(GAME_STATE_STORAGE_KEY);

        if (savedRaw) {
          try {
            const normalizedState = normalizeGameState(
              JSON.parse(savedRaw),
              language,
            );
            localStorage.removeItem(LEGACY_LANDLORD_STORAGE_KEY);
            return normalizedState;
          } catch (error) {
            console.warn("Unable to load saved Money Game state.", error);
          }
        }

        return (
          migrateLegacyStateIfNeeded(language) || createDefaultGameState(language)
        );
      }

      function saveGameState(state) {
        const stateToSave = {
          ...state,
          version: GAME_STATE_VERSION,
          settings: {
            ...state.settings,
            lastSavedAt: new Date().toISOString(),
          },
        };
        localStorage.setItem(
          GAME_STATE_STORAGE_KEY,
          JSON.stringify(stateToSave),
        );
      }

            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            const currentAvgBuyPrice = toSafePrice(
              currentHolding?.avgBuyPrice,
              currentPrice,
            );
            const nextOwned = currentOwned + 1;
            const nextAvgBuyPrice =
              ((currentAvgBuyPrice * currentOwned) + currentPrice) / nextOwned;
            if (toFiniteNumber(prev.investment.capital, 0) < currentPrice) return prev;

            return {
              ...prev,
              investment: {
                ...prev.investment,
                capital: Math.max(
                  0,
                  toFiniteNumber(prev.investment.capital, 0) - currentPrice,
                ),
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: nextOwned,
                        avgBuyPrice: toSafePrice(
                          nextAvgBuyPrice,
                          currentPrice,
                        ),
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const sellInvestmentAsset = (id) => {
          const asset = investmentAssets.find((item) => item.id === id);
          if (!asset || asset.owned <= 0) return;

          updateGameState((prev) => {
            const currentHolding = prev.investment.holdings.find(
              (holding) => holding.id === id,
            );
            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            if (currentOwned <= 0) return prev;
            const nextOwned = Math.max(0, currentOwned - 1);

            const currentPrice = clampNumber(
              currentHolding?.price,
              Math.max(1, asset.price * 0.5),
              asset.price * 2,
              asset.price,
            );

            return {
              ...prev,
              investment: {
                ...prev.investment,
                capital:
                  toFiniteNumber(prev.investment.capital, 0) + currentPrice,
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: nextOwned,
                        avgBuyPrice:
                          nextOwned > 0
                            ? toSafePrice(holding.avgBuyPrice, currentPrice)
                            : currentPrice,
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const buyMaxInvestmentAsset = (id) => {
          const asset = investmentAssets.find((item) => item.id === id);
          if (!asset || contractCapital < asset.price) return;

          updateGameState((prev) => {
            const currentHolding = prev.investment.holdings.find(
              (holding) => holding.id === id,
            );
            const currentPrice = clampNumber(
              currentHolding?.price,
              Math.max(1, asset.price * 0.5),
              asset.price * 2,
              asset.price,
            );
            const buyQuantity = Math.floor(
              toFiniteNumber(prev.investment.capital, 0) / currentPrice,
            );
            if (buyQuantity <= 0) return prev;

            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            const currentAvgBuyPrice = toSafePrice(
              currentHolding?.avgBuyPrice,
              currentPrice,
            );
            const nextOwned = currentOwned + buyQuantity;
            const nextAvgBuyPrice =
              ((currentAvgBuyPrice * currentOwned) +
                currentPrice * buyQuantity) /
              nextOwned;

            return {
              ...prev,
              investment: {
                ...prev.investment,
                capital: Math.max(
                  0,
                  toFiniteNumber(prev.investment.capital, 0) -
                    currentPrice * buyQuantity,
                ),
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: nextOwned,
                        avgBuyPrice: toSafePrice(
                          nextAvgBuyPrice,
                          currentPrice,
                        ),
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const sellAllInvestmentAsset = (id) => {
          const asset = investmentAssets.find((item) => item.id === id);
          if (!asset || asset.owned <= 0) return;

          updateGameState((prev) => {
            const currentHolding = prev.investment.holdings.find(
              (holding) => holding.id === id,
            );
            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            if (currentOwned <= 0) return prev;

            const currentPrice = clampNumber(
              currentHolding?.price,
              Math.max(1, asset.price * 0.5),
              asset.price * 2,
              asset.price,
            );

            return {
              ...prev,
              investment: {
                ...prev.investment,
                capital:
                  toFiniteNumber(prev.investment.capital, 0) +
                  currentPrice * currentOwned,
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: 0,
                        avgBuyPrice: currentPrice,
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const selectDefenseContract = (contractId) => {
          setGameState((prev) => ({
            ...prev,
            investment: {
              ...prev.investment,
              betSlip: {
                ...prev.investment.betSlip,
                selectedContractId:
                  contractId === prev.investment.betSlip?.selectedContractId
                    ? null
                    : contractId,
              },
            },
          }));
        };

        const updateDefenseContractStake = (rawValue) => {
          setGameState((prev) => {
            const maxStake = Math.max(0, toFiniteNumber(prev.investment.capital, 0));
            const parsed = toFiniteNumber(Number(rawValue), 0);
            const clamped = Math.min(maxStake, Math.max(0, parsed));
            return {
              ...prev,
              investment: {
                ...prev.investment,
                betSlip: {
                  ...prev.investment.betSlip,
                  stake: clamped,
                },
              },
            };
          });
        };

        const clearDefenseContractBetSlip = () => {
          setGameState((prev) => ({
            ...prev,
            investment: {
              ...prev.investment,
              betSlip: { selectedContractId: null, stake: 0 },
            },
          }));
        };

        const saveDefenseContractPreviewToHistory = () => {
          setGameState((prev) => {
            const entry = createDefenseContractPreviewHistoryEntry(
              prev.investment.betSlip,
              investmentAssets,
              prev.rpg?.highestStage || 0,
              totalTeamDps,
            );
            if (!entry) return prev;
            const existing = Array.isArray(prev.investment.contractHistory)
              ? prev.investment.contractHistory
              : [];
            const updated = [...existing, entry].slice(-10);
            return {
              ...prev,
              investment: {
                ...prev.investment,
                contractHistory: updated,
              },
            };
          });
        };

        const toggleDefenseContractSettlementGate = () => {
          updateGameState((prev) => ({
            ...prev,
            investment: {
              ...prev.investment,
              contractSettlementUnlocked: !prev.investment.contractSettlementUnlocked,
            },
          }));
        };

        const runDefenseContractDryRun = () => {
          setGameState((prev) => {
            const result = createDefenseContractDryRunResult(
              prev,
              investmentAssets,
              prev.rpg?.highestStage || 0,
              totalTeamDps,
            );
            if (!result) return prev;
            return {
              ...prev,
              investment: {
                ...prev.investment,
                lastContractDryRun: result,
              },
            };
          });

        const settleDefenseContract = () => {
          setGameState((prev) => {
            const entry = createDefenseContractSettlementResult(
              prev,
              investmentAssets,
              prev.rpg?.highestStage || 0,
              totalTeamDps,
            );
            if (!entry) return prev;
            const currentCapital = toFiniteNumber(prev.investment.capital, 0);
            const capitalAfterDeduct = currentCapital - entry.stake;
            const capitalFinal = entry.wouldWin
              ? capitalAfterDeduct + entry.stake * entry.projectedPayout
              : capitalAfterDeduct;
            const existing = Array.isArray(prev.investment.contractSettlementHistory)
              ? prev.investment.contractSettlementHistory
              : [];
            return {
              ...prev,
              investment: {
                ...prev.investment,
                capital: Math.max(0, toFiniteNumber(capitalFinal, 0)),
                betSlip: {
                  ...prev.investment.betSlip,
                  stake: 0,
                },
                contractSettlementHistory: [...existing, entry].slice(-10),
              },
            };
          });
        };

        const pickGachaRarity = () => {
          const totalWeight = GACHA_RARITIES.reduce(
            (total, rarity) => total + rarity.weight,
            0,
          );
          let roll = Math.random() * totalWeight;

          for (const rarity of GACHA_RARITIES) {
            roll -= rarity.weight;
            if (roll <= 0) return rarity.name;
          }

          return GACHA_RARITIES[0].name;
        };

        const createPulledGachaItem = () => {
          const rarity = pickGachaRarity();
          const candidates = GACHA_ITEMS.filter((item) => item.rarity === rarity);
          const item =
            candidates[Math.floor(Math.random() * candidates.length)] ||
            GACHA_ITEMS[0];

          return {
            ...item,
            instanceId: `${item.id}-${Date.now()}-${Math.random()
              .toString(36)
              .slice(2, 8)}`,
          };
        };

        const drawGachaItems = (quantity) => {
          const drawQuantity = Math.max(1, Math.floor(toFiniteNumber(quantity, 1)));
          const totalCost = GACHA_DRAW_COST * drawQuantity;
          if (dividends < totalCost) return;

          updateGameState((prev) => {
            if (toFiniteNumber(prev.rpg.dividends, 0) < totalCost) return prev;

            const pulledItems = Array.from({ length: drawQuantity }, () =>
              createPulledGachaItem(),
            );
            const lastPulled = pulledItems[pulledItems.length - 1];
            const pulledInventoryItems = pulledItems.filter(
              (item) => item.type !== "character",
            );
            const pulledCharacters = pulledItems
              .filter((item) => item.type === "character")
              .map((item) => item.characterId)
              .filter(Boolean);
            const recentPulls = [
              ...normalizeRecentPulls(prev.enhancement.recentPulls),
              ...pulledItems,
            ].slice(-GACHA_RECENT_PULL_LIMIT);
            const unlockedCharacterIds = Array.isArray(prev.rpg.unlockedCharacterIds)
              ? prev.rpg.unlockedCharacterIds
              : [];
            const nextUnlockedCharacterIds = Array.from(
              new Set([...unlockedCharacterIds, ...pulledCharacters]),
            );
            const legacyCharacters = Array.isArray(prev.rpg.characters)
              ? prev.rpg.characters
              : [];
            const nextLegacyCharacters = [...legacyCharacters];
            pulledCharacters.forEach((characterId, index) => {
              if (nextLegacyCharacters.some((item) => item.characterId === characterId)) {
                return;
              }
              const created = createRunCharacterUnit(characterId, index);
              if (created) nextLegacyCharacters.push(created);
            });

            return {
              ...prev,
              enhancement: {
                ...prev.enhancement,
                inventory: [
                  ...prev.enhancement.inventory,
                  ...pulledInventoryItems,
                ],
                lastPulledItem: lastPulled,
                recentPulls,
              },
              rpg: {
                ...prev.rpg,
                dividends: Math.max(0, toFiniteNumber(prev.rpg.dividends, 0) - totalCost),
                unlockedCharacterIds: nextUnlockedCharacterIds,
                characters: nextLegacyCharacters,
              },
            };
          });
        };

        const drawGachaItem = () => {
          drawGachaItems(1);
        };

        const drawTenGachaItems = () => {
          drawGachaItems(10);
        };

        const claimInvestmentSupportGrant = () => {
          updateGameState((prev) => {
            if (prev.investment.supportGrantClaimed === true) return prev;
            return {
              ...prev,
              investment: {
                ...prev.investment,
                capital: toFiniteNumber(prev.investment.capital, 0) + 5000,
                supportGrantClaimed: true,
              },
            };
          });
        };

        const transferCashToInvestment = (amount) => {
          updateGameState((prev) => {
            const transferAmount = Math.max(
              0,
              Math.min(
                toFiniteNumber(prev.wallet.cash, 0),
                Math.floor(toFiniteNumber(amount, 0)),
              ),
            );
            if (transferAmount <= 0) return prev;
            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash - transferAmount,
              },
              investment: {
                ...prev.investment,
                capital: toFiniteNumber(prev.investment.capital, 0) + transferAmount,
              },
            };
          });
        };

        const claimStarterWeapon = () => {
          updateGameState((prev) => {
            if (prev.enhancement.starterWeaponGranted === true) return prev;
            const starterWeapon = createStarterWeaponInstance();
            if (!starterWeapon) return prev;
            return {
              ...prev,
              enhancement: {
                ...prev.enhancement,
                starterWeaponGranted: true,
                inventory: [...prev.enhancement.inventory, starterWeapon],
                lastPulledItem: starterWeapon,
                recentPulls: [
                  ...normalizeRecentPulls(prev.enhancement.recentPulls),
                  starterWeapon,
                ].slice(-GACHA_RECENT_PULL_LIMIT),
              },
            };
          });
        };

        const buyRunTicket = () => {
          updateGameState((prev) => {
            const cost = getRunTicketCost();
            const currentDividends = toFiniteNumber(prev.rpg.dividends, 0);
            if (currentDividends < cost) return prev;
            return {
              ...prev,
              rpg: {
                ...prev.rpg,
                dividends: currentDividends - cost,
                tickets: toFiniteNumber(prev.rpg.tickets, 0) + 1,
              },
            };
          });
        };

        const startDefenseRun = () => {
          updateGameState((prev) => {
            if (prev.rpg.run?.isActive === true) return prev;
            const tickets = Math.max(0, Math.floor(toFiniteNumber(prev.rpg.tickets, 0)));
            if (tickets <= 0) return prev;
            const starterIds = getStarterRunCharacterIds(prev.rpg);
            const selectedIds = starterIds.slice(0, 5);
            const activeUnits = ensureUniqueCharacterInstanceIds(
              selectedIds
                .map((characterId, index) => createRunCharacterUnit(characterId, index))
                .filter(Boolean),
            );
            if (activeUnits.length === 0) return prev;
            const maxHp = getMonsterMaxHp(1);
            const runId = `run-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
            return {
              ...prev,
              rpg: {
                ...prev.rpg,
                tickets: tickets - 1,
                currentStage: 1,
                monsterHp: maxHp,
                monsterMaxHp: maxHp,
                defeatedMonsters: 0,
                stageKills: 0,
                lastRpgReward: 0,
                run: {
                  ...prev.rpg.run,
                  activeUnits,
                  isActive: true,
                  wave: 1,
                  stage: 1,
                  runId,
                },
              },
            };
          });
        };

        const endDefenseRun = (result = "retreat") => {
          updateGameState((prev) => {
            if (prev.rpg.run?.isActive !== true) return prev;
            const history = Array.isArray(prev.rpg.run?.resultHistory)
              ? prev.rpg.run.resultHistory
              : [];
            const entry = {
              id: `run-result-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
              runId: prev.rpg.run?.runId || null,
              result,
              stage: Math.max(1, Math.floor(toFiniteNumber(prev.rpg.currentStage, 1))),
              defeatedMonsters: Math.max(
                0,
                Math.floor(toFiniteNumber(prev.rpg.defeatedMonsters, 0)),
              ),
              createdAt: Date.now(),
            };
            const maxHp = getMonsterMaxHp(1);
            return {
              ...prev,
              rpg: {
                ...prev.rpg,
                currentStage: 1,
                monsterHp: maxHp,
                monsterMaxHp: maxHp,
                defeatedMonsters: 0,
                stageKills: 0,
                lastRpgReward: 0,
                run: {
                  ...prev.rpg.run,
                  activeUnits: [],
                  isActive: false,
                  wave: 0,
                  stage: 1,
                  runId: null,
                  resultHistory: [...history, entry].slice(-10),
                },
              },
            };
          });
        };

        const getEnhanceCost = (level) => {
          const safeLevel = clampNumber(
            Math.floor(toFiniteNumber(level, 0)),
            0,
            MAX_ENHANCE_LEVEL,
            0,
          );
          return 500 * (safeLevel + 1);
        };

        const getEnhanceChance = (level) => {
          const safeLevel = clampNumber(
            Math.floor(toFiniteNumber(level, 0)),
            0,
            MAX_ENHANCE_LEVEL,
            0,
          );
          return clampNumber(0.9 - safeLevel * 0.06, 0.3, 0.9, 0.9);
        };

        const enhanceWeaponItem = (instanceId) => {
          updateGameState((prev) => {
            const item = prev.enhancement.inventory.find(
              (candidate) => candidate.instanceId === instanceId,
            );
            if (!item || item.type !== "weapon") return prev;

            const currentLevel = clampNumber(
              Math.floor(toFiniteNumber(item.enhanceLevel, 0)),
              0,
              MAX_ENHANCE_LEVEL,
              0,
            );
            if (currentLevel >= MAX_ENHANCE_LEVEL) return prev;

            const cost = getEnhanceCost(currentLevel);
            if (prev.wallet.cash < cost) return prev;

            const success = Math.random() < getEnhanceChance(currentLevel);
            const nextLevel = success ? currentLevel + 1 : currentLevel;
            const result = {
              itemName: item.name,
              success,
              level: nextLevel,
            };
            const weaponType = getWeaponType(item);
            const nextWeaponLevels = { ...(prev.enhancement.weaponLevels || {}) };
            const nextWeaponMastery = { ...(prev.enhancement.weaponMastery || {}) };
            if (weaponType) {
              const previousSavedLevel = Math.max(
                0,
                Math.floor(toFiniteNumber(nextWeaponLevels[weaponType], 0)),
              );
              const highestLevel = Math.max(previousSavedLevel, nextLevel);
              nextWeaponLevels[weaponType] = highestLevel;
              nextWeaponMastery[weaponType] = Math.min(2, 1 + highestLevel * 0.05);
            }

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash - cost,
              },
              enhancement: {
                ...prev.enhancement,
                weaponLevels: nextWeaponLevels,
                weaponMastery: nextWeaponMastery,
                inventory: prev.enhancement.inventory.map((candidate) =>
                  candidate.instanceId === instanceId
                    ? { ...candidate, enhanceLevel: nextLevel }
                    : candidate,
                ),
                lastEnhancementResult: result,
              },
            };
          });
        };

        const equipWeaponToCharacter = (characterInstanceId, weaponInstanceId) => {
          updateGameState((prev) => {
            const characterExists = prev.rpg.characters.some(
              (character) => character.instanceId === characterInstanceId,
            );
            const weapon = prev.enhancement.inventory.find(
              (item) =>
                item.instanceId === weaponInstanceId && item.type === "weapon",
            );
            if (!characterExists || !weapon) return prev;

            return {
              ...prev,
              rpg: {
                ...prev.rpg,
                characters: prev.rpg.characters.map((character) => {
                  if (character.instanceId === characterInstanceId) {
                    return {
                      ...character,
                      equippedWeaponInstanceId: weapon.instanceId,
                    };
                  }
                  if (character.equippedWeaponInstanceId === weapon.instanceId) {
                    return {
                      ...character,
                      equippedWeaponInstanceId: null,
                    };
                  }
                  return character;
                }),
              },
            };
          });
        };

        const unequipWeaponFromCharacter = (characterInstanceId) => {
          updateGameState((prev) => ({
            ...prev,
            rpg: {
              ...prev.rpg,
              characters: prev.rpg.characters.map((character) =>
                character.instanceId === characterInstanceId
                  ? { ...character, equippedWeaponInstanceId: null }
                  : character,
              ),
            },
          }));
        };

        const acknowledgeDorothyProposal = () => {
          updateGameState((prev) => ({
            ...prev,
            rpg: {
              ...prev.rpg,
              normalEndingSeen: true,
            },
          }));
        };

        const buyRpgUpgrade = (key) => {
          const validKeys = ["atkLevel", "spdLevel", "penLevel"];
          if (!validKeys.includes(key)) return;

          updateGameState((prev) => {
            if (!prev.rpg?.upgrades) return prev;
            const currentLevel = toFiniteNumber(prev.rpg.upgrades[key], 0);
            const cost = getRpgUpgradeCost(key, currentLevel);
            const currentDividends = toFiniteNumber(prev.rpg.dividends, 0);

            if (currentDividends < cost) return prev;

            return {
              ...prev,
              rpg: {
                ...prev.rpg,
                dividends: currentDividends - cost,
                upgrades: {
                  ...prev.rpg.upgrades,
                  [key]: currentLevel + 1,
                },
              },
            };
          });
        };

        const renderSparkline = (history) => {
          const points = normalizePriceHistory(history, 1);
          const min = Math.min(...points);
          const max = Math.max(...points);
          const range = Math.max(1, max - min);
          const path = points
            .map((point, index) => {
              const x =
                points.length === 1
                  ? 100
                  : (index / (points.length - 1)) * 200;
              const y = 56 - ((point - min) / range) * 48;
              return `${index === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
            })
            .join(" ");

          return (
            <svg
              viewBox="0 0 200 64"
              className="w-full h-16 mt-4"
              role="img"
              aria-label="Recent price history"
            >
              <path
                d="M 0 56 L 200 56"
                stroke="#e5e7eb"
                strokeWidth="1"
                fill="none"
              />
              <path
                d={path}
                stroke="#0f766e"
                strokeWidth="3"
                fill="none"
                strokeLinecap="round"
                strokeLinejoin="round"
              />
            </svg>
          );
        };

        const rarityTextClass = (rarity) => {
          if (rarity === "Mythic") return "text-emerald-800";
          if (rarity === "Legendary") return "text-emerald-700";
          if (rarity === "Unique") return "text-emerald-600";
          if (rarity === "Epic") return "text-green-700";
          if (rarity === "Rare") return "text-green-600";
          return "text-gray-600";
        };

        function formatMoney(val) {
          return new Intl.NumberFormat(t.format, {
            style: "currency",
            currency: t.currency,
            maximumFractionDigits: 0,
          }).format(val);
        }

        const defenseStabilityIndex = Math.round(
          Math.min(100, Math.max(0,
            50 + investmentAssets.reduce((s, a) => s + a.gainLossPercent, 0) / Math.max(1, investmentAssets.length)
          ))
        );
        const heroSurvivalIndex = Math.min(100, Math.round(
          ((gameState.rpg?.highestStage || 0) / NORMAL_ENDING_STAGE) * 100
        ));
        const raidConfidence = Math.round(
          Math.min(100, Math.max(10,
            totalNetWorth > 0 ? Math.min(100, (totalPortfolioValue / Math.max(1, totalNetWorth)) * 100) : 20
          ))
        );
        const dominantFaction = (() => {
          const entries = Object.entries(ownedFactionCounts);
          if (entries.length === 0) return "None";
          return entries.sort((a, b) => b[1] - a[1])[0][0];
        })();
        const capitalPressure = totalNetWorth > 0
          ? Math.round(Math.min(100, Math.max(0, (1 - cash / Math.max(1, totalNetWorth)) * 100)))
          : 0;

        const tabs = [
          { id: "landlord", label: ui.tabLandlord },
          { id: "investment", label: ui.tabInvestment },
          { id: "enhancement", label: ui.tabEnhancement },
          { id: "rpg", label: ui.tabRpg },
        ];

        return (
          <div className="w-full max-w-4xl flex flex-col items-center">
            {/* ?嚥▲굧?????꿔꺂???????????????*/}
            <div className="w-full max-w-md">
              <section className="w-full bg-white shadow-sm rounded-xl mb-4 border border-emerald-100 overflow-hidden sticky top-2 z-20">
                <div className="bg-gradient-to-r from-green-700 to-emerald-600 text-white px-4 py-3 flex items-center justify-between">
                  <h2 className="text-xs font-black uppercase tracking-widest">
                    {ui.walletHeader}
                  </h2>
                  <div className="text-[10px] font-bold text-green-100">
                    {tabs.find((tab) => tab.id === activeTab)?.label}
                  </div>
                </div>
                <div className="grid grid-cols-4 divide-x divide-emerald-100">
                  <div className="px-4 py-3 bg-white">
                    <div className="text-[10px] font-black uppercase text-gray-400">
                      {ui.walletCash}
                    </div>
                    <div className="text-lg font-black text-emerald-700">
                      {formatMoney(cash)}
                    </div>
                  </div>

                    <div className="bg-white border border-gray-200 rounded-lg p-4">
                      <div className="flex items-center justify-between mb-3">
                        <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest">
                          {ui.recentRunResults}
                        </h2>
                        <div className="text-xs font-black text-gray-500">
                          {runResultHistory.length}
                        </div>
                      </div>
                      {runResultHistory.length > 0 ? (
                        <div className="space-y-2">
                          {[...runResultHistory].reverse().map((entry) => (
                            <div
                              key={entry.id}
                              className="bg-gray-50 rounded-md p-3 flex items-center justify-between gap-3"
                            >
                              <div>
                                <div className="font-black text-gray-800 text-sm">
                                  {entry.result === "clear" ? ui.clearedRun : ui.retreatedRun}
                                </div>
                                <div className="text-[10px] font-bold text-gray-400 uppercase">
                                  {language === "ko"
                                    ? `???? ${entry.stage} / ?? ${entry.defeatedMonsters}`
                                    : `Stage ${entry.stage} / ${entry.defeatedMonsters} kills`}
                                </div>
                              </div>
                              <div className="text-[10px] font-black text-emerald-700">
                                {new Date(
                                  toFiniteNumber(entry.createdAt, Date.now()),
                                ).toLocaleTimeString()}
                              </div>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="py-6 text-center font-bold text-gray-400">
                          {ui.noRunHistory}
                        </div>
                      )}
                    </div>

                    <div className="bg-white border border-gray-200 rounded-lg p-4">
                      <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
                        {ui.battleNotice}
                      </h2>
                      <p className="text-xs text-gray-500 leading-relaxed">
                        Active combat and stage progression are currently in
                        development. DPS values shown here are derived from base
                        stats, levels, weapon power, and active synergies.
                      </p>
                    </div>
                  </div>
                </section>
              )}
            </div>

            {/* ?????⑤슢??????????????좏뀮???SEO ????댁벑??잙컾維??????紐꾨쫯??????쇨덧??*/}
            {SEO_TAB_CONTENT[language]?.[activeTab] ?? null}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<GameApp />);
    </script>
  </body>
</html>
