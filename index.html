          ].slice(0, 10));
        } else {
          setTacticalLogFeed((old) => [
            `🚨 [부대 사기 영향] 지하 계약 전선 붕괴! 부대 사기 극도로 저하 및 추가 물자 보급 급무`,
            ...old
          ].slice(0, 10));
        }

        setGameState((prev) => {
          const entryResult = createDefenseContractSettlementResult(
            prev,
            investmentAssets,
            prev.rpg?.highestStage || 0,
            totalTeamDps,
          );
          if (!entryResult) return prev;
          const currentCapital = toFiniteNumber(prev.investment.capital, 0);
          const capitalAfterDeduct = currentCapital - entryResult.stake;
          const capitalFinal = entryResult.wouldWin
            ? capitalAfterDeduct + entryResult.stake * entryResult.projectedPayout
            : capitalAfterDeduct;
          const existing = Array.isArray(prev.investment.contractSettlementHistory)
            ? prev.investment.contractSettlementHistory
            : [];

          const nextState = {
            ...prev,
            investment: {
              ...prev.investment,
              capital: Math.max(0, toFiniteNumber(capitalFinal, 0)),
              betSlip: {
                ...prev.investment.betSlip,
                stake: 0,
              },
              contractSettlementHistory: [...existing, entryResult].slice(-10),
            },
          };

          if (!entryResult.wouldWin) {
            return {
              ...nextState,
              meta: {
                ...prev.meta,
                gameOver: {
                  reason: "defense_contract_failure",
                  contractName: entryResult.contractName,
                  stake: entryResult.stake,
                  odds: entryResult.odds,
                  timestamp: Date.now(),
                }
              }
            };
          }

          return nextState;
        });
      };

      const pickGachaRarity = () => {
        const totalWeight = GACHA_RARITIES.reduce(
          (total, rarity) => total + rarity.weight,
          0,
        );
        let roll = Math.random() * totalWeight;

        for (const rarity of GACHA_RARITIES) {
          roll -= rarity.weight;
          if (roll <= 0) return rarity.name;
        }

        return GACHA_RARITIES[0].name;
      };

      const createPulledGachaItem = () => {
        const rarity = pickGachaRarity();
        const candidates = GACHA_ITEMS.filter((item) => item.rarity === rarity);
        const item =
          candidates[Math.floor(Math.random() * candidates.length)] ||
          GACHA_ITEMS[0];

        return {
          ...item,
          instanceId: `${item.id}-${Date.now()}-${Math.random()
            .toString(36)
            .slice(2, 8)}`,
          mods: item.type === "weapon" ? [] : undefined,
        };
      };

      const drawGachaItems = (quantity) => {
        const drawQuantity = Math.max(1, Math.floor(toFiniteNumber(quantity, 1)));
        const totalCost = GACHA_DRAW_COST * drawQuantity;
        if (dividends < totalCost) return;

        updateGameState((prev) => {
          if (toFiniteNumber(prev.rpg.dividends, 0) < totalCost) return prev;

          const pulledItems = Array.from({ length: drawQuantity }, () =>
            createPulledGachaItem(),
          );
          const lastPulled = pulledItems[pulledItems.length - 1];
          const pulledInventoryItems = pulledItems.filter(
            (item) => item.type !== "character",
          );
          const pulledCharacters = pulledItems
            .filter((item) => item.type === "character")
            .map((item) => item.characterId)
            .filter(Boolean);
          const recentPulls = [
            ...normalizeRecentPulls(prev.enhancement.recentPulls),
            ...pulledItems,
          ].slice(-GACHA_RECENT_PULL_LIMIT);
          const unlockedCharacterIds = Array.isArray(prev.rpg.unlockedCharacterIds)
            ? prev.rpg.unlockedCharacterIds
            : [];
          const nextUnlockedCharacterIds = Array.from(
            new Set([...unlockedCharacterIds, ...pulledCharacters]),
          );
          const legacyCharacters = Array.isArray(prev.rpg.characters)
            ? prev.rpg.characters
            : [];
          const nextLegacyCharacters = [...legacyCharacters];
          pulledCharacters.forEach((characterId, index) => {
            if (nextLegacyCharacters.some((item) => item.characterId === characterId)) {
              return;
            }
            const created = createRunCharacterUnit(characterId, index);
            if (created) nextLegacyCharacters.push(created);
          });

          return {
            ...prev,
            enhancement: {
              ...prev.enhancement,
              inventory: [
                ...prev.enhancement.inventory,
                ...pulledInventoryItems,
              ],
              lastPulledItem: lastPulled,
              recentPulls,
            },
            rpg: {
              ...prev.rpg,
              dividends: Math.max(0, toFiniteNumber(prev.rpg.dividends, 0) - totalCost),
              unlockedCharacterIds: nextUnlockedCharacterIds,
              characters: nextLegacyCharacters,
            },
          };
        });
      };

      const drawGachaItem = () => {
        drawGachaItems(1);
      };

      const drawTenGachaItems = () => {
        drawGachaItems(10);
      };

      const claimInvestmentSupportGrant = () => {
        updateGameState((prev) => {
          if (prev.investment.supportGrantClaimed === true) return prev;
          return {
            ...prev,
            investment: {
              ...prev.investment,
              capital: toFiniteNumber(prev.investment.capital, 0) + 5000,
              supportGrantClaimed: true,
            },
          };
        });
      };

      const transferCashToInvestment = (amount) => {
        updateGameState((prev) => {
          const transferAmount = Math.max(
            0,
            Math.min(
              toFiniteNumber(prev.wallet.cash, 0),
              Math.floor(toFiniteNumber(amount, 0)),
            ),
          );
          if (transferAmount <= 0) return prev;
          return {
            ...prev,
            wallet: {
              ...prev.wallet,
              cash: prev.wallet.cash - transferAmount,
            },
            investment: {
              ...prev.investment,
              capital: toFiniteNumber(prev.investment.capital, 0) + transferAmount,
            },
          };
        });
      };

      const claimStarterWeapon = () => {
        updateGameState((prev) => {
          if (prev.enhancement.starterWeaponGranted === true) return prev;
          const starterWeapon = createStarterWeaponInstance();
          if (!starterWeapon) return prev;
          return {
            ...prev,
            enhancement: {
              ...prev.enhancement,
              starterWeaponGranted: true,
              inventory: [...prev.enhancement.inventory, starterWeapon],
              lastPulledItem: starterWeapon,
              recentPulls: [
                ...normalizeRecentPulls(prev.enhancement.recentPulls),
                starterWeapon,
              ].slice(-GACHA_RECENT_PULL_LIMIT),
            },
          };
        });
      };

      const buyRunTicket = () => {
        updateGameState((prev) => {
          const cost = getRunTicketCost();
          const currentDividends = toFiniteNumber(prev.rpg.dividends, 0);
          if (currentDividends < cost) return prev;
          return {
            ...prev,
            rpg: {
              ...prev.rpg,
              dividends: currentDividends - cost,
              tickets: toFiniteNumber(prev.rpg.tickets, 0) + 1,
            },
          };
        });
      };

      const startDefenseRun = () => {
        updateGameState((prev) => {
          if (prev.rpg.run?.isActive === true) return prev;
          const tickets = Math.max(0, Math.floor(toFiniteNumber(prev.rpg.tickets, 0)));
          if (tickets <= 0) return prev;
          const starterIds = getStarterRunCharacterIds(prev.rpg);
          const selectedIds = starterIds.slice(0, 5);
          const activeUnits = ensureUniqueCharacterInstanceIds(
            selectedIds
              .map((characterId, index) => createRunCharacterUnit(characterId, index))
              .filter(Boolean),
          );
          if (activeUnits.length === 0) return prev;
          const maxHp = getMonsterMaxHp(1);
          const runId = `run-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
          return {
            ...prev,
            rpg: {
              ...prev.rpg,
              tickets: tickets - 1,
              currentStage: 1,
              monsterHp: maxHp,
              monsterMaxHp: maxHp,
              defeatedMonsters: 0,
              stageKills: 0,
              lastRpgReward: 0,
              run: {
                ...prev.rpg.run,
                activeUnits,
                isActive: true,
                wave: 1,
                stage: 1,
                runId,
              },
            },
          };
        });
      };

      const enterReaperStage = () => {
        updateGameState((prev) => {
          if (prev.rpg.run?.isActive === true) return prev;
          const tickets = Math.max(0, Math.floor(toFiniteNumber(prev.rpg.tickets, 0)));
          if (tickets <= 0) return prev;
          const starterIds = getStarterRunCharacterIds(prev.rpg);
          const selectedIds = starterIds.slice(0, 5);
          const activeUnits = ensureUniqueCharacterInstanceIds(
            selectedIds
              .map((characterId, index) => createRunCharacterUnit(characterId, index))
              .filter(Boolean),
          );
          if (activeUnits.length === 0) return prev;
          const startStage = Math.max(101, toFiniteNumber(prev.rpg.highestStage, 101));
          const maxHp = getMonsterMaxHp(startStage);
          const runId = `run-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
          return {
            ...prev,
            rpg: {
              ...prev.rpg,
              tickets: tickets - 1,
              currentStage: startStage,
              monsterHp: maxHp,
              monsterMaxHp: maxHp,
              defeatedMonsters: 0,
              stageKills: 0,
              lastRpgReward: 0,
              run: {
                ...prev.rpg.run,
                activeUnits,
                isActive: true,
                wave: 1,
                stage: startStage,
                runId,
              },
            },
          };
        });
      };

      const endDefenseRun = (result = "retreat") => {
        updateGameState((prev) => {
          if (prev.rpg.run?.isActive !== true) return prev;
          const history = Array.isArray(prev.rpg.run?.resultHistory)
            ? prev.rpg.run.resultHistory
            : [];
          const entry = {
            id: `run-result-${Date.now()}-${Math.floor(Math.random() * 10000)}`,
            runId: prev.rpg.run?.runId || null,
            result,
            stage: Math.max(1, Math.floor(toFiniteNumber(prev.rpg.currentStage, 1))),
            defeatedMonsters: Math.max(
              0,
              Math.floor(toFiniteNumber(prev.rpg.defeatedMonsters, 0)),
            ),
            createdAt: Date.now(),
          };
          const maxHp = getMonsterMaxHp(1);
          return {
            ...prev,
            rpg: {
              ...prev.rpg,
              currentStage: 1,
              monsterHp: maxHp,
              monsterMaxHp: maxHp,
              defeatedMonsters: 0,
              stageKills: 0,
              lastRpgReward: 0,
              run: {
                ...prev.rpg.run,
                activeUnits: [],
                isActive: false,
                wave: 0,
                stage: 1,
                runId: null,
                resultHistory: [...history, entry].slice(-10),
              },
            },
          };
        });
      };

      const getEnhanceCost = (level) => {
        const safeLevel = clampNumber(
          Math.floor(toFiniteNumber(level, 0)),
          0,
          MAX_ENHANCE_LEVEL,
          0,
        );
        return 500 * (safeLevel + 1);
      };

      const getEnhanceChance = (level) => {
        const safeLevel = clampNumber(
          Math.floor(toFiniteNumber(level, 0)),
          0,
          MAX_ENHANCE_LEVEL,
          0,
        );
        return clampNumber(0.9 - safeLevel * 0.06, 0.3, 0.9, 0.9);
      };

      // J-5A: Breakage chance matching the Live Risk Ladder:
      // safe zone (0 to 9): 0%
      // high risk (10 to 19): 20%
      // extreme risk (20 to 29): 70%
      const getBreakageChance = (level) => {
        const safeLevel = Math.floor(toFiniteNumber(level, 0));
        if (safeLevel < 10) return 0;
        if (safeLevel < 20) return 0.2;
        return 0.7;
      };

      // J-3G: Salvage payout — scales by enhancement level and rarity
      const getSalvagePayout = (enhanceLevel, rarity) => {
        const level = Math.max(0, Math.floor(toFiniteNumber(enhanceLevel, 0)));
        const rarityMultipliers = { common: 1, uncommon: 1.2, rare: 1.5, epic: 2, legendary: 3, mythic: 5 };
        const rarityMult = rarityMultipliers[String(rarity).toLowerCase()] || 1;
        // Base: 10 shards + 15 per level, scaled by rarity
        const base = 10 + level * 15;
        return Math.max(5, Math.floor(base * rarityMult));
      };

      // J-3H: Prestige tier — derived from enhanceLevel, no persistence needed
      // J-3H: Prestige tier — derived from enhanceLevel, no persistence needed
      const getPrestigeTier = (level) => {
        const l = Math.floor(toFiniteNumber(level, 0));
        if (l <= 0) return { tier: "base", label: "", borderClass: "border-gray-800", bgClass: "bg-slate-900/40", textClass: "text-gray-500" };
        if (l <= 5) return { tier: "green", label: "", borderClass: "border-emerald-950", bgClass: "bg-slate-900/40", textClass: "text-emerald-600" };
        if (l <= 10) return { tier: "safe", label: language === "ko" ? "안전" : "SAFE", borderClass: "border-emerald-500/30", bgClass: "bg-emerald-950/20", textClass: "text-emerald-900" };
        if (l <= 20) return { tier: "high_risk", label: language === "ko" ? "고위험" : "HIGH RISK", borderClass: "border-amber-500/40", bgClass: "bg-amber-950/20", textClass: "text-amber-900" };
        return { tier: "extreme_risk", label: language === "ko" ? "극도위험" : "EXTREME RISK", borderClass: "border-red-500/50", bgClass: "bg-red-950/25", textClass: "text-red-900" };
      };

      // J-3H: Compact weapon epithet — derived from existing fields, no persistence
      const getWeaponEpithet = (item) => {
        if (!item || item.type !== "weapon") return null;
        const survivals = Math.floor(toFiniteNumber(item.breakSurvivalCount, 0));
        const level = Math.floor(toFiniteNumber(item.enhanceLevel, 0));
        if (level >= MAX_ENHANCE_LEVEL) return language === "ko" ? "전선의 전설" : "Frontline Legend";
        if (survivals >= 5) return language === "ko" ? "불멸의" : "Undying";
        if (survivals >= 3) return language === "ko" ? "잿더미에서 돌아온" : "Ashen";
        if (survivals >= 1) return language === "ko" ? "흉터의" : "Scarred";
        if (level >= 20) return language === "ko" ? "전선 정예" : "Elite";
        if (level >= 10) return language === "ko" ? "숙련된" : "Tempered";
        return null;
      };

      const getForgePrestigeAnnouncement = (level, itemName) => {
        const safeLevel = Math.floor(toFiniteNumber(level, 0));
        if (![10, 20, 30].includes(safeLevel)) return null;
        const safeName = itemName || (language === "ko" ? "무기" : "Weapon");
        const copy = {
          10: {
            title: language === "ko" ? "🛡️ 안전지대 한계 돌파" : "🛡️ Safe Zone Limit Breached",
            body: language === "ko"
              ? `${safeName} +10 달성! 다음 제련부터 고위험 구간(파괴 확률 20%)에 돌입합니다.`
              : `${safeName} reached +10! Future forge attempts enter the HIGH RISK zone (20% break risk).`,
            tone: "amber",
          },
          20: {
            title: language === "ko" ? "🚨 고위험 구간 한계 돌파" : "🚨 High Risk Limit Breached",
            body: language === "ko"
              ? `${safeName} +20 달성! 다음 제련부터 극도 위험 구간(파괴 확률 70%)에 돌입합니다.`
              : `${safeName} reached +20! Future forge attempts enter the EXTREME RISK zone (70% break risk).`,
            tone: "purple",
          },
          30: {
            title: language === "ko" ? "👑 전선의 전설 완성" : "👑 Frontline Legend Completed",
            body: language === "ko"
              ? `${safeName} +30 최대 제련 도달! 차원이 다른 전설적인 지배자의 힘을 손에 넣었습니다.`
              : `${safeName} reached +30 max level! You hold the legendary power of an absolute master.`,
            tone: "red",
          },
        };
        return copy[safeLevel];
      };

      const showForgePrestigeAnnouncement = (level, itemName) => {
        const announcement = getForgePrestigeAnnouncement(level, itemName);
        if (!announcement) return;
        setPrestigeAnnouncementToast({
          ...announcement,
          level,
          id: Date.now(),
        });
        if (prestigeAnnouncementTimeoutRef.current) {
          clearTimeout(prestigeAnnouncementTimeoutRef.current);
        }
        prestigeAnnouncementTimeoutRef.current = setTimeout(() => {
          setPrestigeAnnouncementToast(null);
          prestigeAnnouncementTimeoutRef.current = null;
        }, 4500);
      };

      const enhanceWeaponItem = (instanceId, useStabilizer = false) => {
        const item = gameState.enhancement.inventory.find(
          (candidate) => candidate.instanceId === instanceId,
        );
        if (!item || item.type !== "weapon") return;
        if (item.broken === true) return; // J-3G: broken weapons cannot be enhanced
        if (item.locked === true) return; // J-3I: locked weapons cannot be enhanced — must unlock first

        const currentLevel = clampNumber(
          Math.floor(toFiniteNumber(item.enhanceLevel, 0)),
          0,
          MAX_ENHANCE_LEVEL,
          0,
        );
        if (currentLevel >= MAX_ENHANCE_LEVEL) return;

        const cost = getEnhanceCost(currentLevel);
        if (cash < cost) return;

        // J-3G: stabilizer validation
        const hasStabilizer = useStabilizer && toFiniteNumber(gameState.enhancement?.stabilizers, 0) > 0;

        // Trigger Phase J-4D forge physical recoil anticipation shakes
        setAnvilShake(true);
        setAnvilRecoil(true);

        setTimeout(() => {
          setAnvilShake(false);
          setAnvilRecoil(false);

          const successChance = getEnhanceChance(currentLevel) + (hasStabilizer ? STABILIZER_SUCCESS_BONUS : 0);
          const success = Math.random() < successChance;

          if (success) {
            const nextSuccessfulLevel = currentLevel + 1;
            setEnhanceSuccessPulse(true);
            setTimeout(() => setEnhanceSuccessPulse(false), 1000);

            setTacticalLogFeed((old) => [
              `⚒️ [병기 품질 상승] ${item.name} +${nextSuccessfulLevel} 제련 성공! (전선 화력 강화 예상 및 대원 장착 효율 상승)`,
              ...old
            ].slice(0, 10));

            showForgePrestigeAnnouncement(nextSuccessfulLevel, item.name);

            updateGameState((prev) => {
              const prevItem = prev.enhancement.inventory.find(
                (candidate) => candidate.instanceId === instanceId,
              );
              if (!prevItem) return prev;
              const nextLevel = nextSuccessfulLevel;
              const result = {
                itemName: prevItem.name,
                success: true,
                level: nextLevel,
                broken: false,
                salvageShards: 0,
                prevLevel: currentLevel,
                cost,
                baseChance: getEnhanceChance(currentLevel),
                breakChance: currentLevel >= 20 ? 0.7 : currentLevel >= 10 ? 0.2 : 0,
                stabilizerUsed: hasStabilizer,
              };
              const weaponType = getWeaponType(prevItem);
              const nextWeaponLevels = { ...(prev.enhancement.weaponLevels || {}) };
              const nextWeaponMastery = { ...(prev.enhancement.weaponMastery || {}) };
              if (weaponType) {
                const previousSavedLevel = Math.max(
                  0,
                  Math.floor(toFiniteNumber(nextWeaponLevels[weaponType], 0)),
                );
                const highestLevel = Math.max(previousSavedLevel, nextLevel);
                nextWeaponLevels[weaponType] = highestLevel;
                nextWeaponMastery[weaponType] = Math.min(2, 1 + highestLevel * 0.05);
              }

              const prevForge = prev.enhancement.forgeStats || {};
              const wasInDanger = currentLevel >= 10;

              return {
                ...prev,
                wallet: {
                  ...prev.wallet,
                  cash: prev.wallet.cash - cost,
                },
                enhancement: {
                  ...prev.enhancement,
                  weaponLevels: nextWeaponLevels,
                  weaponMastery: nextWeaponMastery,
                  inventory: prev.enhancement.inventory.map((candidate) =>
                    candidate.instanceId === instanceId
                      ? {
                        ...candidate, enhanceLevel: nextLevel,
                        breakSurvivalCount: wasInDanger
                          ? toFiniteNumber(candidate.breakSurvivalCount, 0) + 1
                          : toFiniteNumber(candidate.breakSurvivalCount, 0),
                      }
                      : candidate,
                  ),
                  lastEnhancementResult: result,
                  forgeStats: {
                    totalAttempts: toFiniteNumber(prevForge.totalAttempts, 0) + 1,
                    totalSuccesses: toFiniteNumber(prevForge.totalSuccesses, 0) + 1,
                    totalFailures: toFiniteNumber(prevForge.totalFailures, 0),
                    totalBreakages: toFiniteNumber(prevForge.totalBreakages, 0),
                    totalShardsEarned: toFiniteNumber(prevForge.totalShardsEarned, 0),
                  },
                  stabilizers: hasStabilizer
                    ? Math.max(0, toFiniteNumber(prev.enhancement.stabilizers, 0) - 1)
                    : toFiniteNumber(prev.enhancement.stabilizers, 0),
                },
              };
            });
          } else {
            // Failure Path
            const isSafeZone = currentLevel < 10;
            const isHighRisk = currentLevel >= 10 && currentLevel < 20;
            const isExtremeRisk = currentLevel >= 20;

            let didShatter = false;
            let stabilizerShielded = false;

            if (isHighRisk || isExtremeRisk) {
              const shatterChance = isExtremeRisk ? 0.70 : 0.20;
              if (hasStabilizer) {
                stabilizerShielded = true;
              } else {
                didShatter = Math.random() < shatterChance;
              }
            }

            if (didShatter) {
              // SHATTERED
              setEnhanceFailPulse(true);
              setTimeout(() => setEnhanceFailPulse(false), 1500);

              const salvageShards = currentLevel * 10;

              setTacticalLogFeed((old) => [
                `💥 [긴급: 병기 파괴] ${item.name} +${currentLevel} 제련 중 무기가 산산조각 났습니다! 파편 회수: 💎${salvageShards} (전선 잔해 수습 및 파편 분해 자동 완료)`,
                ...old
              ].slice(0, 10));

              updateGameState((prev) => {
                const prevItem = prev.enhancement.inventory.find(
                  (candidate) => candidate.instanceId === instanceId,
                );
                if (!prevItem) return prev;

                const salvageEntry = {
                  id: `salvage-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                  weaponName: prevItem.name,
                  weaponLevel: currentLevel,
                  weaponRarity: prevItem.rarity,
                  refinedShardsAwarded: salvageShards,
                  createdAt: Date.now(),
                };

                const prevForge = prev.enhancement.forgeStats || {};
                const prevHistory = Array.isArray(prev.enhancement.salvageHistory)
                  ? prev.enhancement.salvageHistory : [];

                return {
                  ...prev,
                  wallet: {
                    ...prev.wallet,
                    cash: prev.wallet.cash - cost,
                  },
                  rpg: {
                    ...prev.rpg,
                    characters: prev.rpg.characters.map((character) =>
                      character.equippedWeaponInstanceId === instanceId
                        ? { ...character, equippedWeaponInstanceId: null }
                        : character,
                    ),
                  },
                  enhancement: {
                    ...prev.enhancement,
                    inventory: prev.enhancement.inventory.filter(
                      (candidate) => candidate.instanceId !== instanceId,
                    ),
                    lastEnhancementResult: {
                      itemName: prevItem.name,
                      success: false,
                      level: 0,
                      broken: true,
                      salvageShards,
                      prevLevel: currentLevel,
                      cost,
                      baseChance: getEnhanceChance(currentLevel),
                      breakChance: currentLevel >= 20 ? 0.7 : currentLevel >= 10 ? 0.2 : 0,
                      stabilizerUsed: hasStabilizer,
                    },
                    refinedShards: toFiniteNumber(prev.enhancement.refinedShards, 0) + salvageShards,
                    forgeStats: {
                      totalAttempts: toFiniteNumber(prevForge.totalAttempts, 0) + 1,
                      totalSuccesses: toFiniteNumber(prevForge.totalSuccesses, 0),
                      totalFailures: toFiniteNumber(prevForge.totalFailures, 0) + 1,
                      totalBreakages: toFiniteNumber(prevForge.totalBreakages, 0) + 1,
                      totalShardsEarned: toFiniteNumber(prevForge.totalShardsEarned, 0) + salvageShards,
                    },
                    salvageHistory: [...prevHistory, salvageEntry].slice(-SALVAGE_HISTORY_CAP),
                    stabilizers: hasStabilizer
                      ? Math.max(0, toFiniteNumber(prev.enhancement.stabilizers, 0) - 1)
                      : toFiniteNumber(prev.enhancement.stabilizers, 0),
                  },
                };
              });
            } else {
              // FAIL WITH DEGRADATION
              const nextLevel = Math.max(0, currentLevel - 1);

              setEnhanceFailPulse(true);
              setTimeout(() => setEnhanceFailPulse(false), 1000);

              const wasInDanger = currentLevel >= 10;
              const breakChanceDisplay = wasInDanger ? (currentLevel >= 20 ? 70 : 20) : 0;

              setTacticalLogFeed((old) => [
                stabilizerShielded
                  ? `🛡️ [제련 실패 - 보정제 발동] ${item.name} +${currentLevel} 제련 실패! 보정제로 파괴를 막고 등급이 +${nextLevel}로 하락했습니다.`
                  : wasInDanger
                    ? `⚠️ [제련 실패 - 파괴 회피] ${item.name} +${currentLevel} 제련 실패! 파괴 위험 ${breakChanceDisplay}%를 무사히 통과했으나 등급이 +${nextLevel}로 하락했습니다.`
                    : `⚠️ [제련 안정성 충격 감지] ${item.name} +${currentLevel} 제련 실패! 등급이 +${nextLevel}로 하락했습니다.`,
                ...old
              ].slice(0, 10));

              updateGameState((prev) => {
                const prevItem = prev.enhancement.inventory.find(
                  (candidate) => candidate.instanceId === instanceId,
                );
                if (!prevItem) return prev;

                const result = {
                  itemName: prevItem.name,
                  success: false,
                  level: nextLevel,
                  broken: false,
                  salvageShards: 0,
                  prevLevel: currentLevel,
                  cost,
                  baseChance: getEnhanceChance(currentLevel),
                  breakChance: currentLevel >= 20 ? 0.7 : currentLevel >= 10 ? 0.2 : 0,
                  stabilizerUsed: hasStabilizer || stabilizerShielded,
                };
                const prevForge = prev.enhancement.forgeStats || {};

                return {
                  ...prev,
                  wallet: {
                    ...prev.wallet,
                    cash: prev.wallet.cash - cost,
                  },
                  enhancement: {
                    ...prev.enhancement,
                    inventory: prev.enhancement.inventory.map((candidate) =>
                      candidate.instanceId === instanceId
                        ? {
                          ...candidate,
                          enhanceLevel: nextLevel,
                          breakSurvivalCount: wasInDanger
                            ? toFiniteNumber(candidate.breakSurvivalCount, 0) + 1
                            : toFiniteNumber(candidate.breakSurvivalCount, 0),
                        }
                        : candidate,
                    ),
                    lastEnhancementResult: result,
                    forgeStats: {
                      totalAttempts: toFiniteNumber(prevForge.totalAttempts, 0) + 1,
                      totalSuccesses: toFiniteNumber(prevForge.totalSuccesses, 0),
                      totalFailures: toFiniteNumber(prevForge.totalFailures, 0) + 1,
                      totalBreakages: toFiniteNumber(prevForge.totalBreakages, 0),
                      totalShardsEarned: toFiniteNumber(prevForge.totalShardsEarned, 0),
                    },
                    stabilizers: (hasStabilizer || stabilizerShielded)
                      ? Math.max(0, toFiniteNumber(prev.enhancement.stabilizers, 0) - 1)
                      : toFiniteNumber(prev.enhancement.stabilizers, 0),
                  },
                };
              });
            }
          }
        }, 450);
      };

      // J-3G: Salvage a broken weapon manually for additional confirmation
      const salvageBrokenWeapon = (instanceId) => {
        const item = gameState.enhancement.inventory.find(
          (candidate) => candidate.instanceId === instanceId,
        );
        if (!item || item.broken !== true) return;

        updateGameState((prev) => {
          return {
            ...prev,
            enhancement: {
              ...prev.enhancement,
              inventory: prev.enhancement.inventory.filter(
                (candidate) => candidate.instanceId !== instanceId,
              ),
            },
          };
        });
      };

      // J-3G: Toggle weapon lock to prevent accidental destruction
      const toggleWeaponLock = (instanceId) => {
        updateGameState((prev) => {
          return {
            ...prev,
            enhancement: {
              ...prev.enhancement,
              inventory: prev.enhancement.inventory.map((candidate) =>
                candidate.instanceId === instanceId
                  ? { ...candidate, locked: candidate.locked !== true }
                  : candidate,
              ),
            },
          };
        });
      };

      // J-3G: Purchase stabilizer with refined shards (cost: 50 shards each)
      const STABILIZER_CRAFT_COST = 50;
      const craftStabilizer = () => {
        const shards = toFiniteNumber(gameState.enhancement.refinedShards, 0);
        if (shards < STABILIZER_CRAFT_COST) return;
        updateGameState((prev) => ({
          ...prev,
          enhancement: {
            ...prev.enhancement,
            refinedShards: toFiniteNumber(prev.enhancement.refinedShards, 0) - STABILIZER_CRAFT_COST,
            stabilizers: toFiniteNumber(prev.enhancement.stabilizers, 0) + 1,
          },
        }));
      };

      // L-1C: Convert refined shards to black market tokens (100 shards = 1 token)
      const SHARD_TO_TOKEN_RATE = 100;
      const convertShardsToTokens = (amount, stateArg = gameState) => {
        // L-2 QA FIX: Explicit isFinite + isInteger guard — rejects NaN, Infinity, floats
        if (!isFinite(amount) || !Number.isInteger(amount) || amount <= 0) {
          console.warn("convertShardsToTokens: Amount must be a positive integer (got: " + amount + ").");
          return;
        }
        const cleanAmount = amount; // already validated as positive integer above
        const cost = cleanAmount * SHARD_TO_TOKEN_RATE;
        const currentShards = toFiniteNumber(stateArg?.enhancement?.refinedShards, 0);
        if (currentShards < cost) {
          console.warn(`convertShardsToTokens: Insufficient refined shards. Required: ${cost}, Available: ${currentShards}`);
          return;
        }
        updateGameState((prev) => {
          const shards = toFiniteNumber(prev.enhancement?.refinedShards, 0);
          if (shards < cost) {
            console.warn("convertShardsToTokens: State changed before transaction.");
            return prev;
          }
          return {
            ...prev,
            wallet: {
              ...prev.wallet,
              blackMarketTokens: toFiniteNumber(prev.wallet?.blackMarketTokens, 0) + cleanAmount,
            },
            enhancement: {
              ...prev.enhancement,
              refinedShards: shards - cost,
            },
          };
        });
      };
      window.convertShardsToTokens = convertShardsToTokens;

      // J-3I: Confirmation wrapper — danger-zone weapons route through modal
      const requestEnhance = (instanceId, useStabilizer = false) => {
        const item = gameState.enhancement.inventory.find(
          (candidate) => candidate.instanceId === instanceId,
        );
        if (!item || item.type !== "weapon" || item.broken === true || item.locked === true) return;
        const currentLevel = clampNumber(Math.floor(toFiniteNumber(item.enhanceLevel, 0)), 0, MAX_ENHANCE_LEVEL, 0);
        if (currentLevel >= MAX_ENHANCE_LEVEL) return;
        
        // Live risk ladder: danger zone is target level +11 and up (currentLevel >= 10)
        const isDangerZone = currentLevel >= 10;
        if (isDangerZone) {
          const breakPct = currentLevel >= 20 ? 70 : 20;
          // Danger zone — show confirmation modal
          setForgeConfirmTarget({
            instanceId,
            useStabilizer,
            itemName: item.name,
            level: currentLevel,
            breakPct,
            successPct: Math.round((getEnhanceChance(currentLevel) + (useStabilizer ? STABILIZER_SUCCESS_BONUS : 0)) * 100),
            stabCount: toFiniteNumber(gameState.enhancement.stabilizers, 0),
          });
        } else {
          // Safe zone — enhance directly
          enhanceWeaponItem(instanceId, useStabilizer);
        }
      };

      // J-3I: Bulk salvage all broken unlocked weapons
      const bulkSalvageBrokenWeapons = () => {
        const brokenUnlocked = gameState.enhancement.inventory.filter(
          (item) => item.broken === true && item.locked !== true,
        );
        if (brokenUnlocked.length === 0) return;
        updateGameState((prev) => {
          const brokenUnlockedIds = new Set(
            prev.enhancement.inventory
              .filter((item) => item.broken === true && item.locked !== true)
              .map((item) => item.instanceId),
          );
          return {
            ...prev,
            enhancement: {
              ...prev.enhancement,
              inventory: prev.enhancement.inventory.filter(
                (item) => !brokenUnlockedIds.has(item.instanceId),
              ),
            },
          };
        });
      };

      const equipWeaponToCharacter = (characterInstanceId, weaponInstanceId) => {
        updateGameState((prev) => {
          const characterExists = prev.rpg.characters.some(
            (character) => character.instanceId === characterInstanceId,
          );
          const weapon = prev.enhancement.inventory.find(
            (item) =>
              item.instanceId === weaponInstanceId && item.type === "weapon",
          );
          if (!characterExists || !weapon) return prev;
          if (weapon.broken === true) return prev; // J-3G: broken weapons cannot be equipped

          return {
            ...prev,
            rpg: {
              ...prev.rpg,
              characters: prev.rpg.characters.map((character) => {
                if (character.instanceId === characterInstanceId) {
                  return {
                    ...character,
                    equippedWeaponInstanceId: weapon.instanceId,
                  };
                }
                if (character.equippedWeaponInstanceId === weapon.instanceId) {
                  return {
                    ...character,
                    equippedWeaponInstanceId: null,
                  };
                }
                return character;
              }),
            },
          };
        });
      };

      const unequipWeaponFromCharacter = (characterInstanceId) => {
        updateGameState((prev) => ({
          ...prev,
          rpg: {
            ...prev.rpg,
            characters: prev.rpg.characters.map((character) =>
              character.instanceId === characterInstanceId
                ? { ...character, equippedWeaponInstanceId: null }
                : character,
            ),
          },
        }));
      };

      const acknowledgeDorothyProposal = () => {
        updateGameState((prev) => ({
          ...prev,
          rpg: {
            ...prev.rpg,
            normalEndingSeen: true,
          },
        }));
      };

      const handleRestart = () => {
        const newDefaults = createDefaultGameState(language);
        setGameState({
          ...newDefaults,
          settings: {
            ...newDefaults.settings,
            language: gameState.settings?.language || language,
          }
        });
      };

      const buyRpgUpgrade = (key) => {
        const validKeys = ["atkLevel", "spdLevel", "penLevel"];
        if (!validKeys.includes(key)) return;

        updateGameState((prev) => {
          if (!prev.rpg?.upgrades) return prev;
          const currentLevel = toFiniteNumber(prev.rpg.upgrades[key], 0);
          const cost = getRpgUpgradeCost(key, currentLevel);
          const currentDividends = toFiniteNumber(prev.rpg.dividends, 0);

          if (currentDividends < cost) return prev;

          return {
            ...prev,
            rpg: {
              ...prev.rpg,
              dividends: currentDividends - cost,
              upgrades: {
                ...prev.rpg.upgrades,
                [key]: currentLevel + 1,
              },
            },
          };
        });
      };

      const renderSparkline = (history) => {
        const points = normalizePriceHistory(history, 1);
        const min = Math.min(...points);
        const max = Math.max(...points);
        const range = Math.max(1, max - min);
        const path = points
          .map((point, index) => {
            const x =
              points.length === 1
                ? 100
                : (index / (points.length - 1)) * 200;
            const y = 56 - ((point - min) / range) * 48;
            return `${index === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
          })
          .join(" ");

        return (
          <svg
            viewBox="0 0 200 64"
            className="w-full h-16 mt-4"
            role="img"
            aria-label="Recent price history"
          >
            <path
              d="M 0 56 L 200 56"
              stroke="#e5e7eb"
              strokeWidth="1"
              fill="none"
            />
            <path
              d={path}
              stroke="#0f766e"
              strokeWidth="3"
              fill="none"
              strokeLinecap="round"
              strokeLinejoin="round"
            />
          </svg>
        );
      };

      const rarityTextClass = (rarity) => {
        if (rarity === "Mythic") return "text-emerald-800";
        if (rarity === "Legendary") return "text-emerald-700";
        if (rarity === "Unique") return "text-emerald-600";
        if (rarity === "Epic") return "text-green-700";
        if (rarity === "Rare") return "text-green-600";
        return "text-gray-600";
      };

      function formatMoney(val) {
        return new Intl.NumberFormat(t.format, {
          style: "currency",
          currency: t.currency,
          maximumFractionDigits: 0,
        }).format(val);
      }

      const defenseStabilityIndex = Math.round(
        Math.min(100, Math.max(0,
          50 + investmentAssets.reduce((s, a) => s + a.gainLossPercent, 0) / Math.max(1, investmentAssets.length)
        ))
      );
      const heroSurvivalIndex = Math.min(100, Math.round(
        ((gameState.rpg?.highestStage || 0) / NORMAL_ENDING_STAGE) * 100
      ));
      const raidConfidence = Math.round(
        Math.min(100, Math.max(10,
          totalNetWorth > 0 ? Math.min(100, (totalPortfolioValue / Math.max(1, totalNetWorth)) * 100) : 20
        ))
      );
      const dominantFaction = (() => {
        const entries = Object.entries(ownedFactionCounts);
        if (entries.length === 0) return "None";
        return entries.sort((a, b) => b[1] - a[1])[0][0];
      })();
      const capitalPressure = totalNetWorth > 0
        ? Math.round(Math.min(100, Math.max(0, (1 - cash / Math.max(1, totalNetWorth)) * 100)))
        : 0;

      const tabs = [
        { id: "landlord", label: ui.tabLandlord },
        { id: "investment", label: ui.tabInvestment },
        { id: "enhancement", label: ui.tabEnhancement },
        { id: "rpg", label: ui.tabRpg },
      ];

      return (
        <div className="w-full max-w-4xl flex flex-col items-center relative">
          {gameState.meta?.gameOver && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
              <div className="w-full max-w-sm bg-gray-900 border-2 border-red-900/50 rounded-2xl p-8 shadow-2xl animate-in fade-in zoom-in duration-300">
                <div className="flex flex-col items-center text-center">
                  <div className="w-20 h-20 bg-red-900/20 rounded-full flex items-center justify-center mb-6 border border-red-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                  </div>

                  <h2 className="text-2xl font-black text-white uppercase tracking-tighter mb-2 italic">
                    {t.gameOverTitle}
                  </h2>

                  <p className="text-gray-400 text-sm font-bold leading-relaxed mb-8">
                    {t.gameOverReason}
                  </p>

                  <div className="w-full bg-black/40 rounded-xl p-4 mb-8 border border-white/5 space-y-3">
                    <div className="flex justify-between items-center text-xs font-bold">
                      <span className="text-gray-500 uppercase">{t.gameOverContract}</span>
                      <span className="text-red-400">{gameState.meta.gameOver.contractName}</span>
                    </div>
                    <div className="flex justify-between items-center text-xs font-bold">
                      <span className="text-gray-500 uppercase">{t.gameOverStake}</span>
                      <span className="text-white font-black">{formatMoney(gameState.meta.gameOver.stake)}</span>
                    </div>
                    <div className="flex justify-between items-center text-xs font-bold">
                      <span className="text-gray-500 uppercase">{t.gameOverOdds}</span>
                      <span className="text-gray-300 font-black">{gameState.meta.gameOver.odds}%</span>
                    </div>
                  </div>

                  <button
                    onClick={handleRestart}
                    className="w-full py-4 bg-white hover:bg-gray-100 text-black font-black text-sm rounded-xl transition-all uppercase tracking-widest shadow-lg shadow-white/5 active:scale-95"
                  >
                    {t.restartButton}
                  </button>

                  <p className="mt-6 text-[10px] font-black text-gray-600 uppercase tracking-widest opacity-50">
                    자본전선: 데드라인 / Capital Front: Deadline
                  </p>
                </div>
              </div>
            </div>
          )}

          {showSettlementConfirm && simulatedOutcome && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[110] flex items-center justify-center p-6">
              <div className="w-full max-w-sm bg-gray-900 border-2 border-emerald-900/50 rounded-2xl p-8 shadow-2xl animate-in fade-in zoom-in duration-300">
                <div className="flex flex-col items-center text-center">
                  <div className="w-16 h-16 bg-emerald-900/20 rounded-full flex items-center justify-center mb-6 border border-emerald-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                  </div>

                  <h2 className="text-xl font-black text-white uppercase tracking-tighter mb-2">
                    {t.confirmSettlementTitle}
                  </h2>

                  <div className="bg-red-950/40 border border-red-900/50 rounded-lg px-4 py-2 mb-6">
                    <p className="text-red-400 text-[11px] font-black uppercase animate-pulse">
                      {t.confirmSettlementWarning}
                    </p>
                  </div>

                  <p className="text-gray-400 text-xs font-bold leading-relaxed mb-8 px-2">
                    {t.confirmSettlementDesc}
                  </p>

                  <div className="w-full bg-black/40 rounded-xl p-4 mb-8 border border-white/5 space-y-3 text-left">
                    <div className="flex justify-between items-center text-xs font-bold">
                      <span className="text-gray-500 uppercase">{ui.defenseContracts}</span>
                      <span className="text-emerald-400">{simulatedOutcome.contractName}</span>
                    </div>
                    <div className="flex justify-between items-center text-xs font-bold">
                      <span className="text-gray-500 uppercase">{ui.stakeAmount}</span>
                      <span className="text-white font-black">{formatMoney(simulatedOutcome.stake)}</span>
                    </div>
                    <div className="flex justify-between items-center text-xs font-bold">
                      <span className="text-gray-500 uppercase">{ui.successChance}</span>
                      <span className="text-gray-300 font-black">{simulatedOutcome.odds}%</span>
                    </div>
                    <div className="flex justify-between items-center text-xs font-bold border-t border-white/5 pt-2 mt-2">
                      <span className="text-gray-500 uppercase">{ui.projectedWin}</span>
                      <span className="text-emerald-500 font-black">+{formatMoney(simulatedOutcome.stake * (simulatedOutcome.projectedPayout - 1))}</span>
                    </div>
                  </div>

                  <div className="w-full space-y-3">
                    <button
                      onClick={() => {
                        settleDefenseContract();
                        setShowSettlementConfirm(false);
                      }}
                      className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-sm rounded-xl transition-all uppercase tracking-widest shadow-lg shadow-emerald-900/20 active:scale-95"
                    >
                      {t.confirmButton}
                    </button>
                    <button
                      onClick={() => setShowSettlementConfirm(false)}
                      className="w-full py-3 bg-transparent hover:bg-white/5 text-gray-500 font-bold text-xs rounded-xl transition-all uppercase tracking-widest active:scale-95"
                    >
                      {t.cancelButton}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* J-3I: Forge Danger Zone Confirmation Modal */}
          {forgeConfirmTarget && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-[110] flex items-center justify-center p-6">
              <div className={`w-full max-w-sm bg-gray-900 rounded-2xl p-8 shadow-2xl animate-in fade-in zoom-in duration-300 border-2 ${
                forgeConfirmTarget.breakPct >= 70
                  ? "border-red-600 shadow-[0_0_25px_rgba(220,38,38,0.5)] animate-pulse"
                  : "border-red-900/50"
              }`}>
                <div className="flex flex-col items-center text-center">
                  <div className={`w-16 h-16 rounded-full flex items-center justify-center mb-6 border ${
                    forgeConfirmTarget.breakPct >= 70
                      ? "bg-red-950/40 border-red-500"
                      : "bg-red-900/20 border-red-500/30"
                  }`}>
                    <span className="text-3xl">{forgeConfirmTarget.breakPct >= 70 ? "🚨" : "⚠️"}</span>
                  </div>

                  <h2 className="text-xl font-black text-white uppercase tracking-tighter mb-2">
                    {forgeConfirmTarget.breakPct >= 70
                      ? (language === "ko" ? "극도 위험 제련 확인" : "EXTREME RISK FORGE")
                      : (language === "ko" ? "위험 구간 제련 확인" : "DANGER ZONE FORGE")}
                  </h2>

                  <div className={`border rounded-lg px-4 py-2 mb-6 ${
                    forgeConfirmTarget.breakPct >= 70 ? "bg-red-950/60 border-red-600 animate-bounce" : "bg-red-950/40 border-red-900/50"
                  }`}>
                    <p className="text-red-400 text-[11px] font-black uppercase tracking-wider">
                      {forgeConfirmTarget.breakPct >= 70
                        ? (language === "ko" ? "🚨 무기 영구 파괴 위험 70%! 🚨" : "🚨 70% CHANCE OF PERMANENT SHATTER! 🚨")
                        : (language === "ko" ? "무기가 파괴될 수 있습니다!" : "WEAPON MAY BE DESTROYED!")}
                    </p>
                  </div>

                  <div className="w-full bg-black/40 rounded-xl p-4 mb-6 border border-white/5 space-y-3 text-left">
                    <div className="flex justify-between items-center text-xs font-bold">
                      <span className="text-gray-500 uppercase">{language === "ko" ? "무기" : "Weapon"}</span>
                      <span className="text-white truncate ml-2">{forgeConfirmTarget.itemName} +{forgeConfirmTarget.level}</span>
                    </div>
                    <div className="flex justify-between items-center text-xs font-bold">
                      <span className="text-gray-500 uppercase">{language === "ko" ? "성공 확률" : "Success"}</span>
                      <span className="text-emerald-400 font-black">{forgeConfirmTarget.successPct}%</span>
                    </div>
                    <div className="flex justify-between items-center text-xs font-bold border-t border-white/5 pt-2">
                      <span className="text-gray-500 uppercase">{language === "ko" ? "파괴 확률" : "Break Risk"}</span>
                      <span className="text-red-400 font-black">{forgeConfirmTarget.breakPct}%</span>
                    </div>
                    {forgeConfirmTarget.useStabilizer ? (
                      <div className="flex justify-between items-center text-xs font-bold border-t border-cyan-900/30 pt-2">
                        <span className="text-cyan-500 uppercase">{language === "ko" ? "🛡️ 보정제 적용" : "🛡️ Stabilizer Active"}</span>
                        <span className="text-cyan-400 font-black">{language === "ko" ? "파괴 방지 + 성공률 +3%" : "Break protection + 3% success"}</span>
                      </div>
                    ) : (
                      <div className="flex justify-between items-center text-xs font-bold border-t border-red-950 pt-2">
                        <span className="text-red-500 uppercase">{language === "ko" ? "⚠️ 보정제 미사용" : "⚠️ NO STABILIZER"}</span>
                        <span className="text-red-400 font-black">{language === "ko" ? "파괴 방지 없음!" : "No Break Protection!"}</span>

                            </div>
                            <div>
                              <div className="text-[8px] font-bold text-gray-500 uppercase">{language === "ko" ? "안정제 및 파편" : "Stab. / Shards"}</div>
                              <div className={`text-[10px] font-black ${resourceColor}`}>📦 {stabilizers} <span className="text-[8px] font-bold text-gray-500">({refinedShards}S)</span></div>
                            </div>
                            <div>
                              <div className="text-[8px] font-bold text-gray-500 uppercase">{language === "ko" ? "최고 기록" : "Highest Stage"}</div>
                              <div className={`text-[10px] font-black ${stageColor}`}>Stage {highestStage} <span className="text-[8px] font-bold text-gray-500">/ 100</span></div>
                            </div>
                          </div>

                          <div className="text-[9px] font-bold text-yellow-500/80 italic mb-3 bg-yellow-950/20 border border-yellow-800/10 px-2 py-1 rounded">
                            📌 {recommendation}
                          </div>

                          {runState.isActive ? (
                            <button
                              disabled
                              className="w-full py-2 bg-gray-900 border border-gray-800 text-gray-500 font-black text-xs rounded uppercase tracking-wider cursor-not-allowed text-center"
                            >
                              {language === "ko" ? "전투 작전 진행 중" : "COMBAT RUN ACTIVE"}
                            </button>
                          ) : runTickets <= 0 ? (
                            <button
                              disabled
                              className="w-full py-2 bg-gray-900 border border-gray-800 text-red-400/60 font-black text-xs rounded uppercase tracking-wider cursor-not-allowed text-center"
                            >
                              ❌ {language === "ko" ? "작전 티켓 부족" : "NO TICKETS AVAILABLE"}
                            </button>
                          ) : (status === "READY" || status === "EXTREME_RISK") ? (
                            <button
                              onClick={enterReaperStage}
                              className="w-full py-2 bg-gradient-to-r from-rose-800 to-rose-700 hover:from-rose-700 hover:to-rose-600 text-white font-black text-xs rounded uppercase tracking-wider shadow-lg shadow-rose-950/30 transition-all text-center border border-rose-600/30 hover:scale-[1.01] active:scale-95"
                            >
                              🔥 {language === "ko" ? "Stage 101+ 진입 (티켓 1 소모)" : "Enter Stage 101+ (Spend 1 Ticket)"}
                            </button>
                          ) : (
                            <button
                              disabled
                              className="w-full py-2 bg-gray-950 border border-red-950/60 text-red-500/50 font-black text-xs rounded uppercase tracking-wider cursor-not-allowed text-center"
                            >
                              ⛔ {language === "ko" ? "진입 제한 (준비 부족)" : "RESTRICTED (Underprepared)"}
                            </button>
                          )}
                        </div>
                      );
                    }
                    return null;
                  })()}

                  {/* Reaper Run Objective Panel */}
                  {(() => {
                    const stage = toFiniteNumber(gameState.rpg?.currentStage, 0);
                    const normalEndingSeen = gameState.rpg?.normalEndingSeen === true;
                    if (!normalEndingSeen || stage < 101) return null;

                    const objective = getReaperRunObjective(stage, language);
                    const milestone = getNextReaperMilestone(stage, language);
                    const rewardHint = getReaperRewardLoopHint(stage, language);
                    const bestWeaponLvl = getBestWeaponEnhanceLevel(gameState.enhancement?.inventory);

                    let forgeSignal = "";
                    if (bestWeaponLvl >= 30) {
                      forgeSignal = language === "ko" ? "+30 무기 완성 시 최대 효율 달성." : "+30 weapon fully complete for max efficiency.";
                    } else if (bestWeaponLvl >= 20) {
                      forgeSignal = language === "ko" ? "+20 이상 무기 확보 시 Iron Sentinel 도전 가능." : "+20 or higher weapon allows challenging Iron Sentinel.";
                    } else {
                      forgeSignal = language === "ko" ? "+20 이상 무기 확보 권장 (현재 무기 수준 낮음)." : "Recommend reaching +20 or higher weapon (current tier is low).";
                    }

                    return (
                      <div className="mt-3 bg-rose-950/20 border border-rose-900/50 rounded-lg p-3 text-left">
                        <div className="text-[10px] font-black text-rose-400 uppercase tracking-widest mb-2 flex items-center justify-between">
                          <span>🎯 {language === "ko" ? "리퍼 전선 돌파 목표" : "Reaper Front Objective"}</span>
                          <span className="text-[8px] bg-rose-900/50 text-rose-300 px-1 py-0.5 rounded font-bold uppercase">
                            {language === "ko" ? "생존 작전" : "Survival Op"}
                          </span>
                        </div>
                        
                        {/* 1. CURRENT SURVIVAL OBJECTIVE */}
                        <div className="mb-2 pb-2 border-b border-rose-950/25">
                          <div className="text-[8px] font-bold text-gray-500 uppercase">{language === "ko" ? "현재 생존 목표" : "Current Survival Objective"}</div>
                          <div className="text-[10px] font-black text-slate-100 mt-0.5">
                            {objective}
                          </div>
                        </div>
                        
                        {/* 2. NEXT MILESTONE TARGET */}
                        <div className="mb-2 pb-2 border-b border-rose-950/25">
                          <div className="text-[8px] font-bold text-gray-500 uppercase">{language === "ko" ? "다음 목표 임계점" : "Next Milestone Target"}</div>
                          <div className="flex items-center justify-between mt-0.5 gap-2">
                            <span className="text-[10px] font-black text-amber-400">Stage {milestone.targetStage}</span>
                            <span className={`text-[9px] ${milestone.isPreview ? "text-red-400/60 font-bold tracking-tight italic" : "text-slate-200 font-bold"}`}>
                              {milestone.label} {milestone.isPreview && (language === "ko" ? " (잠금 프리뷰)" : " (Locked Preview)")}
                            </span>
                          </div>
                        </div>
                        
                        {/* 3. REWARD LOOP EXPLANATION */}
                        <div className="mb-2 pb-2 border-b border-rose-950/25 text-[9px] font-medium text-slate-300 leading-normal">
                          <div className="text-[8px] font-bold text-gray-500 uppercase mb-0.5">{language === "ko" ? "보상 루프 안내" : "Reward Loop Explanation"}</div>
                          <div>• {rewardHint.line1}</div>
                          <div>• {rewardHint.line2}</div>
                        </div>
                        
                        {/* 4. FORGE CONNECTION SIGNAL */}
                        <div>
                          <div className="text-[8px] font-bold text-gray-500 uppercase">{language === "ko" ? "강화 연동 전술 신호" : "Forge Connection Signal"}</div>
                          <div className="text-[9px] font-black text-cyan-400 mt-0.5 flex items-center gap-1.5">
                            <span>⚒️</span>
                            <span>{forgeSignal}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>

                {/* Phase J-4C: Frontline Command First-Click Guidance */}
                <div className="w-full bg-slate-950/90 border-b border-slate-800 p-3.5 shadow-md text-left">
                  <div className="flex items-center gap-2 mb-1.5">
                    <span className="text-emerald-400 text-xs animate-pulse">🌲</span>
                    <span className="text-[10px] font-black text-emerald-400 tracking-wider uppercase">
                      {language === "ko" ? "최전방 전선 지휘 가이드" : "FRONT DEFENSE COMMAND GUIDE"}
                    </span>
                  </div>
                  <div className="space-y-1 text-xs">
                    <div>
                      <span className="font-bold text-emerald-400 mr-1.5">⚡ {language === "ko" ? "첫 행동:" : "Primary:"}</span>
                      <span className="text-slate-100">
                        {language === "ko"
                          ? "전선 지휘 런 컨트롤에서 [전선 방어 작전 개시]를 클릭해 방어전을 시작하세요."
                          : "Click [START DEFENSE RUN] under run controls to begin active frontline defense."}
                      </span>
                    </div>
                    <div>
                      <span className="font-bold text-slate-500 mr-1.5">🎯 {language === "ko" ? "다음 목표:" : "Secondary:"}</span>
                      <span className="text-slate-400">
                        {language === "ko"
                          ? "수급한 전투 배당금(DIV)으로 전투 특성(ATK/SPD/PEN)을 훈련하여 전투력을 강화하세요."
                          : "Spend earned dividends (DIV) on RPG combat upgrades (ATK/SPD/PEN) to reinforce the front."}
                      </span>
                    </div>
                  </div>
                </div>

                <div className="bg-gray-50 p-4 space-y-4">
                  {/* Phase J-4D: Frontline Command scrolling military ticker log */}
                  <div className="bg-slate-950 border border-slate-800 rounded-lg p-3 shadow-lg text-left">
                    <div className="flex items-center justify-between border-b border-slate-800 pb-1.5 mb-2">
                      <div className="flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-full bg-red-500 animate-ping"></span>
                        <span className="text-[10px] font-black text-red-500 tracking-widest uppercase">TACTICAL OPERATIONS FEED</span>
                      </div>
                      <span className="text-[8px] font-mono text-slate-500 uppercase">SYS_STATUS: ONLINE</span>
                    </div>

                    <div className="h-28 overflow-y-auto space-y-1.5 custom-scrollbar text-[10px] font-mono">
                      {tacticalLogFeed.map((log, idx) => (
                        <div key={idx} className={`flex items-start gap-2 py-0.5 border-b border-slate-900 last:border-b-0 ${idx === 0 ? "text-emerald-400 font-bold" : "text-slate-400"}`}>
                          <span className="text-slate-600 shrink-0 select-none">[{new Date().toLocaleTimeString()}]</span>
                          <span className="break-all">{log}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="bg-white border border-gray-100 rounded-lg overflow-hidden shadow-sm">
                    <div className="bg-gray-100 px-3 py-2 border-b border-gray-200">
                      <h2 className="text-[10px] font-black text-gray-500 uppercase tracking-widest">
                        {ui.battleStatPreview}
                      </h2>
                    </div>
                    <div className="p-3 grid grid-cols-2 gap-3">
                      <div className="bg-gray-50 p-2 rounded border border-gray-100">
                        <div className="text-[9px] font-black text-gray-400 uppercase">{ui.teamAtk}</div>
                        <div className="text-sm font-black text-gray-800">{formatDps(combatStats.atk)}</div>
                      </div>
                      <div className="bg-gray-50 p-2 rounded border border-gray-100">
                        <div className="text-[9px] font-black text-gray-400 uppercase">{ui.combatFreq}</div>
                        <div className="text-sm font-black text-emerald-600">x{combatStats.spd.toFixed(2)}</div>
                      </div>
                      <div className="bg-gray-50 p-2 rounded border border-gray-100">
                        <div className="text-[9px] font-black text-gray-400 uppercase">{ui.penetration}</div>
                        <div className="text-sm font-black text-emerald-600">{(combatStats.pen * 100).toFixed(1)}%</div>
                        <div className="text-[8px] font-bold text-gray-400 uppercase mt-0.5">{ui.preview}</div>
                      </div>
                      <div className="bg-gray-50 p-2 rounded border border-gray-100">
                        <div className="text-[9px] font-black text-gray-400 uppercase">{ui.accuracy}</div>
                        <div className="text-sm font-black text-emerald-600">{(combatStats.acc * 100).toFixed(0)}%</div>
                        <div className="text-[8px] font-bold text-gray-400 uppercase mt-0.5">{ui.preview}</div>
                      </div>
                      <div className="bg-gray-50 p-2 rounded border border-gray-100 col-span-2">
                        <div className="text-[9px] font-black text-gray-400 uppercase">{ui.criticalChance}</div>
                        <div className="text-sm font-black text-emerald-700">{(combatStats.crt * 100).toFixed(1)}%</div>
                        <div className="text-[8px] font-bold text-gray-400 uppercase mt-0.5">{ui.includesRarityBonus}</div>
                      </div>
                    </div>
                  </div>
                  <section className="bg-white border border-gray-100 rounded-lg overflow-hidden shadow-sm">
                    <div className="bg-emerald-800 text-white p-3 flex justify-between items-center">
                      <h2 className="text-xs font-black uppercase tracking-widest">
                        {ui.dividendsUpgrades}
                      </h2>
                      <div className="text-emerald-200 font-black text-sm">
                        {formatDps(gameState.rpg?.dividends || 0)} DIV
                      </div>
                    </div>
                    <div className="p-3 space-y-3">
                      {/* ATK Upgrade */}
                      <div className="flex items-center justify-between gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div>
                          <div className="text-xs font-black text-gray-800 uppercase">
                            {ui.atkBoost} (Lv.{getRpgUpgradeLevel(gameState, "atkLevel")})
                          </div>
                          <div className="text-[10px] font-bold text-emerald-600">
                            {ui.teamDpsMultiplier}: x{getRpgUpgradeEffect("atkLevel", getRpgUpgradeLevel(gameState, "atkLevel")).toFixed(2)}
                          </div>
                        </div>
                        <button
                          onClick={() => buyRpgUpgrade("atkLevel")}
                          disabled={(gameState.rpg?.dividends || 0) < getRpgUpgradeCost("atkLevel", getRpgUpgradeLevel(gameState, "atkLevel"))}
                          className={`px-4 py-2 rounded-md font-black text-xs transition-all ${(gameState.rpg?.dividends || 0) >= getRpgUpgradeCost("atkLevel", getRpgUpgradeLevel(gameState, "atkLevel")) ? "bg-emerald-600 text-white shadow-sm hover:bg-emerald-700" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
                        >
                          {formatDps(getRpgUpgradeCost("atkLevel", getRpgUpgradeLevel(gameState, "atkLevel")))}
                        </button>
                      </div>

                      {/* SPD Upgrade */}
                      <div className="flex items-center justify-between gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div>
                          <div className="text-xs font-black text-gray-800 uppercase">
                            {ui.spdBoost} (Lv.{getRpgUpgradeLevel(gameState, "spdLevel")})
                          </div>
                          <div className="text-[10px] font-bold text-emerald-600">
                            {ui.combatFreqMultiplier}: x{getRpgUpgradeEffect("spdLevel", getRpgUpgradeLevel(gameState, "spdLevel")).toFixed(2)}
                          </div>
                        </div>
                        <button
                          onClick={() => buyRpgUpgrade("spdLevel")}
                          disabled={(gameState.rpg?.dividends || 0) < getRpgUpgradeCost("spdLevel", getRpgUpgradeLevel(gameState, "spdLevel"))}
                          className={`px-4 py-2 rounded-md font-black text-xs transition-all ${(gameState.rpg?.dividends || 0) >= getRpgUpgradeCost("spdLevel", getRpgUpgradeLevel(gameState, "spdLevel")) ? "bg-emerald-600 text-white shadow-sm hover:bg-emerald-700" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
                        >
                          {formatDps(getRpgUpgradeCost("spdLevel", getRpgUpgradeLevel(gameState, "spdLevel")))}
                        </button>
                      </div>

                      {/* PEN Upgrade */}
                      <div className="flex items-center justify-between gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100 opacity-80">
                        <div>
                          <div className="text-xs font-black text-gray-800 uppercase">
                            {ui.penBoost} (Lv.{getRpgUpgradeLevel(gameState, "penLevel")})
                          </div>
                          <div className="text-[10px] font-bold text-emerald-600">
                            {ui.defPenetration}: {(getRpgUpgradeEffect("penLevel", getRpgUpgradeLevel(gameState, "penLevel")) * 100).toFixed(1)}%
                          </div>
                          <div className="text-[8px] font-black text-gray-400 uppercase mt-1">
                            * {ui.readyForInfiniteMode}
                          </div>
                        </div>
                        <button
                          onClick={() => buyRpgUpgrade("penLevel")}
                          disabled={(gameState.rpg?.dividends || 0) < getRpgUpgradeCost("penLevel", getRpgUpgradeLevel(gameState, "penLevel"))}
                          className={`px-4 py-2 rounded-md font-black text-xs transition-all ${(gameState.rpg?.dividends || 0) >= getRpgUpgradeCost("penLevel", getRpgUpgradeLevel(gameState, "penLevel")) ? "bg-emerald-700 text-white shadow-sm hover:bg-emerald-800" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
                        >
                          {formatDps(getRpgUpgradeCost("penLevel", getRpgUpgradeLevel(gameState, "penLevel")))}
                        </button>
                      </div>
                    </div>
                  </section>

                  <div className="bg-white border border-gray-200 rounded-lg p-4">
                    <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">
                      {ui.topSquad}
                    </h2>
                    {top5Characters.length > 0 ? (
                      <div className="space-y-2">
                        {top5Characters.map((char, index) => (
                          <div
                            key={char.instanceId}
                            className="flex items-center justify-between gap-3 bg-gray-50 rounded-md p-3 border-l-4 border-emerald-500"
                          >
                            <div className="flex items-center gap-3">
                              <div className="bg-emerald-100 text-emerald-700 w-6 h-6 flex items-center justify-center rounded-full text-xs font-black">
                                {index + 1}
                              </div>
                              <div>
                                <div className="font-black text-gray-800 text-sm">
                                  {char.name}
                                </div>
                                <div
                                  className={`text-[10px] font-bold uppercase ${rarityTextClass(char.rarityLabel)}`}
                                >
                                  {char.rarityLabel} / Lv {char.level}
                                </div>
                                <div className="text-[10px] font-bold text-gray-400">
                                  {char.definition.faction} /
                                  {char.equippedWeapon
                                    ? char.equippedWeapon.name
                                    : ui.noWeapon}
                                </div>
                              </div>
                            </div>
                            <div className="text-right">
                              <div className="text-[10px] font-bold text-gray-400 uppercase">
                                DPS
                              </div>
                              <div className="font-black text-emerald-600">
                                {formatDps(char.totalDps)}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="py-8 text-center font-bold text-gray-400">
                        {ui.startRunToDeploy}
                      </div>
                    )}
                  </div>

                  <div className="bg-white border border-gray-200 rounded-lg p-4">
                    <div className="flex items-center justify-between mb-3">
                      <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest">
                        {ui.recentRunResults}
                      </h2>
                      <div className="text-xs font-black text-gray-500">
                        {runResultHistory.length}
                      </div>
                    </div>
                    {runResultHistory.length > 0 ? (
                      <div className="space-y-2">
                        {[...runResultHistory].reverse().map((entry) => (
                          <div
                            key={entry.id}
                            className="bg-gray-50 rounded-md p-3 flex items-center justify-between gap-3"
                          >
                            <div>
                              <div className="font-black text-gray-800 text-sm">
                                {entry.result === "clear" ? ui.clearedRun : ui.retreatedRun}
                              </div>
                              <div className="text-[10px] font-bold text-gray-400 uppercase">
                                {language === "ko"
                                  ? `???? ${entry.stage} / ?? ${entry.defeatedMonsters}`
                                  : `Stage ${entry.stage} / ${entry.defeatedMonsters} kills`}
                              </div>
                            </div>
                            <div className="text-[10px] font-black text-emerald-700">
                              {new Date(
                                toFiniteNumber(entry.createdAt, Date.now()),
                              ).toLocaleTimeString()}
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="py-6 text-center font-bold text-gray-400">
                        {ui.noRunHistory}
                      </div>
                    )}
                  </div>

                  <div className="bg-white border border-gray-200 rounded-lg p-4">
                    <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
                      {ui.battleNotice}
                    </h2>
                    <p className="text-xs text-gray-500 leading-relaxed">
                      Active combat and stage progression are currently in
                      development. DPS values shown here are derived from base
                      stats, levels, weapon power, and active synergies.
                    </p>
                  </div>
                </div>
              </section>
            )}
          </div>

          {/* Tab-specific SEO content for search engines */}
          {SEO_TAB_CONTENT[language]?.[activeTab] ?? null}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GameApp />);
  </script>
</body>

</html>
