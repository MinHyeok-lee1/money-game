      function createDefaultGameState(language = "en") {

      }

      function toFiniteNumber(value, fallback = 0) {
        const number = Number(value);
        return Number.isFinite(number) ? number : fallback;
      }

      function formatDps(val) {
        const n = toFiniteNumber(val, 0);
        if (n <= 0) return "0";
        if (n < 1000000) return Math.floor(n).toLocaleString();
        if (n < 1e12) {
          return new Intl.NumberFormat("en-US", {
            notation: "compact",
            maximumFractionDigits: 2,
          }).format(n);
        }
        return n.toExponential(2);
      }

      function clampNumber(value, min, max, fallback = min) {
        const number = toFiniteNumber(value, fallback);
        return Math.min(max, Math.max(min, number));
      }

      function toOwnedQuantity(value) {
        return Math.max(0, Math.floor(toFiniteNumber(value, 0)));
      }

      function toSafePrice(value, fallbackPrice) {
        return Math.max(0, toFiniteNumber(value, fallbackPrice));
      }

      function normalizePriceHistory(history, fallbackPrice) {
        const safeFallback = Math.max(1, Math.round(fallbackPrice));
        const source = Array.isArray(history) ? history : [];
        const cleaned = source
          .map((point) => Math.round(toFiniteNumber(point, safeFallback)))
          .filter((point) => Number.isFinite(point) && point > 0)
          .slice(-INVESTMENT_HISTORY_LIMIT);

        return cleaned.length > 0 ? cleaned : [safeFallback];
      }

      function normalizeGachaItem(item, fallbackIndex = 0) {
        const definition = GACHA_ITEMS.find((candidate) => candidate.id === item?.id);
        if (!definition) return null;
        const characterDefinition =
          definition.type === "character"
            ? getCharacterDefinition(definition.characterId)
            : null;
        if (definition.type === "character" && !characterDefinition) return null;
        const enhanceLevel = clampNumber(
          Math.floor(toFiniteNumber(item.enhanceLevel, 0)),
          0,
          MAX_ENHANCE_LEVEL,
          0,
        );

        return {
          instanceId:
            typeof item.instanceId === "string" && item.instanceId.length > 0
              ? item.instanceId
              : `${definition.id}-${fallbackIndex}`,
          id: definition.id,
          characterId: characterDefinition?.id,
          name: definition.name,
          type: definition.type,
          weaponType: definition.weaponType || null,
          rarity: definition.rarity,
          power: Math.max(0, toFiniteNumber(item.power, definition.power)),
          enhanceLevel,
        };
      }

      function normalizeInventoryItem(item, fallbackIndex = 0) {
        const normalizedItem = normalizeGachaItem(item, fallbackIndex);
        if (!normalizedItem || normalizedItem.type === "character") return null;
        return normalizedItem;
      }

      function normalizeRecentPulls(pulls) {
        const source = Array.isArray(pulls) ? pulls : [];
        return source
          .map((item, index) => normalizeGachaItem(item, index))
          .filter(Boolean)
          .slice(-GACHA_RECENT_PULL_LIMIT);
      }

      function ensureUniqueGachaInstanceIds(items) {
        const seen = new Set();

        return items.map((item, index) => {
          const baseInstanceId =
            typeof item.instanceId === "string" && item.instanceId.length > 0
              ? item.instanceId
              : `${item.id}-${index}`;
          const instanceId = seen.has(baseInstanceId)
            ? `${baseInstanceId}-${index}`
            : baseInstanceId;
          seen.add(instanceId);

          return {
            ...item,
            instanceId,
          };
        });
      }

      function getCharacterDefinition(characterId) {
        return CHARACTER_DEFINITIONS.find(
          (character) => character.id === characterId,
        );
      }

      function createCharacterInstance(characterId) {
        const definition = getCharacterDefinition(characterId);
        if (!definition) return null;

        return {
          instanceId: `${definition.id}-${Date.now()}-${Math.random()
            .toString(36)
            .slice(2, 8)}`,
          characterId: definition.id,
          level: 1,
          stars: 0,
          equippedWeaponInstanceId: null,
        };
      }

      function normalizeOwnedCharacter(character, fallbackIndex = 0) {
        const definition = getCharacterDefinition(character?.characterId);
        if (!definition) return null;

        const equippedWeaponInstanceId =
          typeof character.equippedWeaponInstanceId === "string" &&
          character.equippedWeaponInstanceId.length > 0
            ? character.equippedWeaponInstanceId
            : null;

        return {
          instanceId:
            typeof character.instanceId === "string" &&
            character.instanceId.length > 0
              ? character.instanceId
              : `${definition.id}-owned-${fallbackIndex}`,
          characterId: definition.id,
          level: clampNumber(
            Math.floor(toFiniteNumber(character.level, 1)),
            1,
            MAX_CHARACTER_LEVEL,
            1,
          ),
          stars: clampNumber(
            Math.floor(toFiniteNumber(character.stars, 0)),
            0,
            MAX_CHARACTER_STARS,
            0,
          ),
          equippedWeaponInstanceId,
        };
      }

      function ensureUniqueCharacterInstanceIds(characters) {
        const seen = new Set();

        return characters.map((character, index) => {
          const baseInstanceId =
            typeof character.instanceId === "string" &&
            character.instanceId.length > 0
              ? character.instanceId
              : `${character.characterId}-owned-${index}`;
          const instanceId = seen.has(baseInstanceId)
            ? `${baseInstanceId}-${index}`
            : baseInstanceId;
          seen.add(instanceId);

          return {
            ...character,
            instanceId,
          };
        });
      }

      function getEquippedWeaponForCharacter(character, inventory) {
        if (!character?.equippedWeaponInstanceId) return null;
        return (
          inventory.find(
            (item) =>
              item.instanceId === character.equippedWeaponInstanceId &&
              item.type === "weapon",
          ) || null
        );
      }

      function isWeaponEquipped(weaponInstanceId, characters) {
        if (typeof weaponInstanceId !== "string" || weaponInstanceId.length === 0) {
          return false;
        }
        return characters.some(
          (character) => character.equippedWeaponInstanceId === weaponInstanceId,
        );
      }

      function normalizeEquippedCharacterWeapons(characters, inventory) {
        const equippedWeaponIds = new Set();

        return characters.map((character) => {
          const equippedWeapon = getEquippedWeaponForCharacter(
            character,
            inventory,
          );
          if (!equippedWeapon || equippedWeaponIds.has(equippedWeapon.instanceId)) {
            return {
              ...character,
              equippedWeaponInstanceId: null,
            };
          }

          equippedWeaponIds.add(equippedWeapon.instanceId);
          return character;
        });
      }

      function getWeaponType(weapon) {
        return weapon?.weaponType || null;
      }

      function getCharacterPreferredWeaponType(characterDefinition) {
        return characterDefinition?.preferredWeaponType || null;
      }

      function hasPreferredWeaponEquipped(character, inventory) {
        const definition = getCharacterDefinition(character?.characterId);
        if (!definition) return false;
        const weapon = getEquippedWeaponForCharacter(character, inventory);
        if (!weapon) return false;
        return (
          getWeaponType(weapon) === getCharacterPreferredWeaponType(definition)
        );
      }

      function getPreferredWeaponSynergy(character, inventory) {
        const hasSynergy = hasPreferredWeaponEquipped(character, inventory);
        if (!hasSynergy) return 1.0;

        const weapon = getEquippedWeaponForCharacter(character, inventory);
        const enhanceLevel = weapon ? toFiniteNumber(weapon.enhanceLevel, 0) : 0;

        // Base 1.25 + 0.01 per enhance level, capped at 1.5
        const multiplier = 1.25 + enhanceLevel * 0.01;
        return Math.min(1.5, toFiniteNumber(multiplier, 1.25));
      }

      function getCharacterBaseDps(characterInstance) {
        if (!characterInstance?.characterId) return 0;
        const gachaItem = GACHA_ITEMS.find(
          (item) => item.characterId === characterInstance.characterId,
        );
        return gachaItem ? toFiniteNumber(gachaItem.power, 0) : 0;
      }

      function getCharacterLevelDps(characterInstance) {
        const baseDps = getCharacterBaseDps(characterInstance);
        const definition = getCharacterDefinition(characterInstance.characterId);
        if (!definition) return baseDps;

        const rarityBalance = CHARACTER_RARITY_BALANCE[
          definition.rarity.toLowerCase()
        ] || {
          growthRateRange: [1.05, 1.05],
        };
        const growthRate = rarityBalance.growthRateRange[0];
        const level = toFiniteNumber(characterInstance.level, 1);

        const levelMultiplier = Math.pow(growthRate, level - 1);
        return toFiniteNumber(baseDps * levelMultiplier, baseDps);
      }

      function getFactionSynergyMultiplier(count) {
        const c = Math.max(0, Math.floor(toFiniteNumber(count, 0)));
        if (c >= 4) return 1.25;
        if (c === 3) return 1.12;
        if (c === 2) return 1.05;
        return 1.0;
      }

      function getKillsRequiredForStage(stage) {
        return 5;
      }

      function getMonsterMaxHp(stage) {
        const s = Math.max(1, Math.floor(toFiniteNumber(stage, 1)));
        return Math.floor(100 * Math.pow(1.3, s - 1));
      }

      function getTotalTeamDps(state) {
        if (!state || !state.rpg) return 0;
        const characters = Array.isArray(state.rpg.characters)
          ? state.rpg.characters
          : [];
        const inventory = Array.isArray(state.enhancement?.inventory)
          ? state.enhancement.inventory
          : [];

        const ownedCharacterDetails = characters
          .map((character) => {
            const definition = getCharacterDefinition(character.characterId);
            if (!definition) return null;
            const equippedWeapon = getEquippedWeaponForCharacter(
              character,
              inventory,
            );
            const synergyMultiplier = getPreferredWeaponSynergy(
              character,
              inventory,
            );
            return {
              ...character,
              definition,
              equippedWeapon,
              synergyMultiplier,
            };
          })
          .filter(Boolean);

        const ownedFactionCounts = ownedCharacterDetails.reduce((acc, char) => {
          const faction = char.definition.faction;
          acc[faction] = (acc[faction] || 0) + 1;
          return acc;
        }, {});

        return ownedCharacterDetails.reduce((sum, char) => {
          const levelDps = getCharacterLevelDps(char);
          const weaponDps = char.equippedWeapon
            ? toFiniteNumber(char.equippedWeapon.power, 0)
            : 0;
          const factionMult = getFactionSynergyMultiplier(
            ownedFactionCounts[char.definition.faction] || 0,
          );
          const totalDps =
            (levelDps + weaponDps) * char.synergyMultiplier * factionMult;
          return sum + totalDps;
        }, 0);
      }

      function applyCombatTick(state, deltaSeconds) {
        const dps = getTotalTeamDps(state);
        const damage = dps * deltaSeconds;
        if (damage <= 0) return state;

        const currentHp = toFiniteNumber(state.rpg.monsterHp, 0);
        const nextHp = Math.max(0, currentHp - damage);

        if (nextHp <= 0) {
          const nextDefeated =
            toFiniteNumber(state.rpg.defeatedMonsters, 0) + 1;
          const currentStage = Math.max(
            1,
            toFiniteNumber(state.rpg.currentStage, 1),
          );
          const currentStageKills = toFiniteNumber(state.rpg.stageKills, 0);
          const killsRequired = getKillsRequiredForStage(currentStage);

          let nextStage = currentStage;
          let nextStageKills = currentStageKills + 1;
          let nextHighestStage = toFiniteNumber(state.rpg.highestStage, 0);

          if (nextStageKills >= killsRequired) {
            nextStage = currentStage + 1;
            nextStageKills = 0;
            nextHighestStage = Math.max(nextHighestStage, nextStage);
          }

          const maxHp = getMonsterMaxHp(nextStage);

          return {
            ...state,
            rpg: {
              ...state.rpg,
              currentStage: nextStage,
              highestStage: nextHighestStage,
              stageKills: nextStageKills,
              monsterHp: maxHp,
              monsterMaxHp: maxHp,
              defeatedMonsters: nextDefeated,
            },
          };
        }

        return {
          ...state,
          rpg: {
            ...state.rpg,
            monsterHp: nextHp,
          },
        };
      }

      function normalizeGameState(state, language = "en") {
        const defaults = createDefaultGameState(language);
        const landlord = state?.landlord || {};
        const savedProperties = Array.isArray(landlord.properties)
          ? landlord.properties
          : [];
        const investment = state?.investment || {};
        const savedHoldings = Array.isArray(investment.holdings)
          ? investment.holdings
          : [];
        const enhancement = state?.enhancement || {};
        const savedInventory = Array.isArray(enhancement.inventory)
          ? enhancement.inventory
          : [];
        const normalizedInventory = ensureUniqueGachaInstanceIds(
          savedInventory
            .map((item, index) => normalizeInventoryItem(item, index))
            .filter(Boolean),
        );
        const normalizedRecentPulls = ensureUniqueGachaInstanceIds(
          normalizeRecentPulls(enhancement.recentPulls),
        );
        const rpg = state?.rpg || {};
        const savedCharacters = Array.isArray(rpg.characters)
          ? rpg.characters
          : [];
        const normalizedCharacters = ensureUniqueCharacterInstanceIds(
          savedCharacters
            .map((character, index) =>
              normalizeOwnedCharacter(character, index),
            )
            .filter(Boolean),
        );
        const equippedNormalizedCharacters = normalizeEquippedCharacterWeapons(
          normalizedCharacters,
          normalizedInventory,
        );

        return {
          ...defaults,
          ...state,
          version: GAME_STATE_VERSION,
          wallet: {
            ...defaults.wallet,
            ...(state?.wallet || {}),
            cash: Math.max(0, toFiniteNumber(state?.wallet?.cash, 0)),
          },
          landlord: {
            ...defaults.landlord,
            ...landlord,
            properties: defaults.landlord.properties.map((property) => {

              cash: prev.wallet.cash + gain,
            },
            landlord: {
              ...prev.landlord,
              totalEarned: prev.landlord.totalEarned + gain,
            },
          }));
          const rect = e.currentTarget.getBoundingClientRect();
          const newClick = {
            id: Date.now(),
            x: e.clientX || rect.left + rect.width / 2,
            y: e.clientY || rect.top + rect.height / 2,
            val: gain,
          };
          setClicks((prev) => [...prev, newClick]);
          setTimeout(
            () => setClicks((prev) => prev.filter((c) => c.id !== newClick.id)),
            800,
          );
        };

        const performRebirth = () => {
          if (
            cash >= REBIRTH_REQUIREMENT &&
            window.confirm(t.rebirthConfirm)
          ) {
            updateGameState((prev) => ({
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: 0,
              },
              landlord: {
                ...prev.landlord,
                properties: createDefaultGameState(userLang).landlord
                  .properties,
                rebirthCount: prev.landlord.rebirthCount + 1,
                multiplier: prev.landlord.multiplier + 1,
                clickPower: 10,
                clickUpgradeCost: 50,
              },
            }));
            alert(t.rebirthSuccess);
          }
        };

        const buyProperty = (id) => {
          const idx = properties.findIndex((p) => p.id === id);
          if (idx < 0) return;
          const cost = Math.floor(
            properties[idx].baseCost * Math.pow(1.15, properties[idx].count),
          );
          if (cash >= cost) {
            updateGameState((prev) => {
              const baseProperty = PROPERTIES_DATA[userLang].find(
                (property) => property.id === id,
              );
              const currentProperty = prev.landlord.properties.find(
                (property) => property.id === id,
              );
              if (!baseProperty || !currentProperty) return prev;

              const currentCount = toOwnedQuantity(currentProperty.count);
              const currentCost = Math.floor(
                baseProperty.baseCost * Math.pow(1.15, currentCount),
              );
              if (prev.wallet.cash < currentCost) return prev;

              return {
                ...prev,
                wallet: {
                  ...prev.wallet,
                  cash: prev.wallet.cash - currentCost,
                },
                landlord: {
                  ...prev.landlord,
                  properties: prev.landlord.properties.map((item) =>
                    item.id === id
                      ? { ...item, count: currentCount + 1 }
                      : item,
                  ),
                },
              };
            });
          }
        };

        const buyClickUpgrade = () => {
          if (cash < clickUpgradeCost) return;

          updateGameState((prev) => {
            const currentCost = toFiniteNumber(
              prev.landlord.clickUpgradeCost,
              50,
            );
            if (prev.wallet.cash < currentCost) return prev;

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash - currentCost,
              },
              landlord: {
                ...prev.landlord,
                clickPower: prev.landlord.clickPower + 10,
                clickUpgradeCost: Math.floor(currentCost * 1.5),
              },
            };
          });
        };

        const buyInvestmentAsset = (id) => {
          const asset = investmentAssets.find((item) => item.id === id);
          if (!asset || cash < asset.price) return;

          updateGameState((prev) => {
            const currentHolding = prev.investment.holdings.find(
              (holding) => holding.id === id,
            );
            const currentPrice = clampNumber(
              currentHolding?.price,
              Math.max(1, asset.price * 0.5),
              asset.price * 2,
              asset.price,
            );
            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            const currentAvgBuyPrice = toSafePrice(
              currentHolding?.avgBuyPrice,
              currentPrice,
            );
            const nextOwned = currentOwned + 1;
            const nextAvgBuyPrice =
              ((currentAvgBuyPrice * currentOwned) + currentPrice) / nextOwned;
            if (prev.wallet.cash < currentPrice) return prev;

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash - currentPrice,
              },
              investment: {
                ...prev.investment,
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: nextOwned,
                        avgBuyPrice: toSafePrice(
                          nextAvgBuyPrice,
                          currentPrice,
                        ),
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const sellInvestmentAsset = (id) => {
          const asset = investmentAssets.find((item) => item.id === id);
          if (!asset || asset.owned <= 0) return;

          updateGameState((prev) => {
            const currentHolding = prev.investment.holdings.find(
              (holding) => holding.id === id,
            );
            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            if (currentOwned <= 0) return prev;
            const nextOwned = Math.max(0, currentOwned - 1);

            const currentPrice = clampNumber(
              currentHolding?.price,
              Math.max(1, asset.price * 0.5),
              asset.price * 2,
              asset.price,
            );

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash + currentPrice,
              },
              investment: {
                ...prev.investment,
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: nextOwned,
                        avgBuyPrice:
                          nextOwned > 0
                            ? toSafePrice(holding.avgBuyPrice, currentPrice)
                            : currentPrice,
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const buyMaxInvestmentAsset = (id) => {
          const asset = investmentAssets.find((item) => item.id === id);
          if (!asset || cash < asset.price) return;

          updateGameState((prev) => {
            const currentHolding = prev.investment.holdings.find(
              (holding) => holding.id === id,
            );
            const currentPrice = clampNumber(
              currentHolding?.price,
              Math.max(1, asset.price * 0.5),
              asset.price * 2,
              asset.price,
            );
            const buyQuantity = Math.floor(prev.wallet.cash / currentPrice);
            if (buyQuantity <= 0) return prev;

            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            const currentAvgBuyPrice = toSafePrice(
              currentHolding?.avgBuyPrice,
              currentPrice,
            );
            const nextOwned = currentOwned + buyQuantity;
            const nextAvgBuyPrice =
              ((currentAvgBuyPrice * currentOwned) +
                currentPrice * buyQuantity) /
              nextOwned;

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash - currentPrice * buyQuantity,
              },
              investment: {
                ...prev.investment,
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: nextOwned,
                        avgBuyPrice: toSafePrice(
                          nextAvgBuyPrice,
                          currentPrice,
                        ),
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const sellAllInvestmentAsset = (id) => {
          const asset = investmentAssets.find((item) => item.id === id);
          if (!asset || asset.owned <= 0) return;

          updateGameState((prev) => {
            const currentHolding = prev.investment.holdings.find(
              (holding) => holding.id === id,
            );
            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            if (currentOwned <= 0) return prev;

            const currentPrice = clampNumber(
              currentHolding?.price,
              Math.max(1, asset.price * 0.5),
              asset.price * 2,
              asset.price,
            );

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash + currentPrice * currentOwned,
              },
              investment: {
                ...prev.investment,
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: 0,
                        avgBuyPrice: currentPrice,
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const pickGachaRarity = () => {
          const totalWeight = GACHA_RARITIES.reduce(
            (total, rarity) => total + rarity.weight,
            0,
          );
          let roll = Math.random() * totalWeight;

          for (const rarity of GACHA_RARITIES) {
            roll -= rarity.weight;
            if (roll <= 0) return rarity.name;
          }

          return GACHA_RARITIES[0].name;
        };

        const createPulledGachaItem = () => {
          const rarity = pickGachaRarity();
          const candidates = GACHA_ITEMS.filter((item) => item.rarity === rarity);
          const item =
            candidates[Math.floor(Math.random() * candidates.length)] ||
            GACHA_ITEMS[0];

          return {
            ...item,
            instanceId: `${item.id}-${Date.now()}-${Math.random()
              .toString(36)
              .slice(2, 8)}`,
          };
        };

        const drawGachaItems = (quantity) => {
          const drawQuantity = Math.max(1, Math.floor(toFiniteNumber(quantity, 1)));
          const totalCost = GACHA_DRAW_COST * drawQuantity;
          if (cash < totalCost) return;

          updateGameState((prev) => {
            if (prev.wallet.cash < totalCost) return prev;

            const pulledItems = Array.from({ length: drawQuantity }, () =>
              createPulledGachaItem(),
            );
            const lastPulled = pulledItems[pulledItems.length - 1];
            const pulledInventoryItems = pulledItems.filter(
              (item) => item.type !== "character",
            );
            const pulledCharacters = pulledItems
              .filter((item) => item.type === "character")
              .map((item) => createCharacterInstance(item.characterId))
              .filter(Boolean);
            const recentPulls = [
              ...normalizeRecentPulls(prev.enhancement.recentPulls),
              ...pulledItems,
            ].slice(-GACHA_RECENT_PULL_LIMIT);

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash - totalCost,
              },
              enhancement: {
                ...prev.enhancement,
                inventory: [
                  ...prev.enhancement.inventory,
                  ...pulledInventoryItems,
                ],
                lastPulledItem: lastPulled,
                recentPulls,
              },
              rpg: {
                ...prev.rpg,
                characters: [...prev.rpg.characters, ...pulledCharacters],
              },
            };
          });
        };

        const drawGachaItem = () => {
          drawGachaItems(1);
        };

        const drawTenGachaItems = () => {
          drawGachaItems(10);
        };

        const getEnhanceCost = (level) => {
          const safeLevel = clampNumber(
            Math.floor(toFiniteNumber(level, 0)),
            0,
            MAX_ENHANCE_LEVEL,
            0,
          );
          return 500 * (safeLevel + 1);
        };

        const getEnhanceChance = (level) => {
          const safeLevel = clampNumber(
            Math.floor(toFiniteNumber(level, 0)),
            0,
            MAX_ENHANCE_LEVEL,
            0,
          );
          return clampNumber(0.9 - safeLevel * 0.06, 0.3, 0.9, 0.9);
        };

        const enhanceWeaponItem = (instanceId) => {
          updateGameState((prev) => {
            const item = prev.enhancement.inventory.find(
              (candidate) => candidate.instanceId === instanceId,
            );
            if (!item || item.type !== "weapon") return prev;

            const currentLevel = clampNumber(
              Math.floor(toFiniteNumber(item.enhanceLevel, 0)),
              0,
              MAX_ENHANCE_LEVEL,
              0,
            );
            if (currentLevel >= MAX_ENHANCE_LEVEL) return prev;

            const cost = getEnhanceCost(currentLevel);
            if (prev.wallet.cash < cost) return prev;

            const success = Math.random() < getEnhanceChance(currentLevel);
            const nextLevel = success ? currentLevel + 1 : currentLevel;
            const result = {
              itemName: item.name,
              success,
              level: nextLevel,
            };

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash - cost,
              },
              enhancement: {
                ...prev.enhancement,
                inventory: prev.enhancement.inventory.map((candidate) =>
                  candidate.instanceId === instanceId
                    ? { ...candidate, enhanceLevel: nextLevel }
                    : candidate,
                ),
                lastEnhancementResult: result,
              },
            };
          });
        };

        const equipWeaponToCharacter = (characterInstanceId, weaponInstanceId) => {
          updateGameState((prev) => {
            const characterExists = prev.rpg.characters.some(
              (character) => character.instanceId === characterInstanceId,
            );
            const weapon = prev.enhancement.inventory.find(
              (item) =>
                item.instanceId === weaponInstanceId && item.type === "weapon",
            );
            if (!characterExists || !weapon) return prev;

            return {
              ...prev,
              rpg: {
                ...prev.rpg,
                characters: prev.rpg.characters.map((character) => {
                  if (character.instanceId === characterInstanceId) {
                    return {
                      ...character,
                      equippedWeaponInstanceId: weapon.instanceId,
                    };
                  }
                  if (character.equippedWeaponInstanceId === weapon.instanceId) {
                    return {
                      ...character,
                      equippedWeaponInstanceId: null,
                    };
                  }
                  return character;
                }),
              },
            };
          });
        };

        const unequipWeaponFromCharacter = (characterInstanceId) => {
          updateGameState((prev) => ({
            ...prev,
            rpg: {
              ...prev.rpg,
              characters: prev.rpg.characters.map((character) =>
                character.instanceId === characterInstanceId
                  ? { ...character, equippedWeaponInstanceId: null }
                  : character,
              ),
            },
          }));
        };

        const renderSparkline = (history) => {
          const points = normalizePriceHistory(history, 1);
          const min = Math.min(...points);
          const max = Math.max(...points);
          const range = Math.max(1, max - min);
          const path = points
            .map((point, index) => {
              const x =
                points.length === 1
                  ? 100
                  : (index / (points.length - 1)) * 200;
              const y = 56 - ((point - min) / range) * 48;
              return `${index === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
            })
            .join(" ");

          return (
            <svg
              viewBox="0 0 200 64"
              className="w-full h-16 mt-4"
              role="img"
              aria-label="Recent price history"
            >
              <path
                d="M 0 56 L 200 56"
                stroke="#e5e7eb"
                strokeWidth="1"
                fill="none"
              />
              <path
                d={path}
                stroke="#0f766e"
                strokeWidth="3"
                fill="none"
                strokeLinecap="round"
                strokeLinejoin="round"
              />
            </svg>
          );
        };

        const rarityTextClass = (rarity) => {
          if (rarity === "Mythic") return "text-fuchsia-600";
          if (rarity === "Legendary") return "text-amber-600";
          if (rarity === "Unique") return "text-orange-600";
          if (rarity === "Epic") return "text-purple-600";
          if (rarity === "Rare") return "text-blue-600";
          return "text-gray-600";
        };

        const formatMoney = (val) => {
          return new Intl.NumberFormat(t.format, {
            style: "currency",
            currency: t.currency,
            maximumFractionDigits: 0,
          }).format(val);
        };

        const tabs = [
          { id: "landlord", label: "Landlord" },
          { id: "investment", label: "Investment" },
          { id: "enhancement", label: "Enhancement" },
          { id: "rpg", label: "RPG" },
        ];
        const comingSoonTitle =
          tabs.find((tab) => tab.id === activeTab)?.label || "Coming Soon";

        return (
          <div className="w-full max-w-4xl flex flex-col items-center">
            {/* 게임 메인 컨테이너 */}
            <div className="w-full max-w-md">
              <nav className="w-full bg-white shadow-sm rounded-lg mb-4 p-1 grid grid-cols-4 gap-1 border border-gray-100">
                {tabs.map((tab) => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-2 py-2 rounded-md text-xs font-bold transition-colors ${activeTab === tab.id ? "bg-green-600 text-white" : "text-gray-500 hover:bg-gray-100"}`}
                  >
                    {tab.label}
                  </button>
                ))}
              </nav>

              {activeTab === "landlord" ? (
                <>
              {/* 상단 환생 버튼 및 상태 영역 */}
              <div className="w-full bg-white shadow-sm p-4 flex justify-between items-center rounded-lg mb-4 border-b-2 border-green-200">
                <div>
                  <h1 className="text-xl font-black text-green-600">
                    {t.title}
                  </h1>
                  <p className="text-xs text-gray-500 font-bold bg-gray-100 inline-block px-2 py-0.5 rounded mt-1">
                    {t.multiplier}: x{multiplier}
                  </p>
                </div>
                <button
                  onClick={performRebirth}
                  className={`px-4 py-2 rounded-full font-bold text-sm transition-all ${cash >= REBIRTH_REQUIREMENT ? "bg-yellow-400 text-yellow-900 rebirth-animate shadow-lg" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
                >
                  {t.rebirth} {rebirthCount > 0 && `(${rebirthCount})`}
                </button>
              </div>

              {/* 게임 메인 UI 패널 */}
              <div className="w-full bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-100 flex flex-col h-[650px]">
                <div className="bg-gradient-to-r from-green-500 to-emerald-600 text-white p-6 text-center">
                  <div className="text-4xl font-extrabold mb-1">
                    {formatMoney(cash)}
                  </div>
                  <div className="text-green-100 text-sm font-medium">
                    +{formatMoney(incomePerSec)}/{t.sec}
                  </div>
                </div>

                <div
                  className="h-64 flex items-center justify-center relative cursor-pointer select-none bg-green-50 overflow-hidden"
                  onClick={handleMainClick}
                >
                  <div className="text-[100px] font-bold text-green-600 drop-shadow-2xl hover:scale-105 active:scale-95 transition-transform duration-100">
                    TAP!
                  </div>
                  <div className="absolute bottom-4 text-green-700/60 font-bold animate-pulse pointer-events-none text-sm">
                    {t.tapToEarn} (+{formatMoney(clickPower * multiplier)}/
                    {t.click})
                  </div>
                  {clicks.map((c) => (
                    <div
                      key={c.id}
                      className="click-effect"
                      style={{ left: c.x - 20, top: c.y - 40 }}
                    >
                      +{formatMoney(c.val)}
                    </div>
                  ))}
                </div>

                <div className="bg-gray-50 flex-grow overflow-y-auto p-4 custom-scrollbar">
                  <h2 className="text-xs font-bold mb-3 text-gray-400 uppercase tracking-widest">
                    {t.investments}
                  </h2>

                  <button
                    onClick={buyClickUpgrade}
                    disabled={cash < clickUpgradeCost}
                    className={`w-full flex justify-between items-center p-4 mb-3 rounded-xl border transition-all ${cash >= clickUpgradeCost ? "bg-white border-green-300 shadow-sm" : "bg-gray-100 opacity-50"}`}
                  >
                    <div className="text-left">
                      <div className="font-bold">{t.mousePower}</div>
                      <div className="text-xs text-gray-500">
                        +{formatMoney(10 * multiplier)}/{t.click}
                      </div>
                    </div>
                    <div className="font-black text-green-600">
                      {formatMoney(clickUpgradeCost)}
                    </div>
                  </button>

                  {properties.map((p) => {
                    const cost = Math.floor(
                      p.baseCost * Math.pow(1.15, p.count),
                    );
                    return (
                      <button
                        key={p.id}

                        disabled={cash < cost}
                        className={`w-full flex justify-between items-center p-4 mb-3 rounded-xl border transition-all ${cash >= cost ? "bg-white border-blue-200 shadow-sm" : "bg-gray-100 opacity-50"}`}
                      >
                        <div className="flex items-center gap-3">
                          <span className="text-2xl">{p.icon}</span>
                          <div className="text-left">
                            <div className="font-bold">
                              {p.name}{" "}

                            <div className="text-xs text-gray-500">
                              +{formatMoney(p.baseIncome * multiplier)}/{t.sec}
                            </div>
                          </div>
                        </div>
                        <div className="font-black text-blue-600">
                          {formatMoney(cost)}
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

                  <section className="w-full bg-white shadow-sm rounded-lg mt-4 p-4 border border-gray-100">
                    <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">

                      <button className="bg-gray-100 text-gray-500 rounded-md py-2 text-xs font-bold cursor-not-allowed">
                        Save
                      </button>
                      <button className="bg-gray-100 text-gray-500 rounded-md py-2 text-xs font-bold cursor-not-allowed">
                        Export
                      </button>
                      <button className="bg-gray-100 text-gray-500 rounded-md py-2 text-xs font-bold cursor-not-allowed">
                        Import
                      </button>
                    </div>
                  </section>
                </>
              ) : activeTab === "investment" ? (
                <section className="w-full bg-white shadow-sm rounded-lg border border-gray-100 overflow-hidden">
                  <div className="bg-gradient-to-r from-slate-800 to-teal-700 text-white p-5">
                    <h1 className="text-xl font-black">Investment Master</h1>
                    <p className="mt-1 text-xs font-medium text-teal-100">
                      Prices update only while this tab is open. Wallet cash is
                      shared with Landlord.
                    </p>
                    <div className="mt-3 grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm">
                      <div>
                        <div className="text-teal-100 text-xs font-bold uppercase">
                          Wallet Cash
                        </div>
                        <div className="text-lg font-black">
                          {formatMoney(cash)}
                        </div>
                      </div>
                      <div>
                        <div className="text-teal-100 text-xs font-bold uppercase">
                          Portfolio Value
                        </div>
                        <div className="text-lg font-black">
                          {formatMoney(totalPortfolioValue)}

                      </div>
                      <div>
                        <div className="text-teal-100 text-xs font-bold uppercase">

                        <div className="text-lg font-black">
                          {formatMoney(totalNetWorth)}

                      </div>

                  </div>

                  <div className="bg-gray-50 p-4 space-y-3">
                    {investmentAssets.map((asset) => (
                      <div
                        key={asset.id}
                        className="bg-white border border-gray-200 rounded-lg p-4"
                      >
                        <div className="flex items-start justify-between gap-3">
                          <div>
                            <h2 className="font-black text-gray-800">
                              {asset.name}
                            </h2>
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              {asset.type}
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              Current Price
                            </div>
                            <div className="font-black text-teal-700">
                              {formatMoney(asset.price)}
                            </div>
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3 mt-4 text-sm">
                          <div className="bg-gray-50 rounded-md p-3">
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              Owned Quantity
                            </div>
                            <div className="font-black text-gray-800">
                              {asset.owned}
                            </div>
                          </div>
                          <div className="bg-gray-50 rounded-md p-3">
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              Holding Value
                            </div>
                            <div className="font-black text-gray-800">
                              {formatMoney(asset.value)}
                            </div>
                          </div>
                          <div className="bg-gray-50 rounded-md p-3">
                            <div className="text-xs font-bold text-gray-400 uppercase">

                            <div className="font-black text-gray-800">
                              {asset.owned > 0

                            </div>
                          </div>
                          <div className="bg-gray-50 rounded-md p-3">
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              Gain / Loss
                            </div>
                            <div
                              className={`font-black ${asset.owned <= 0 ? "text-gray-400" : asset.gainLoss >= 0 ? "text-emerald-600" : "text-red-600"}`}
                            >
                              {asset.owned > 0
                                ? `${formatMoney(asset.gainLoss)} (${asset.gainLossPercent.toFixed(1)}%)`
                                : "-"}
                            </div>
                          </div>
                        </div>

                        {renderSparkline(asset.history)}

                        <div className="grid grid-cols-2 gap-2 mt-4">
                          <button
                            onClick={() => buyInvestmentAsset(asset.id)}
                            disabled={cash < asset.price}
                            className={`rounded-md py-2 text-sm font-bold transition-colors ${cash >= asset.price ? "bg-teal-600 text-white" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}
                          >
                            Buy 1
                          </button>
                          <button
                            onClick={() => buyMaxInvestmentAsset(asset.id)}
                            disabled={cash < asset.price}
                            className={`rounded-md py-2 text-sm font-bold transition-colors ${cash >= asset.price ? "bg-teal-700 text-white" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}
                          >
                            Buy Max
                          </button>
                          <button
                            onClick={() => sellInvestmentAsset(asset.id)}
                            disabled={asset.owned <= 0}
                            className={`rounded-md py-2 text-sm font-bold transition-colors ${asset.owned > 0 ? "bg-slate-700 text-white" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}
                          >
                            Sell 1
                          </button>
                          <button
                            onClick={() => sellAllInvestmentAsset(asset.id)}
                            disabled={asset.owned <= 0}
                            className={`rounded-md py-2 text-sm font-bold transition-colors ${asset.owned > 0 ? "bg-slate-800 text-white" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}
                          >
                            Sell All
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>
              ) : activeTab === "enhancement" ? (
                <section className="w-full bg-white shadow-sm rounded-lg border border-gray-100 overflow-hidden">
                  <div className="bg-gradient-to-r from-purple-700 to-rose-600 text-white p-5">
                    <h1 className="text-xl font-black">
                      Gacha & Enhancement
                    </h1>
                    <div className="mt-3 grid grid-cols-2 gap-3 text-sm">
                      <div>
                        <div className="text-purple-100 text-xs font-bold uppercase">
                          Wallet Cash
                        </div>
                        <div className="text-lg font-black">
                          {formatMoney(cash)}
                        </div>
                      </div>
                      <div>
                        <div className="text-purple-100 text-xs font-bold uppercase">
                          Draw Cost
                        </div>
                        <div className="text-lg font-black">
                          {formatMoney(GACHA_DRAW_COST)}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-gray-50 p-4 space-y-4">
                    <div className="grid grid-cols-2 gap-2">
                      <button
                        onClick={drawGachaItem}
                        disabled={cash < GACHA_DRAW_COST}
                        className={`rounded-md py-3 text-sm font-black transition-colors ${cash >= GACHA_DRAW_COST ? "bg-purple-700 text-white" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}
                      >
                        Draw 1
                      </button>
                      <button
                        onClick={drawTenGachaItems}
                        disabled={cash < GACHA_DRAW_COST * 10}
                        className={`rounded-md py-3 text-sm font-black transition-colors ${cash >= GACHA_DRAW_COST * 10 ? "bg-rose-600 text-white" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}
                      >
                        Draw 10
                      </button>
                    </div>

                    <div className="bg-white border border-gray-200 rounded-lg p-4">
                      <div className="text-xs font-bold text-gray-400 uppercase">
                        Last Pull
                      </div>
                      {lastPulledItem ? (
                        <div className="mt-2 flex items-center justify-between gap-3">
                          <div>
                            <div className="font-black text-gray-800">
                              {lastPulledItem.name}
                            </div>
                            <div
                              className={`text-xs font-bold uppercase ${rarityTextClass(lastPulledItem.rarity)}`}
                            >
                              {lastPulledItem.rarity} {lastPulledItem.type}
                            </div>
                          </div>
                          <div className="font-black text-gray-700">
                            {formatDps(lastPulledItem.power)}
                          </div>
                        </div>
                      ) : (
                        <div className="mt-2 font-bold text-gray-400">-</div>
                      )}
                    </div>

                    <div className="bg-white border border-gray-200 rounded-lg p-4">
                      <div className="text-xs font-bold text-gray-400 uppercase">
                        Last Enhancement
                      </div>
                      {lastEnhancementResult ? (
                        <div className="mt-2 flex items-center justify-between gap-3">
                          <div>
                            <div className="font-black text-gray-800">
                              {lastEnhancementResult.itemName}
                            </div>
                            <div
                              className={`text-xs font-bold uppercase ${lastEnhancementResult.success ? "text-emerald-600" : "text-red-600"}`}
                            >
                              {lastEnhancementResult.success
                                ? "Success"
                                : "Failed"}
                            </div>
                          </div>
                          <div className="font-black text-gray-700">
                            +{lastEnhancementResult.level}
                          </div>
                        </div>
                      ) : (
                        <div className="mt-2 font-bold text-gray-400">-</div>
                      )}
                    </div>

                    <div className="grid grid-cols-5 gap-2">
                      {GACHA_RARITIES.map((rarity) => (
                        <div
                          key={rarity.name}
                          className="bg-white border border-gray-200 rounded-md p-2 text-center"
                        >
                          <div
                            className={`text-[10px] font-black uppercase ${rarityTextClass(rarity.name)}`}
                          >
                            {rarity.name}
                          </div>
                          <div className="font-black text-gray-800">
                            {inventoryByRarity[rarity.name] || 0}
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="bg-white border border-gray-200 rounded-lg p-4">
                      <div className="flex items-center justify-between mb-3">
                        <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest">
                          Owned Characters
                        </h2>
                        <div className="text-xs font-black text-gray-500">
                          {ownedCharacterDetails.length}
                        </div>
                      </div>
                      <div className="grid grid-cols-3 gap-2 mb-3">
                        {Object.keys(CHARACTER_GACHA_POOLS).map((rarity) => {
                          const label = characterRarityLabel(rarity);
                          return (
                            <div
                              key={rarity}
                              className="bg-gray-50 border border-gray-200 rounded-md p-2 text-center"
                            >
                              <div
                                className={`text-[10px] font-black uppercase ${rarityTextClass(label)}`}
                              >
                                {label}
                              </div>
                              <div className="font-black text-gray-800">
                                {ownedCharactersByRarity[rarity] || 0}
                              </div>
                            </div>
                          );
                        })}
                      </div>

                      <div className="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-3">
                        <div className="flex items-center justify-between mb-3">
                          <h2 className="text-[10px] font-black text-gray-400 uppercase tracking-widest">
                            Faction Synergies
                          </h2>
                          <div className="text-[10px] font-black text-gray-500 uppercase">
                            Preview
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-2">
                          {Object.entries(ownedFactionCounts).map(
                            ([faction, count]) => {
                              const multiplier =
                                getFactionSynergyMultiplier(count);
                              return (
                                <div
                                  key={faction}
                                  className="bg-white border border-gray-200 rounded-md p-2 flex flex-col items-center shadow-sm"
                                >
                                  <div className="text-[10px] font-black uppercase text-gray-400">
                                    {faction}
                                  </div>
                                  <div className="font-black text-gray-800 text-sm">
                                    {count} Chars
                                  </div>
                                  <div
                                    className={`text-[10px] font-black mt-1 px-1.5 py-0.5 rounded-sm ${multiplier > 1.0 ? "bg-green-100 text-green-700" : "bg-gray-100 text-gray-400"}`}
                                  >
                                    x{multiplier.toFixed(2)}
                                  </div>
                                </div>
                              );
                            },
                          )}
                        </div>
                      </div>

                      {ownedCharacterDetails.length > 0 ? (
                        <div className="space-y-2">
                          {ownedCharacterDetails.map((character) => {
                            const fallbackWeapon =
                              firstAvailableWeapon || weaponInventory[0];
                            return (
                              <div
                                key={character.instanceId}
                                className="flex items-center justify-between gap-3 bg-gray-50 rounded-md p-3"
                              >
                                <div>
                                  <div className="font-bold text-gray-800">
                                    {character.name}
                                  </div>
                                  <div
                                    className={`text-xs font-bold uppercase ${rarityTextClass(character.rarityLabel)}`}
                                  >
                                    {character.rarityLabel} ·{" "}
                                    {character.definition.faction}
                                  </div>
                                  <div className="text-xs font-bold text-gray-500">
                                    Weapon:{" "}
                                    {character.equippedWeapon
                                      ? `${character.equippedWeapon.name} +${character.equippedWeapon.enhanceLevel}`
                                      : "None"}
                                  </div>
                                  <div className="text-[10px] font-bold text-gray-400 mt-0.5">
                                    Pref:{" "}
                                    {character.definition.preferredWeaponType ||
                                      "None"}
                                  </div>
                                  {character.synergyActive && (
                                    <div className="mt-1 flex items-center gap-1.5">
                                      <span className="bg-green-100 text-green-700 text-[10px] px-1.5 py-0.5 rounded-sm font-black uppercase tracking-tight">
                                        Synergy Active
                                      </span>
                                      <span className="text-green-600 font-black text-xs">
                                        x{character.synergyMultiplier.toFixed(2)}
                                      </span>
                                    </div>
                                  )}
                                  {!character.synergyActive &&
                                    character.equippedWeapon && (
                                      <div className="mt-1 flex items-center gap-1.5 opacity-50">
                                        <span className="bg-gray-100 text-gray-500 text-[10px] px-1.5 py-0.5 rounded-sm font-bold uppercase tracking-tight">
                                          No Synergy
                                        </span>
                                        <span className="text-gray-500 font-bold text-xs">
                                          x1.00
                                        </span>
                                      </div>
                                    )}
                                </div>
                                <div className="text-right">
                                  <div className="font-black text-gray-700">
                                    Lv {character.level}
                                  </div>
                                  <div className="mt-2 flex flex-col gap-1">
                                    <button
                                      onClick={() =>
                                        equipWeaponToCharacter(
                                          character.instanceId,
                                          fallbackWeapon?.instanceId,
                                        )
                                      }
                                      disabled={!fallbackWeapon}
                                      className={`rounded-md px-3 py-1 text-xs font-black transition-colors ${fallbackWeapon ? "bg-purple-700 text-white" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
                                    >
                                      Equip First
                                    </button>
                                    <button
                                      onClick={() =>
                                        unequipWeaponFromCharacter(
                                          character.instanceId,
                                        )
                                      }
                                      disabled={!character.equippedWeapon}
                                      className={`rounded-md px-3 py-1 text-xs font-black transition-colors ${character.equippedWeapon ? "bg-gray-700 text-white" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
                                    >
                                      Unequip
                                    </button>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      ) : (
                        <div className="py-6 text-center font-bold text-gray-400">
                          Empty
                        </div>
                      )}
                    </div>

                    <div className="bg-white border border-gray-200 rounded-lg p-4">
                      <div className="flex items-center justify-between mb-3">
                        <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest">
                          Recent Pulls
                        </h2>
                        <div className="text-xs font-black text-gray-500">
                          {recentPulls.length}
                        </div>
                      </div>
                      {recentPulls.length > 0 ? (
                        <div className="space-y-2">
                          {[...recentPulls].reverse().map((item) => (
                            <div
                              key={item.instanceId}
                              className="flex items-center justify-between gap-3 bg-gray-50 rounded-md p-3"
                            >
                              <div>
                                <div className="font-bold text-gray-800">
                                  {item.name}
                                </div>
                                <div
                                  className={`text-xs font-bold uppercase ${rarityTextClass(item.rarity)}`}
                                >
                                  {item.rarity} {item.type}
                                </div>
                              </div>
                               <div className="font-black text-gray-700">
                                {formatDps(item.power)}
                              </div>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="py-6 text-center font-bold text-gray-400">
                          Empty
                        </div>
                      )}
                    </div>

                    <div className="bg-white border border-gray-200 rounded-lg p-4">
                      <div className="flex items-center justify-between mb-3">
                        <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest">
                          Inventory
                        </h2>
                        <div className="text-xs font-black text-gray-500">
                          {enhancementInventory.length}
                        </div>
                      </div>
                      <div className="max-h-72 overflow-y-auto custom-scrollbar space-y-2">
                        {sortedEnhancementInventory.length > 0 ? (
                          sortedEnhancementInventory.map((item) => (
                            <div
                              key={item.instanceId}
                              className="flex items-center justify-between gap-3 bg-gray-50 rounded-md p-3"
                            >
                              <div>
                                <div className="font-bold text-gray-800">
                                  {item.name}
                                  {item.type === "weapon" &&
                                    ` +${item.enhanceLevel}`}
                                </div>
                                <div
                                  className={`text-xs font-bold uppercase ${rarityTextClass(item.rarity)}`}
                                >
                                  {item.rarity} {item.type}
                                </div>
                              </div>
                              <div className="text-right">
                                <div className="font-black text-gray-700">
                                  {formatDps(item.power)}
                                </div>
                                {item.type === "weapon" ? (
                                  <button
                                    onClick={() =>
                                      enhanceWeaponItem(item.instanceId)
                                    }
                                    disabled={
                                      item.enhanceLevel >= MAX_ENHANCE_LEVEL ||
                                      cash < getEnhanceCost(item.enhanceLevel)
                                    }
                                    className={`mt-2 rounded-md px-3 py-1 text-xs font-black transition-colors ${item.enhanceLevel < MAX_ENHANCE_LEVEL && cash >= getEnhanceCost(item.enhanceLevel) ? "bg-purple-700 text-white" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
                                  >
                                    Enhance
                                  </button>
                                ) : null}
                              </div>
                              {item.type === "weapon" ? (
                                <div className="col-span-2 text-xs font-bold text-gray-500">
                                  Cost: {formatMoney(getEnhanceCost(item.enhanceLevel))} · Chance: {Math.round(getEnhanceChance(item.enhanceLevel) * 100)}%
                                </div>
                              ) : null}
                            </div>
                          ))
                        ) : (
                          <div className="py-8 text-center font-bold text-gray-400">
                            Empty
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </section>
              ) : (
                <section className="w-full bg-white shadow-sm rounded-lg border border-gray-100 overflow-hidden">
                  <div className="bg-gradient-to-r from-red-700 to-orange-600 text-white p-5">
                    <h1 className="text-xl font-black">Battle Preview</h1>
                    <p className="mt-1 text-xs font-medium text-red-100">
                      RPG combat foundation. Current team strength and squad
                      rankings.
                    </p>
                    <div className="mt-3 grid grid-cols-2 gap-3 text-sm">
                      <div className="bg-black/20 rounded-md p-2">
                        <div className="text-red-100 text-[10px] font-black uppercase">
                          Total Team DPS
                        </div>
                        <div className="text-lg font-black leading-tight">
                          {formatDps(totalTeamDps)}
                        </div>
                      </div>
                      <div className="bg-black/20 rounded-md p-2">
                        <div className="text-red-100 text-[10px] font-black uppercase">
                          Stage {gameState.rpg?.currentStage || 1} Progress
                        </div>
                        <div className="text-lg font-black leading-tight">
                          {gameState.rpg?.stageKills || 0} /{" "}
                          {getKillsRequiredForStage(
                            gameState.rpg?.currentStage || 1,
                          )}
                        </div>
                      </div>
                    </div>

                    <div className="mt-4 bg-black/40 rounded-lg p-4 border border-red-900/30">
                      <div className="flex justify-between items-center mb-2">
                        <span className="text-[10px] font-black text-red-200 uppercase tracking-widest">
                          Monster HP
                        </span>
                        <span className="text-xs font-black text-white">
                          {formatDps(gameState.rpg?.monsterHp || 0)} /{" "}
                          {formatDps(gameState.rpg?.monsterMaxHp || 100)}
                        </span>
                      </div>
                      <div className="w-full h-4 bg-gray-900 rounded-full overflow-hidden border border-red-900/20">
                        <div
                          className="h-full bg-gradient-to-r from-red-600 to-orange-500 transition-all duration-500"
                          style={{
                            width: `${Math.min(100, Math.max(0, ((gameState.rpg?.monsterHp || 0) / (gameState.rpg?.monsterMaxHp || 100)) * 100))}%`,
                          }}
                        ></div>
                      </div>
                      <div className="mt-2 text-center text-[10px] font-bold text-red-300/60 uppercase">
                        {Math.floor(
                          Math.min(
                            100,
                            Math.max(
                              0,
                              ((gameState.rpg?.monsterHp || 0) /
                                (gameState.rpg?.monsterMaxHp || 100)) *
                                100,
                            ),
                          ),
                        )}
                        % Health · Total {gameState.rpg?.defeatedMonsters || 0}{" "}
                        Kills
                      </div>
                    </div>

                    <div className="mt-2 px-1 flex justify-between items-center text-[10px] font-bold text-red-300/40 uppercase">
                      <span>Highest Stage: {gameState.rpg?.highestStage || 1}</span>
                      <span>Team Ready for Combat</span>
                    </div>
                  </div>

                  <div className="bg-gray-50 p-4 space-y-4">
                    <div className="bg-white border border-gray-200 rounded-lg p-4">
                      <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">
                        Top 5 Squad Members
                      </h2>
                      {top5Characters.length > 0 ? (
                        <div className="space-y-2">
                          {top5Characters.map((char, index) => (
                            <div
                              key={char.instanceId}
                              className="flex items-center justify-between gap-3 bg-gray-50 rounded-md p-3 border-l-4 border-red-500"
                            >
                              <div className="flex items-center gap-3">
                                <div className="bg-red-100 text-red-700 w-6 h-6 flex items-center justify-center rounded-full text-xs font-black">
                                  {index + 1}
                                </div>
                                <div>
                                  <div className="font-black text-gray-800 text-sm">
                                    {char.name}
                                  </div>
                                  <div
                                    className={`text-[10px] font-bold uppercase ${rarityTextClass(char.rarityLabel)}`}
                                  >
                                    {char.rarityLabel} · Lv {char.level}
                                  </div>
                                  <div className="text-[10px] font-bold text-gray-400">
                                    {char.definition.faction} ·{" "}
                                    {char.equippedWeapon
                                      ? char.equippedWeapon.name
                                      : "No Weapon"}
                                  </div>
                                </div>
                              </div>
                              <div className="text-right">
                                <div className="text-[10px] font-bold text-gray-400 uppercase">
                                  DPS
                                </div>
                                <div className="font-black text-red-600">
                                  {formatDps(char.totalDps)}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      ) : (
                        <div className="py-8 text-center font-bold text-gray-400">
                          No characters in squad
                        </div>
                      )}
                    </div>

                    <div className="bg-white border border-gray-200 rounded-lg p-4">
                      <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
                        Battle System Notice
                      </h2>
                      <p className="text-xs text-gray-500 leading-relaxed">
                        Active combat and stage progression are currently in
                        development. DPS values shown here are derived from base
                        stats, levels, weapon power, and active synergies.
                      </p>
                    </div>
                  </div>
                </section>
              )}
            </div>

            {/* 국가별로 렌더링되는 SEO 공략집 텍스트 영역 */}
            {activeTab === "landlord" && SEO_CONTENT[userLang]}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<GameApp />);
    </script>
  </body>
</html>
