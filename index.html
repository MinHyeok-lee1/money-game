      function createDefaultGameState(language = "en") {
        return {

      function toFiniteNumber(value, fallback = 0) {
        const number = Number(value);
        return Number.isFinite(number) ? number : fallback;
      }

      function clampNumber(value, min, max, fallback = min) {
        const number = toFiniteNumber(value, fallback);
        return Math.min(max, Math.max(min, number));
      }

      function toOwnedQuantity(value) {
        return Math.max(0, Math.floor(toFiniteNumber(value, 0)));
      }

      function toSafePrice(value, fallbackPrice) {
        return Math.max(0, toFiniteNumber(value, fallbackPrice));
      }

      function normalizePriceHistory(history, fallbackPrice) {
        const safeFallback = Math.max(1, Math.round(fallbackPrice));
        const source = Array.isArray(history) ? history : [];
        const cleaned = source
          .map((point) => Math.round(toFiniteNumber(point, safeFallback)))
          .filter((point) => Number.isFinite(point) && point > 0)
          .slice(-INVESTMENT_HISTORY_LIMIT);

        return cleaned.length > 0 ? cleaned : [safeFallback];
      }

      function normalizeGameState(state, language = "en") {
        const defaults = createDefaultGameState(language);
        const landlord = state?.landlord || {};
        const savedProperties = Array.isArray(landlord.properties)
          ? landlord.properties
          : [];
        const investment = state?.investment || {};
        const savedHoldings = Array.isArray(investment.holdings)
          ? investment.holdings
          : [];

        return {
          ...defaults,
          ...state,
          version: GAME_STATE_VERSION,
          wallet: {
            ...defaults.wallet,
            ...(state?.wallet || {}),
            cash: Math.max(0, toFiniteNumber(state?.wallet?.cash, 0)),
          },
          landlord: {
            ...defaults.landlord,
            ...landlord,
            properties: defaults.landlord.properties.map((property) => {
              const savedProperty = savedProperties.find(
                (item) => item.id === property.id,
              );
              return {
                id: property.id,
                count: toFiniteNumber(savedProperty?.count, 0),
              };
            }),
            rebirthCount: toFiniteNumber(landlord.rebirthCount, 0),
            multiplier: toFiniteNumber(landlord.multiplier, 1),
            totalEarned: toFiniteNumber(landlord.totalEarned, 0),
            clickPower: toFiniteNumber(landlord.clickPower, 10),
            clickUpgradeCost: toFiniteNumber(landlord.clickUpgradeCost, 50),
          },
          investment: {
            ...defaults.investment,
            ...investment,
            holdings: defaults.investment.holdings.map((holding) => {
              const savedHolding = savedHoldings.find(
                (item) => item.id === holding.id,
              );
              const asset = INVESTMENT_ASSETS.find(
                (item) => item.id === holding.id,
              );
              return {
                id: holding.id,
                name: asset.name,
                type: asset.type,
                price: clampNumber(
                  savedHolding?.price,
                  Math.max(1, asset.price * 0.5),
                  asset.price * 2,
                  asset.price,
                ),
                volatility: asset.volatility,
                owned: toOwnedQuantity(savedHolding?.owned),
                avgBuyPrice: toSafePrice(
                  savedHolding?.avgBuyPrice,
                  savedHolding?.price || asset.price,
                ),
                history: normalizePriceHistory(
                  savedHolding?.history,
                  savedHolding?.price || asset.price,
                ),
              };
            }),
          },
          enhancement: {
            ...defaults.enhancement,
            ...(state?.enhancement || {}),
            inventory: Array.isArray(state?.enhancement?.inventory)
              ? state.enhancement.inventory
              : [],
            failStacks: toFiniteNumber(state?.enhancement?.failStacks, 0),
          },
          rpg: {
            ...defaults.rpg,
            ...(state?.rpg || {}),
            characters: Array.isArray(state?.rpg?.characters)
              ? state.rpg.characters
              : [],
            highestStage: toFiniteNumber(state?.rpg?.highestStage, 0),
          },
          settings: {
            ...defaults.settings,
            ...(state?.settings || {}),
            language,
          },
        };
      }

      function migrateLegacyStateIfNeeded(language = "en") {
        const legacyRaw = localStorage.getItem(LEGACY_LANDLORD_STORAGE_KEY);
        if (!legacyRaw) return null;

        try {
          const legacy = JSON.parse(legacyRaw);
          const migrated = createDefaultGameState(language);
          const legacyProperties = Array.isArray(legacy.properties)
            ? legacy.properties
            : [];

          migrated.wallet.cash = toFiniteNumber(legacy.money, 0);
          migrated.landlord.properties = migrated.landlord.properties.map(
            (property) => {
              const savedProperty = legacyProperties.find(
                (item) => item.id === property.id,
              );
              return {
                id: property.id,
                count: toFiniteNumber(savedProperty?.count, 0),
              };
            },
          );
          migrated.landlord.rebirthCount = toFiniteNumber(
            legacy.rebirthCount,
            0,
          );
          migrated.landlord.multiplier = toFiniteNumber(legacy.multiplier, 1);
          migrated.landlord.totalEarned = toFiniteNumber(
            legacy.totalEarned,
            0,
          );
          migrated.landlord.clickPower = toFiniteNumber(legacy.clickPower, 10);
          migrated.landlord.clickUpgradeCost = toFiniteNumber(
            legacy.clickUpgradeCost,
            50,
          );

          saveGameState(migrated);
          localStorage.removeItem(LEGACY_LANDLORD_STORAGE_KEY);
          return migrated;
        } catch (error) {
          console.warn("Unable to migrate legacy Idle Landlord state.", error);
          return null;
        }
      }

            console.warn("Unable to load saved Money Game state.", error);
          }
        }

        return (
          migrateLegacyStateIfNeeded(language) || createDefaultGameState(language)
        );
      }

          settings: {

            lastSavedAt: new Date().toISOString(),

                  early game. Tap or click the giant money bag icon to instantly
                  generate cash.
                </li>
                <li>
                  <strong>Mouse Upgrades:</strong> Upgrade your clicking power.
                  Every upgrade significantly increases the amount of money
                  earned per click.
                </li>
                <li>
                  <strong>Real Estate Investment:</strong> Transition from
                  active clicking to passive income by purchasing properties
                  ranging from Hotdog Stands to massive Skyscrapers.
                </li>
                <li>
                  <strong>Auto-Save System:</strong> Your progress is
                  automatically saved directly to your browser's local storage.
                </li>
              </ul>
            </section>

            <div className="w-full bg-gray-100 h-[250px] my-8 flex items-center justify-center text-gray-400 text-sm border border-gray-300 border-dashed rounded">
              <span>[AdSense In-Article Ad Placement]</span>
            </div>

            <section className="mb-8">
              <h2 className="text-2xl font-bold mb-3 text-green-700">
                3. Advanced Investment Strategy
              </h2>
              <ol className="list-decimal pl-6 mb-4 space-y-2">
                <li>
                  <strong>Early Game Focus:</strong> Spend your first few
                  hundred dollars purely on Mouse Upgrades. Base properties
                  generate income too slowly early on.
                </li>
                <li>
                  <strong>The Rule of 1.15x:</strong> Every time you purchase a
                  property, the cost of the next property of the same type
                  increases by exactly 15%. Diversify your portfolio!
                </li>
                <li>
                  <strong>Rush to Rebirth:</strong> Your primary goal should be
                  hitting the $2B mark as quickly as possible to Rebirth and
                  gain a permanent income multiplier.
                </li>
              </ol>
            </section>

            <section className="mb-8">
              <h2 className="text-2xl font-bold mb-3 text-green-700">
                4. Frequently Asked Questions (FAQ)
              </h2>
              <div className="space-y-4">
                <div>
                  <strong className="block text-gray-800">
                    Q: Does the game generate money while I am offline?
                  </strong>
                  <span className="text-gray-600">
                    A: Currently, income is generated only while the browser tab
                    is active.
                  </span>
                </div>
                <div>
                  <strong className="block text-gray-800">
                    Q: How do I reset my progress?
                  </strong>
                  <span className="text-gray-600">
                    A: You can reset your progress by clearing your browser's
                    Local Storage data.
                  </span>
                </div>
                <div>
                  <strong className="block text-gray-800">
                    Q: Is it safe to use auto-clickers?
                  </strong>
                  <span className="text-gray-600">
                    A: Yes, this is a single-player game, so use any tools you
                    prefer to build your empire!
                  </span>
                </div>
              </div>
            </section>
          </article>
        ),
      };

      function GameApp() {
        // 사용자 브라우저 언어 자동 감지
        const userLang = (
          navigator.language || navigator.userLanguage
        ).includes("ko")
          ? "ko"
          : "en";
        const t = TRANSLATIONS[userLang];

        const [activeTab, setActiveTab] = useState("landlord");
        const [gameState, setGameState] = useState(() =>
          loadGameState(userLang),
        );
        const [clicks, setClicks] = useState([]);

        const cash = Math.max(0, toFiniteNumber(gameState.wallet.cash, 0));
        const landlord = gameState.landlord;
        const investmentHoldings = gameState.investment.holdings;
        const clickPower = landlord.clickPower;
        const clickUpgradeCost = landlord.clickUpgradeCost;
        const rebirthCount = landlord.rebirthCount;
        const multiplier = landlord.multiplier;
        const properties = PROPERTIES_DATA[userLang].map((property) => {
          const savedProperty = landlord.properties.find(
            (item) => item.id === property.id,
          );
          return {
            ...property,
            count: toFiniteNumber(savedProperty?.count, 0),
          };
        });
        const incomePerSec =
          properties.reduce(
            (total, prop) => total + prop.baseIncome * prop.count,
            0,
          ) * multiplier;
        const investmentAssets = INVESTMENT_ASSETS.map((asset) => {
          const holding = investmentHoldings.find(
            (item) => item.id === asset.id,
          );
          const price = clampNumber(
            holding?.price,
            Math.max(1, asset.price * 0.5),
            asset.price * 2,
            asset.price,
          );
          const owned = toOwnedQuantity(holding?.owned);
          const avgBuyPrice = toSafePrice(holding?.avgBuyPrice, price);
          const history = normalizePriceHistory(holding?.history, price);
          const value = price * owned;
          const costBasis = avgBuyPrice * owned;
          const gainLoss = owned > 0 ? value - costBasis : 0;
          const gainLossPercent =
            owned > 0 && costBasis > 0 ? (gainLoss / costBasis) * 100 : 0;
          return {
            ...asset,
            ...(holding || {}),
            price,
            owned,
            avgBuyPrice,
            history,
            value,
            gainLoss,
            gainLossPercent,
          };
        });
        const totalPortfolioValue = investmentAssets.reduce(
          (total, asset) => total + toFiniteNumber(asset.value, 0),
          0,
        );
        const totalNetWorth = cash + totalPortfolioValue;

        const updateGameState = (updater) => {
          setGameState((prev) => {
            const next = typeof updater === "function" ? updater(prev) : updater;
            return normalizeGameState(next, userLang);
          });
        };

        // 자동 저장 로직
        useEffect(() => {
          saveGameState(gameState);
        }, [gameState]);

        useEffect(() => {
          if (activeTab !== "landlord") return;

          const timer = setInterval(() => {
            if (incomePerSec > 0) {
              updateGameState((prev) => ({
                ...prev,
                wallet: {
                  ...prev.wallet,
                  cash: prev.wallet.cash + incomePerSec,
                },
                landlord: {
                  ...prev.landlord,
                  totalEarned: prev.landlord.totalEarned + incomePerSec,
                },
              }));
            }
          }, 1000);
          return () => clearInterval(timer);
        }, [activeTab, incomePerSec]);

        useEffect(() => {
          if (activeTab !== "investment") return;

          const timer = setInterval(() => {
            updateGameState((prev) => ({
              ...prev,
              investment: {
                ...prev.investment,
                holdings: prev.investment.holdings.map((holding) => {
                  const asset = INVESTMENT_ASSETS.find(
                    (item) => item.id === holding.id,
                  );
                  if (!asset) return holding;

                  const currentPrice = toFiniteNumber(
                    holding.price,
                    asset.price,
                  );
                  const movement =
                    1 + (Math.random() * 2 - 1) * asset.volatility;
                  const minPrice = asset.price * 0.5;
                  const maxPrice = asset.price * 2;
                  const nextPrice = Math.min(
                    maxPrice,
                    Math.max(minPrice, currentPrice * movement),
                  );

                  return {
                    ...holding,
                    price: Math.max(1, Math.round(nextPrice)),
                    history: [
                      ...normalizePriceHistory(holding.history, currentPrice),
                      Math.max(1, Math.round(nextPrice)),
                    ].slice(-INVESTMENT_HISTORY_LIMIT),
                  };
                }),
              },
            }));
          }, 2000);
          return () => clearInterval(timer);
        }, [activeTab]);

        const handleMainClick = (e) => {
          const gain = clickPower * multiplier;
          updateGameState((prev) => ({
            ...prev,
            wallet: {
              ...prev.wallet,
              cash: prev.wallet.cash + gain,
            },
            landlord: {
              ...prev.landlord,
              totalEarned: prev.landlord.totalEarned + gain,
            },
          }));
          const rect = e.currentTarget.getBoundingClientRect();
          const newClick = {
            id: Date.now(),
            x: e.clientX || rect.left + rect.width / 2,
            y: e.clientY || rect.top + rect.height / 2,
            val: gain,
          };
          setClicks((prev) => [...prev, newClick]);
          setTimeout(
            () => setClicks((prev) => prev.filter((c) => c.id !== newClick.id)),
            800,
          );
        };

        const performRebirth = () => {
          if (
            cash >= REBIRTH_REQUIREMENT &&
            window.confirm(t.rebirthConfirm)
          ) {
            updateGameState((prev) => ({
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: 0,
              },
              landlord: {
                ...prev.landlord,
                properties: createDefaultGameState(userLang).landlord
                  .properties,
                rebirthCount: prev.landlord.rebirthCount + 1,
                multiplier: prev.landlord.multiplier + 1,
                clickPower: 10,
                clickUpgradeCost: 50,
              },
            }));
            alert(t.rebirthSuccess);
          }
        };

        const buyProperty = (id) => {
          const idx = properties.findIndex((p) => p.id === id);
          if (idx < 0) return;
          const cost = Math.floor(
            properties[idx].baseCost * Math.pow(1.15, properties[idx].count),
          );
          if (cash >= cost) {
            updateGameState((prev) => {
              const baseProperty = PROPERTIES_DATA[userLang].find(
                (property) => property.id === id,
              );
              const currentProperty = prev.landlord.properties.find(
                (property) => property.id === id,
              );
              if (!baseProperty || !currentProperty) return prev;

              const currentCount = toOwnedQuantity(currentProperty.count);
              const currentCost = Math.floor(
                baseProperty.baseCost * Math.pow(1.15, currentCount),
              );
              if (prev.wallet.cash < currentCost) return prev;

              return {
                ...prev,
                wallet: {
                  ...prev.wallet,
                  cash: prev.wallet.cash - currentCost,
                },
                landlord: {
                  ...prev.landlord,
                  properties: prev.landlord.properties.map((item) =>
                    item.id === id
                      ? { ...item, count: currentCount + 1 }
                      : item,
                  ),
                },
              };
            });
          }
        };

        const buyClickUpgrade = () => {
          if (cash < clickUpgradeCost) return;

          updateGameState((prev) => {
            const currentCost = toFiniteNumber(
              prev.landlord.clickUpgradeCost,
              50,
            );
            if (prev.wallet.cash < currentCost) return prev;

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash - currentCost,
              },
              landlord: {
                ...prev.landlord,
                clickPower: prev.landlord.clickPower + 10,
                clickUpgradeCost: Math.floor(currentCost * 1.5),
              },
            };
          });
        };

        const buyInvestmentAsset = (id) => {
          const asset = investmentAssets.find((item) => item.id === id);
          if (!asset || cash < asset.price) return;

          updateGameState((prev) => {
            const currentHolding = prev.investment.holdings.find(
              (holding) => holding.id === id,
            );
            const currentPrice = clampNumber(
              currentHolding?.price,
              Math.max(1, asset.price * 0.5),
              asset.price * 2,
              asset.price,
            );
            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            const currentAvgBuyPrice = toSafePrice(
              currentHolding?.avgBuyPrice,
              currentPrice,
            );
            const nextOwned = currentOwned + 1;
            const nextAvgBuyPrice =
              ((currentAvgBuyPrice * currentOwned) + currentPrice) / nextOwned;
            if (prev.wallet.cash < currentPrice) return prev;

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash - currentPrice,
              },
              investment: {
                ...prev.investment,
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: nextOwned,
                        avgBuyPrice: toSafePrice(
                          nextAvgBuyPrice,
                          currentPrice,
                        ),
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const sellInvestmentAsset = (id) => {
          const asset = investmentAssets.find((item) => item.id === id);
          if (!asset || asset.owned <= 0) return;

          updateGameState((prev) => {
            const currentHolding = prev.investment.holdings.find(
              (holding) => holding.id === id,
            );
            const currentOwned = toOwnedQuantity(currentHolding?.owned);
            if (currentOwned <= 0) return prev;
            const nextOwned = Math.max(0, currentOwned - 1);

            const currentPrice = clampNumber(
              currentHolding?.price,
              Math.max(1, asset.price * 0.5),
              asset.price * 2,
              asset.price,
            );

            return {
              ...prev,
              wallet: {
                ...prev.wallet,
                cash: prev.wallet.cash + currentPrice,
              },
              investment: {
                ...prev.investment,
                holdings: prev.investment.holdings.map((holding) =>
                  holding.id === id
                    ? {
                        ...holding,
                        price: currentPrice,
                        owned: nextOwned,
                        avgBuyPrice:
                          nextOwned > 0
                            ? toSafePrice(holding.avgBuyPrice, currentPrice)
                            : currentPrice,
                      }
                    : holding,
                ),
              },
            };
          });
        };

        const renderSparkline = (history) => {
          const points = normalizePriceHistory(history, 1);
          const min = Math.min(...points);
          const max = Math.max(...points);
          const range = Math.max(1, max - min);
          const path = points
            .map((point, index) => {
              const x =
                points.length === 1
                  ? 100
                  : (index / (points.length - 1)) * 200;
              const y = 56 - ((point - min) / range) * 48;
              return `${index === 0 ? "M" : "L"} ${x.toFixed(1)} ${y.toFixed(1)}`;
            })
            .join(" ");

          return (
            <svg
              viewBox="0 0 200 64"
              className="w-full h-16 mt-4"
              role="img"
              aria-label="Recent price history"
            >
              <path
                d="M 0 56 L 200 56"
                stroke="#e5e7eb"
                strokeWidth="1"
                fill="none"
              />
              <path
                d={path}
                stroke="#0f766e"
                strokeWidth="3"
                fill="none"
                strokeLinecap="round"
                strokeLinejoin="round"
              />
            </svg>
          );
        };

        const formatMoney = (val) => {
          return new Intl.NumberFormat(t.format, {
            style: "currency",
            currency: t.currency,
            maximumFractionDigits: 0,
          }).format(val);
        };

        const tabs = [
          { id: "landlord", label: "Landlord" },
          { id: "investment", label: "Investment" },
          { id: "enhancement", label: "Enhancement" },
          { id: "rpg", label: "RPG" },
        ];
        const comingSoonTitle =
          tabs.find((tab) => tab.id === activeTab)?.label || "Coming Soon";

        return (
          <div className="w-full max-w-4xl flex flex-col items-center">
            {/* 게임 메인 컨테이너 */}
            <div className="w-full max-w-md">
              <nav className="w-full bg-white shadow-sm rounded-lg mb-4 p-1 grid grid-cols-4 gap-1 border border-gray-100">
                {tabs.map((tab) => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`px-2 py-2 rounded-md text-xs font-bold transition-colors ${activeTab === tab.id ? "bg-green-600 text-white" : "text-gray-500 hover:bg-gray-100"}`}
                  >
                    {tab.label}
                  </button>
                ))}
              </nav>

              {activeTab === "landlord" ? (
                <>
              {/* 상단 환생 버튼 및 상태 영역 */}
              <div className="w-full bg-white shadow-sm p-4 flex justify-between items-center rounded-lg mb-4 border-b-2 border-green-200">
                <div>
                  <h1 className="text-xl font-black text-green-600">
                    {t.title}
                  </h1>
                  <p className="text-xs text-gray-500 font-bold bg-gray-100 inline-block px-2 py-0.5 rounded mt-1">
                    {t.multiplier}: x{multiplier}
                  </p>
                </div>
                <button
                  onClick={performRebirth}
                  className={`px-4 py-2 rounded-full font-bold text-sm transition-all ${cash >= REBIRTH_REQUIREMENT ? "bg-yellow-400 text-yellow-900 rebirth-animate shadow-lg" : "bg-gray-200 text-gray-400 cursor-not-allowed"}`}
                >
                  {t.rebirth} {rebirthCount > 0 && `(${rebirthCount})`}
                </button>
              </div>

              {/* 게임 메인 UI 패널 */}
              <div className="w-full bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-100 flex flex-col h-[650px]">
                <div className="bg-gradient-to-r from-green-500 to-emerald-600 text-white p-6 text-center">
                  <div className="text-4xl font-extrabold mb-1">
                    {formatMoney(cash)}
                  </div>
                  <div className="text-green-100 text-sm font-medium">
                    +{formatMoney(incomePerSec)}/{t.sec}
                  </div>
                </div>

                <div
                  className="h-64 flex items-center justify-center relative cursor-pointer select-none bg-green-50 overflow-hidden"
                  onClick={handleMainClick}
                >
                  <div className="text-[100px] font-bold text-green-600 drop-shadow-2xl hover:scale-105 active:scale-95 transition-transform duration-100">
                    TAP!
                  </div>
                  <div className="absolute bottom-4 text-green-700/60 font-bold animate-pulse pointer-events-none text-sm">
                    {t.tapToEarn} (+{formatMoney(clickPower * multiplier)}/
                    {t.click})
                  </div>
                  {clicks.map((c) => (
                    <div
                      key={c.id}
                      className="click-effect"
                      style={{ left: c.x - 20, top: c.y - 40 }}
                    >
                      +{formatMoney(c.val)}
                    </div>
                  ))}
                </div>

                <div className="bg-gray-50 flex-grow overflow-y-auto p-4 custom-scrollbar">
                  <h2 className="text-xs font-bold mb-3 text-gray-400 uppercase tracking-widest">
                    {t.investments}
                  </h2>

                  <button
                    onClick={buyClickUpgrade}
                    disabled={cash < clickUpgradeCost}
                    className={`w-full flex justify-between items-center p-4 mb-3 rounded-xl border transition-all ${cash >= clickUpgradeCost ? "bg-white border-green-300 shadow-sm" : "bg-gray-100 opacity-50"}`}
                  >
                    <div className="text-left">
                      <div className="font-bold">{t.mousePower}</div>
                      <div className="text-xs text-gray-500">
                        +{formatMoney(10 * multiplier)}/{t.click}
                      </div>
                    </div>
                    <div className="font-black text-green-600">
                      {formatMoney(clickUpgradeCost)}
                    </div>
                  </button>

                  {properties.map((p) => {
                    const cost = Math.floor(
                      p.baseCost * Math.pow(1.15, p.count),
                    );
                    return (
                      <button
                        key={p.id}
                        onClick={() => buyProperty(p.id)}
                        disabled={cash < cost}
                        className={`w-full flex justify-between items-center p-4 mb-3 rounded-xl border transition-all ${cash >= cost ? "bg-white border-blue-200 shadow-sm" : "bg-gray-100 opacity-50"}`}
                      >
                        <div className="flex items-center gap-3">
                          <span className="text-2xl">{p.icon}</span>
                          <div className="text-left">
                            <div className="font-bold">
                              {p.name}{" "}
                              <span className="text-blue-500 text-xs bg-blue-50 px-1.5 py-0.5 rounded ml-1">
                                {t.lv}.{p.count}
                              </span>
                            </div>
                            <div className="text-xs text-gray-500">
                              +{formatMoney(p.baseIncome * multiplier)}/{t.sec}
                            </div>
                          </div>
                        </div>
                        <div className="font-black text-blue-600">
                          {formatMoney(cost)}
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

                  <section className="w-full bg-white shadow-sm rounded-lg mt-4 p-4 border border-gray-100">
                    <h2 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">
                      Save Data
                    </h2>
                    <div className="grid grid-cols-3 gap-2">
                      <button className="bg-gray-100 text-gray-500 rounded-md py-2 text-xs font-bold cursor-not-allowed">
                        Save
                      </button>
                      <button className="bg-gray-100 text-gray-500 rounded-md py-2 text-xs font-bold cursor-not-allowed">
                        Export
                      </button>
                      <button className="bg-gray-100 text-gray-500 rounded-md py-2 text-xs font-bold cursor-not-allowed">
                        Import
                      </button>
                    </div>
                  </section>
                </>
              ) : activeTab === "investment" ? (
                <section className="w-full bg-white shadow-sm rounded-lg border border-gray-100 overflow-hidden">
                  <div className="bg-gradient-to-r from-slate-800 to-teal-700 text-white p-5">
                    <h1 className="text-xl font-black">Investment Master</h1>
                    <div className="mt-3 grid grid-cols-1 sm:grid-cols-3 gap-3 text-sm">
                      <div>
                        <div className="text-teal-100 text-xs font-bold uppercase">
                          Wallet Cash
                        </div>
                        <div className="text-lg font-black">
                          {formatMoney(cash)}
                        </div>
                      </div>
                      <div>
                        <div className="text-teal-100 text-xs font-bold uppercase">
                          Portfolio Value
                        </div>
                        <div className="text-lg font-black">
                          {formatMoney(totalPortfolioValue)}
                        </div>
                      </div>
                      <div>
                        <div className="text-teal-100 text-xs font-bold uppercase">
                          Net Worth
                        </div>
                        <div className="text-lg font-black">
                          {formatMoney(totalNetWorth)}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-gray-50 p-4 space-y-3">
                    {investmentAssets.map((asset) => (
                      <div
                        key={asset.id}
                        className="bg-white border border-gray-200 rounded-lg p-4"
                      >
                        <div className="flex items-start justify-between gap-3">
                          <div>
                            <h2 className="font-black text-gray-800">
                              {asset.name}
                            </h2>
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              {asset.type}
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              Current Price
                            </div>
                            <div className="font-black text-teal-700">
                              {formatMoney(asset.price)}
                            </div>
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3 mt-4 text-sm">
                          <div className="bg-gray-50 rounded-md p-3">
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              Owned Quantity
                            </div>
                            <div className="font-black text-gray-800">
                              {asset.owned}
                            </div>
                          </div>
                          <div className="bg-gray-50 rounded-md p-3">
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              Holding Value
                            </div>
                            <div className="font-black text-gray-800">
                              {formatMoney(asset.value)}
                            </div>
                          </div>
                          <div className="bg-gray-50 rounded-md p-3">
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              Avg Buy Price
                            </div>
                            <div className="font-black text-gray-800">
                              {asset.owned > 0
                                ? formatMoney(asset.avgBuyPrice)
                                : "-"}
                            </div>
                          </div>
                          <div className="bg-gray-50 rounded-md p-3">
                            <div className="text-xs font-bold text-gray-400 uppercase">
                              Gain / Loss
                            </div>
                            <div
                              className={`font-black ${asset.owned <= 0 ? "text-gray-400" : asset.gainLoss >= 0 ? "text-emerald-600" : "text-red-600"}`}
                            >
                              {asset.owned > 0
                                ? `${formatMoney(asset.gainLoss)} (${asset.gainLossPercent.toFixed(1)}%)`
                                : "-"}
                            </div>
                          </div>
                        </div>

                        {renderSparkline(asset.history)}

                        <div className="grid grid-cols-2 gap-2 mt-4">
                          <button
                            onClick={() => buyInvestmentAsset(asset.id)}
                            disabled={cash < asset.price}
                            className={`rounded-md py-2 text-sm font-bold transition-colors ${cash >= asset.price ? "bg-teal-600 text-white" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}
                          >
                            Buy 1
                          </button>
                          <button
                            onClick={() => sellInvestmentAsset(asset.id)}
                            disabled={asset.owned <= 0}
                            className={`rounded-md py-2 text-sm font-bold transition-colors ${asset.owned > 0 ? "bg-slate-700 text-white" : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}
                          >
                            Sell 1
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>
              ) : (
                <section className="w-full bg-white shadow-sm rounded-lg min-h-[420px] flex flex-col items-center justify-center border border-gray-100 text-center p-8">
                  <h1 className="text-2xl font-black text-gray-800 mb-2">
                    {comingSoonTitle}
                  </h1>
                  <p className="text-gray-500 font-medium">Coming Soon</p>
                </section>
              )}
            </div>

            {/* 국가별로 렌더링되는 SEO 공략집 텍스트 영역 */}
            {activeTab === "landlord" && SEO_CONTENT[userLang]}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<GameApp />);
    </script>
  </body>
</html>
